<!DOCTYPE html>
<html>
<head>
    <title>TACNET COMMAND</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* THE OFFICIAL TACNET PALETTE */
        body { background-color: #011101; color: #39FF14; font-family: 'Courier New', monospace; margin: 0; padding: 0; }
        
        /* CRACKED GOLD HEADER */
        .gold-header { 
            color: #D4AF37; 
            text-align: center; 
            font-size: 3.5em; 
            margin: 20px 0 0 0;
            text-shadow: 2px 2px #000, -1px -1px 0 #555;
            font-weight: 900;
            letter-spacing: 5px;
        }

        .sub-header { text-align: center; color: #D4AF37; font-size: 0.8em; margin-bottom: 30px; letter-spacing: 2px; }

        /* THE BRIEFING FORM */
        #home-page { padding: 30px; max-width: 600px; margin: auto; }
        .form-label { color: #D4AF37; font-weight: bold; display: block; margin-top: 15px; }
        .input-field { 
            background: #000; 
            border: 1px solid #39FF14; 
            color: #39FF14; 
            padding: 15px; 
            width: 100%; 
            box-sizing: border-box; 
            margin-top: 5px; 
            font-size: 1.1em;
            box-shadow: inset 0 0 5px #39FF14;
        }

        .deploy-btn { 
            background: #000; 
            color: #D4AF37; 
            border: 3px solid #D4AF37; 
            padding: 20px; 
            width: 100%; 
            font-weight: bold; 
            font-size: 1.5em; 
            margin-top: 30px; 
            cursor: pointer;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }
        .deploy-btn:active { background: #D4AF37; color: #000; }

        /* HUD & MAP */
        #hud-container { display: none; flex-direction: column; height: 100vh; }
        #map-display { flex-grow: 1; border: 2px solid #D4AF37; margin: 10px; position: relative; }
        
        .tool-grid { display: grid; grid-template-columns: repeat(4, 1fr); background: #000; padding: 10px; gap: 5px; border-top: 1px solid #39FF14; }
        .tool-btn { background: #011101; color: #D4AF37; border: 1px solid #D4AF37; padding: 12px 2px; font-size: 0.6em; font-weight: bold; text-align: center; }

        /* NEON LEGAL OVERLAY */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .law-item { border-bottom: 1px solid #1a1a1a; padding: 15px 0; color: #39FF14; }
    </style>
</head>
<body>

<div id="home-page">
    <div class="gold-header">TACNET</div>
    <div class="sub-header">MULTI-AGENCY TACTICAL TASK FORCE</div>
    
    <label class="form-label">INCIDENT TYPE / MISSION NAME:</label>
    <input type="text" id="inc-name" class="input-field" placeholder="E.G. TACTICAL SEARCH - BRACY">
    
    <label class="form-label">UNIT CALLSIGN:</label>
    <input type="text" id="unit-id" class="input-field" placeholder="OPERATOR ID">
    
    <label class="form-label">AGENCY JURISDICTION:</label>
    <input type="text" class="input-field" value="LAW ENFORCEMENT ONLY" readonly>

    <button class="deploy-btn" onclick="deployNet()">[ DEPLOY THE NET ]</button>
    
    <div style="text-align: center; color: #444; font-size: 0.7em; margin-top: 50px;">
        DEVELOPED BY: DEPUTY EARL WOOD (RET.)
    </div>
</div>

<div id="hud-container">
    <div id="map-display"></div>
    
    <div class="tool-grid">
        <div class="tool-btn" onclick="toggleOverlay('law-overlay')">CASE LAW</div>
        <div class="tool-btn" onclick="startPerimeter()" id="perim-btn">PERIMETER</div>
        <div class="tool-btn" onclick="clearMap()">CLEAR ALL</div>
        <div class="tool-btn" onclick="location.reload()" style="color:red;">EXIT</div>
    </div>
</div>

<div id="law-overlay" class="overlay">
    <h2 class="gold-header" style="font-size: 1.5em;">LEGAL REFERENCE</h2>
    <div class="law-item"><b>VA v. HURD:</b> K9 Reliability standards.</div>
    <div class="law-item"><b>RODRIGUEZ v. US:</b> Mission duration limits.</div>
    <div class="law-item"><b>FLORIDA v. HARRIS:</b> Certification/Training records.</div>
    <button class="deploy-btn" onclick="toggleOverlay('law-overlay')">RETURN TO MAP</button>
</div>

<script>
    var map, markers = [], polyline, perimActive = false;

    function deployNet() {
        var inc = document.getElementById('inc-name').value;
        if(!inc) { alert("ENTER MISSION NAME TO INITIALIZE"); return; }
        
        document.getElementById('home-page').style.display = 'none';
        document.getElementById('hud-container').style.display = 'flex';
        
        map = L.map('map-display', { zoomControl: false }).setView([37.5, -79.0], 13);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
        map.locate({setView: true, maxZoom: 16});
        
        map.on('click', function(e) {
            if(!perimActive) return;
            L.circleMarker(e.latlng, { radius: 5, color: '#ff0000' }).addTo(map);
            markers.push(e.latlng);
            if(polyline) map.removeLayer(polyline);
            polyline = L.polyline(markers, {color: '#ff0000', weight: 4}).addTo(map);
        });
    }

    function toggleOverlay(id) {
        var el = document.getElementById(id);
        el.style.display = (el.style.display == 'block') ? 'none' : 'block';
    }

    function startPerimeter() {
        perimActive = !perimActive;
        document.getElementById('perim-btn').style.background = perimActive ? "#39FF14" : "#011101";
        document.getElementById('perim-btn').style.color = perimActive ? "#000" : "#D4AF37";
    }

    function clearMap() { location.reload(); }
</script>

</body>
</html>
