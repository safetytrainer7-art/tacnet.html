<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TACNET | MULTI-AGENCY TASK FORCE</title>
    <style>
        :root {
            --hunter-green: #1B3022;
            --neon-green: #39FF14;
            --gold: #D4AF37;
            --sos-red: #B22222;
            --glass: rgba(27, 48, 34, 0.85);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; color: var(--gold);
            font-family: 'Courier New', Courier, monospace; overflow: hidden;
        }

        /* OFFICIAL HEADER IMAGE SECTION */
        .hud-header {
            position: absolute; 
            top: 0; 
            width: 100%; 
            z-index: 10;
            background: #000;
            border-bottom: 2px solid var(--neon-green);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .header-banner {
            width: 100%;
            max-width: 800px; /* Adjust based on your preference */
            height: auto;
            display: block;
        }

        /* FULL SCREEN MAP BACKGROUND */
        #main-map {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://maps.googleapis.com/maps/api/staticmap?center=37.4514,-79.1522&zoom=14&size=1200x1200&maptype=satellite');
            background-size: cover; background-position: center; z-index: 1;
        }

        /* HUD OVERLAYS */
        .hud-left, .hud-right {
            position: absolute; top: 160px; z-index: 10;
            display: flex; flex-direction: column; gap: 10px; padding: 10px;
        }

        .hud-left { left: 10px; }
        .hud-right { right: 10px; width: 220px; }

        .hud-bottom {
            position: absolute; bottom: 0; width: 100%; z-index: 10;
            background: var(--glass); display: flex; justify-content: space-around;
            padding: 15px 0; border-top: 2px solid var(--gold);
        }

        /* TACTICAL ELEMENTS */
        .tactical-box {
            background: var(--glass); border: 1px solid var(--gold);
            padding: 10px; border-radius: 4px; box-shadow: 0 0 10px #000;
        }

        .icon-circle {
            width: 55px; height: 55px; border: 2px solid var(--gold);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; background: var(--hunter-green);
            cursor: pointer; font-weight: bold; font-size: 0.75rem;
            text-align: center; line-height: 1;
        }

        .icon-circle:active { background: var(--gold); color: #000; }

        .btn-sos {
            background: var(--sos-red); color: #fff; border: 2px solid #fff;
            padding: 15px; font-weight: bold; border-radius: 8px;
            animation: pulse 1.5s infinite; cursor: pointer;
            text-transform: uppercase;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        #perimeter-visual {
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
            width: 300px; height: 300px;
            border: 3px dashed var(--neon-green);
            background: rgba(57, 255, 20, 0.15);
            border-radius: 50%; display: none; z-index: 5;
        }

        .night-vision-mode {
            filter: brightness(0.8) contrast(1.2) sepia(100%) hue-rotate(80deg);
        }
    </style>
</head>
<body id="tacnet-ui">

    <!-- HUD: TOP BAR WITH tnet.png -->
    <div class="hud-header">
        <img src="tnet.png" alt="TACNET Header" class="header-banner">
    </div>

    <!-- THE MAP IS THE BACKGROUND -->
    <div id="main-map"></div>
    <div id="perimeter-visual"></div>

    <!-- HUD: LEFT (COMMAND ICONS) -->
    <div class="hud-left">
        <div class="icon-circle" onclick="togglePerimeter()">PERIM<br>SET</div>
        <div class="icon-circle" onclick="dropMarker()">ARTCL<br>DROP</div>
        <div class="icon-circle" onclick="toggleNightVision()">NVG<br>MODE</div>
        <div class="icon-circle" onclick="window.location.reload()">SYNC<br>GPS</div>
    </div>

    <!-- HUD: RIGHT (MISSION DATA) -->
    <div class="hud-right">
        <div class="tactical-box">
            <div style="color: var(--neon-green); border-bottom: 1px solid var(--gold); font-weight: bold;">OP: ALPHA-247</div>
            <div style="font-size: 0.8rem; margin-top: 5px;">
                UNITS: 7 LEO / 2 K9<br>
                TEMP: 72°F / CLEAR<br>
                WIND: 8MPH NW
            </div>
        </div>
        <button class="btn-sos" onclick="triggerSOS()">SOS EMERGENCY</button>
    </div>

    <!-- HUD: BOTTOM (NAVIGATION) -->
    <div class="hud-bottom">
        <button onclick="alert('Live Ops Active')">LIVE OPS</button>
        <button onclick="startK9Guide()">K9 OPS</button>
        <button onclick="alert('Accessing VA/Federal Case Law')">CASE LAW</button>
        <button onclick="alert('Admin: Brotherhood Access Valid')">ADMIN</button>
    </div>

    <script>
        function togglePerimeter() {
            const p = document.getElementById('perimeter-visual');
            p.style.display = p.style.display === 'none' ? 'block' : 'none';
            if(p.style.display === 'block') alert("Tactical Perimeter Set.");
        }

        function dropMarker() {
            alert("Article Drop: GPS Tagged at current location.");
        }

        function toggleNightVision() {
            document.getElementById('tacnet-ui').classList.toggle('night-vision-mode');
        }

        function startK9Guide() {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance("TACNET K9 Guide Online. State command for hands-free aid.");
            synth.speak(utter);
        }

        function triggerSOS() {
            alert("EMERGENCY SOS: Location broadcasted to Task Force.");
        }
    </script>
</body>
</html>
