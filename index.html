<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>TACNET Tactical Network</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
--green:#00ff66;
--gold:#ffcc00;
--blue:#1d7dff;
--lightblue:#66d9ff;
--red:#ff3030;
--civilian:#28d96f;
--purple:#bf66ff;
--orange:#ff9933;
--night-vision-red: rgba(255, 0, 0, 0.40);
--neon-glow-red: rgba(255, 0, 0, 0.75);
}

*{
box-sizing:border-box;
}

html,body{
margin:0;
padding:0;
height:100%;
background:#000;
font-family:Arial, Helvetica, sans-serif;
color:#fff;
overflow:hidden;
}

/* FIXED TACTICAL CRIMSON NIGHT VISION FILTERS */
body::before{
content:'';
position:fixed;
inset:0;
pointer-events:none;
background:
repeating-linear-gradient(
to bottom,
rgba(255,0,0,.04),
rgba(255,0,0,.04) 2px,
transparent 2px,
transparent 4px
);
z-index:9999;
}

body::after{
content:'';
position:fixed;
inset:0;
pointer-events:none;
box-shadow:
inset 0 0 180px var(--night-vision-red),
inset 0 0 80px rgba(150, 0, 0, 0.2);
z-index:9998;
}

/* LANDING GATEWAY */
#landingPage{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:#000;
z-index:3000;
}

#landingImage{
width:min(96vw,430px);
height:auto;
object-fit:contain;
box-shadow:0 0 40px var(--night-vision-red);
}

.enterBtn{
margin-top:22px;
padding:18px 40px;
border:none;
border-radius:10px;
background:var(--green);
color:#000;
font-size:1.1rem;
font-weight:900;
letter-spacing:3px;
cursor:pointer;
box-shadow:
0 0 20px rgba(0,255,102,.8),
0 0 40px var(--night-vision-red);
}

/* APP PANEL CONSOLE */
#appPage{
display:none;
height:100%;
flex-direction:column;
background:#030503;
}

.topBar{
height:72px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 12px;
background:linear-gradient(to bottom,#3b3510,#0f0f08);
border-bottom:2px solid var(--gold);
box-shadow: 0 0 15px var(--night-vision-red);
}

.patch{
width:52px;
height:52px;
border-radius:50%;
object-fit:cover;
}

.titleWrap{
text-align:center;
flex:1;
}

.title{
margin:0;
font-size:2rem;
font-weight:900;
letter-spacing:4px;
color:var(--gold);
text-shadow:0 0 12px var(--neon-glow-red);
}

.subtitle{
margin:0;
font-size:.72rem;
letter-spacing:2px;
}

.controls{padding:6px;display:flex;gap:6px;background:#081108;flex-shrink:0;}

@media(max-width:768px){
.controls{flex-direction:row;}
#agencyCode,#addressInput{font-size:.82rem;padding:10px;}
.controlBtn{padding:10px 12px;font-size:.82rem;min-width:72px;}
}

#agencyCode,
#addressInput{
flex:1;
background:#000;
border:2px solid var(--green);
color:#fff;
padding:12px;
font-weight:bold;
box-shadow: 0 0 8px rgba(255, 0, 0, 0.3);
}

.controlBtn{
padding:12px 16px;
background:var(--green);
color:#000;
border:none;
font-weight:900;
cursor:pointer;
box-shadow: 0 0 10px rgba(0, 255, 102, 0.4);
}

#map{flex:1;width:100%;min-height:45vh;z-index:1;background:#000;}

.legend{display:grid;grid-template-columns:repeat(2,1fr);
gap:6px;
padding:8px;
background:#040904;
border-top:2px solid #183318;
}

.legendItem{
display:flex;
align-items:center;
gap:8px;
font-size:.78rem;
font-weight: bold;
}

.dot{
width:14px;
height:14px;
border-radius:50%;
box-shadow: 0 0 6px rgba(255,255,255,0.5);
}

.bottomPanel{padding:6px;display:grid;grid-template-columns:repeat(2,1fr);
gap:8px;
background:#040904;
}

.actionBtn{padding:10px;font-size:.82rem;
border:none;
font-weight:bold;
cursor:pointer;
background:#111;
color:#fff;
border:2px solid var(--green);
text-transform: uppercase;
box-shadow: 0 0 6px rgba(0,255,102,0.2);
}

.redBtn{
border-color:#ff4444;
color:#ff4444;
box-shadow: 0 0 8px rgba(255,68,68,0.3);
}

.goldBtn{
border-color:var(--gold);
color:var(--gold);
box-shadow: 0 0 8px rgba(255,204,0,0.3);
}

.notesPanel{padding:6px;flex-shrink:0;
background:#000;
}

#notes{
width:100%;
height:75px;
background:#050505;
color:#fff;
border:2px solid var(--green);
padding:10px;
font-weight: bold;
}

.footer{
height:40px;
display:flex;
align-items:center;
justify-content:center;
background:#050505;
color:#ff7777;
font-size:.8rem;
font-weight:bold;
letter-spacing:1px;
border-top: 1px solid #222;
text-shadow: 0 0 5px var(--neon-glow-red);
}
</style>
</head>
<body>

<div id="landingPage">
<img src="FDD.png" id="landingImage">
<button class="enterBtn" onclick="enterTacnet()">
ENTER TACNET
</button>
</div>

<div id="appPage">

<div class="topBar">
<img src="amherst_badge.png.jpg" class="patch" onerror="this.style.display='none'">

<div class="titleWrap">
<h1 class="title">TACNET</h1>
<p class="subtitle">MULTI-AGENCY TASK FORCE SEARCH NETWORK</p>
</div>

<img src="va.png-modified.jpg" class="patch" onerror="this.style.display='none'">
</div>

<div class="controls">
<input id="agencyCode" placeholder="OUTSIDE AGENCY ACCESS CODE">
<button class="controlBtn" onclick="joinAgency()">JOIN</button>
</div>

<div class="controls">
<input id="addressInput" placeholder="ENTER SEARCH ADDRESS" value="135 FLOSSIE DRIVE MADISON HEIGHTS VA">
<button class="controlBtn" onclick="searchAddress()">GO</button>
</div>

<div id="map"></div>

<div class="legend">
<div class="legendItem"><div class="dot" style="background:#1d7dff"></div>LAW ENFORCEMENT</div>
<div class="legendItem"><div class="dot" style="background:#66d9ff"></div>K9</div>
<div class="legendItem"><div class="dot" style="background:#ff3030"></div>SAR</div>
<div class="legendItem"><div class="dot" style="background:#28d96f"></div>CIVILIAN</div>
<div class="legendItem"><div class="dot" style="background:#bf66ff"></div>PERSON OF INTEREST</div>
<div class="legendItem"><div class="dot" style="background:#ff9933"></div>FOUND PROPERTY</div>
</div>

<div class="bottomPanel">
<button class="actionBtn" onclick="addUnit('leo')">ADD LEO</button>
<button class="actionBtn" onclick="addUnit('k9')">ADD K9</button>
<button class="actionBtn" onclick="addUnit('sar')">ADD SAR</button>
<button class="actionBtn" onclick="addUnit('civilian')">ADD CIVILIAN</button>
<button class="actionBtn goldBtn" onclick="dropEvidence()">FOUND PROPERTY</button>
<button class="actionBtn redBtn" onclick="officerSOS()">OFFICER SOS</button>
<button class="actionBtn" onclick="generateReport()">GENERATE PDF</button>
<button class="actionBtn redBtn" onclick="terminateSearch()">TERMINATE SEARCH</button>
</div>

<div class="notesPanel">
<textarea id="notes" placeholder="SEARCH NOTES / DISPOSITION"></textarea>
</div>

<div class="footer">
APP CREATOR DEPUTY SHERIFF EARL A. WOOD RETIRED VA
</div>

</div>

<script>
let map;
let perimeter;
let units=[];
let reportLog=[];
let currentLayer;

// Fallback Operational Center Target Matrix (Madison Heights, VA)
let operationalLat = 37.4338;
let operationalLng = -79.1114;

// FIXED: Scrambled tile directory corrected from {z}/{x}/{y} to standard map rendering alignment {z}/{y}/{x}
const layers={
street:L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{y}/{x}.png', { maxZoom: 20 }),
sat:L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 20 }),
terrain:L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{y}/{x}.png', { maxZoom: 17 })
};

function enterTacnet(){
document.getElementById('landingPage').style.display='none';
document.getElementById('appPage').style.display='flex';
initMap();
}

function initMap(){
// Initialize right over primary incident command base location
map=L.map('map', {zoomControl: true, attributionControl: false}).setView([operationalLat, operationalLng], 15);

currentLayer=layers.sat;
currentLayer.addTo(map);

perimeter=L.circle([operationalLat, operationalLng],{
color:'#00ff66',
fillColor:'#00ff66',
fillOpacity:.10,
radius:800
}).addTo(map);

// System internal GPS routing setup
if(navigator.geolocation){
navigator.geolocation.watchPosition((position)=>{
operationalLat=position.coords.latitude;
operationalLng=position.coords.longitude;

if(window.userMarker){
window.userMarker.setLatLng([operationalLat, operationalLng]);
}else{
window.userMarker=L.circleMarker([operationalLat, operationalLng],{
radius:10,
color:'#ffffff',
fillColor:'#1d7dff',
fillOpacity:1,
weight:3
}).addTo(map).bindPopup('<b>LIVE OFFICER GPS</b>');
}
},{enableHighAccuracy:true});
}

L.control.layers({
'Satellite Layer':layers.sat,
'Street Map':layers.street,
'Terrain View':layers.terrain
}, null, {position: 'topright'}).addTo(map);

// Invalidate viewport instantly to solve mobile layout cutoffs
setTimeout(()=>{ map.invalidateSize(); }, 300);

reportLog.push('TACTICAL SEARCH STARTED AT BASE OPERATIONAL COORDINATES');
}

function joinAgency(){
const code=document.getElementById('agencyCode').value.trim();
const validCodes=['TACNET2026','STATE01','FEDERAL01','AMHERST911'];

if(!validCodes.includes(code)){
alert('ACCESS DENIED: INVALID COMMUNICATIONS TOKEN');
return;
}
alert('OUTSIDE AGENCY CONNECTED TO TACNET COMMUNICATIONS GRID');
reportLog.push('OUTSIDE AGENCY JOINED: '+code);
}

async function searchAddress(){
const address=document.getElementById('addressInput').value;
if(address==='') return;

try {
const response=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
const data=await response.json();

if(data.length===0){
alert('ADDRESS COORDINATES NOT FOUND VIA SATELLITE');
return;
}

operationalLat=parseFloat(data[0].lat);
operationalLng=parseFloat(data[0].lon);

map.setView([operationalLat, operationalLng],16);

if(perimeter){ map.removeLayer(perimeter); }

perimeter=L.circle([operationalLat, operationalLng],{
color:'#00ff66',
fillColor:'#00ff66',
fillOpacity:.10,
radius:800
}).addTo(map);

document.getElementById('notes').placeholder = "SEARCH ACTIVE IN SECTOR: " + address.toUpperCase();
reportLog.push('SEARCH LOCATION RESET TARGET: '+address);
map.invalidateSize();

} catch (e) {
alert('COMMUNICATIONS LINK TIMEOUT DURING GEO-LOOKUP');
}
}

// FIXED: Grounded deployment array locks markers right inside the operational cordon ring instead of stray screen picks
function addUnit(type){
const colors={
leo:'#1d7dff',
k9:'#66d9ff',
sar:'#ff3030',
civilian:'#28d96f'
};

// Apply a clean close-quarters tactical offset around the active operations target center
const placementLat = operationalLat + (Math.random() * .003 - .0015);
const placementLng = operationalLng + (Math.random() * .003 - .0015);

const marker=L.circleMarker([placementLat, placementLng],{
radius:9,
color:'#fff',
fillColor:colors[type],
fillOpacity:1,
weight:2
}).addTo(map).bindPopup(`<b>${type.toUpperCase()} UNIT</b><br>Status: Active Search`);

units.push(marker);
reportLog.push(type.toUpperCase()+' UNIT DEPLOYED TO INCIDENT PERIMETER');
}

function dropEvidence(){
const placementLat = operationalLat + (Math.random() * .001 - .0005);
const placementLng = operationalLng + (Math.random() * .001 - .0005);

const marker=L.marker([placementLat, placementLng]).addTo(map)
.bindPopup('<b>[!] CRITICAL EVIDENCE FLAG</b><br>Found Property Logged');

reportLog.push('FOUND PROPERTY FLAGGED IN TARGET SECTOR');
}

function officerSOS(){
alert('⚠️ CRITICAL: OFFICER SOS INTERCEPT ACTIVATED. RESPONDING UNITS ROUTING.');
reportLog.push('ALERT: OFFICER SOS ACTIVATED AT ACTIVE GRID');
}

function terminateSearch(){
alert('TACTICAL ALERT: SEARCH TERMINATED BY INCIDENT COMMAND');
reportLog.push('SEARCH TERMINATED AND SECURED');
}

function generateReport(){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();
const notes=document.getElementById('notes').value;

let y=20;
doc.setFontSize(18);
doc.text('TACNET COMMAND SEARCH OPERATIONS REPORT',20,y);
y+=15;

doc.setFontSize(11);
reportLog.forEach((line)=>{
if(y > 270) { doc.addPage(); y = 20; }
doc.text('- '+line,20,y);
y+=8;
});

if(notes.trim() !== "") {
y+=10;
if(y > 250) { doc.addPage(); y = 20; }
doc.text('INCIDENT NOTES / REPORT DISPOSITION:',20,y);
y+=10;
const split=doc.splitTextToSize(notes,170);
doc.text(split,20,y);
}

doc.save('TACNET_OPERATIONS_REPORT.pdf');
}
</script>
</body>
</html>
