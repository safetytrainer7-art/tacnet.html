<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TACNET CORE</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:Arial,Helvetica,sans-serif;
background:#000;
color:#fff;
}

/* TRUE NIGHT VISION */

body{

background:
radial-gradient(circle at center,
rgba(0,255,80,.16) 0%,
rgba(0,40,0,.92) 45%,
#000 100%);

}

body::before{
content:"";
position:fixed;
inset:0;

background:
repeating-linear-gradient(
to bottom,
rgba(57,255,20,.035) 0px,
rgba(57,255,20,.035) 1px,
transparent 2px,
transparent 4px
);

pointer-events:none;
z-index:9999;
}

body::after{
content:"";
position:fixed;
inset:0;

background:
radial-gradient(circle at center,
rgba(57,255,20,.18),
transparent 70%);

mix-blend-mode:screen;

animation:pulse 3s infinite;

pointer-events:none;
z-index:9998;
}

@keyframes pulse{
0%{opacity:.45;}
50%{opacity:1;}
100%{opacity:.45;}
}

header{
height:115px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

background:rgba(0,0,0,.72);

border-bottom:2px solid #39ff14;

box-shadow:
0 0 12px #39ff14,
0 0 30px rgba(57,255,20,.45);
}

.logo{
font-size:4rem;
font-weight:900;
letter-spacing:4px;

color:#d4af37;

text-shadow:
0 0 10px #fff,
0 0 20px #d4af37,
0 0 40px #39ff14,
0 0 70px #39ff14;
}

.subtitle{
margin-top:4px;
font-size:1rem;
font-weight:bold;
color:#ffe95c;
}

.tagline{
margin-top:4px;
font-size:.9rem;
letter-spacing:2px;
color:#9cd4ff;
}

.main{
display:grid;
grid-template-columns:1.45fr .8fr;
height:calc(100vh - 115px);
}

.mapwrap{
position:relative;
padding:10px;
}

#map{
width:100%;
height:100%;
border-radius:20px;
border:2px solid #39ff14;

box-shadow:
0 0 15px rgba(57,255,20,.6),
0 0 40px rgba(57,255,20,.25),
inset 0 0 35px rgba(57,255,20,.18);

filter:
brightness(.88)
contrast(1.2)
saturate(1.25);
}

.topstatus{
position:absolute;
top:22px;
left:22px;
display:flex;
gap:10px;
z-index:999;
}

.pill{
padding:10px 15px;
border-radius:12px;

background:rgba(0,0,0,.72);

border:1px solid #39ff14;

color:#39ff14;

font-weight:700;

box-shadow:
0 0 10px rgba(57,255,20,.45);
}

.side{
overflow-y:auto;
padding:12px;

background:rgba(0,0,0,.55);

border-left:1px solid #d4af37;

backdrop-filter:blur(10px);
}

.card{
margin-bottom:12px;
padding:15px;
border-radius:18px;

background:rgba(20,70,20,.18);

border:1px solid rgba(57,255,20,.7);

backdrop-filter:blur(12px);

box-shadow:
0 0 10px rgba(57,255,20,.4),
0 0 25px rgba(57,255,20,.18);
}

.card h2{
margin-bottom:12px;
font-size:1rem;
letter-spacing:1px;
color:#ffe95c;
}

input,
textarea,
select{
width:100%;
padding:13px;
margin-bottom:10px;

background:rgba(0,0,0,.82);

border:1px solid #39ff14;

border-radius:12px;

color:#fff;

font-size:1rem;
}

button{
width:100%;
padding:14px;

border:none;

border-radius:12px;

font-weight:800;

cursor:pointer;

margin-bottom:10px;

font-size:1rem;

transition:.2s;
}

button:hover{
transform:scale(1.02);
}

.green{
background:#39ff14;
color:#000;

box-shadow:
0 0 18px #39ff14;
}

.red{
background:#9a0000;
color:#fff;

box-shadow:
0 0 18px rgba(255,0,0,.55);
}

.actiongrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.action{
background:#0f180f;
color:#39ff14;
border:1px solid #39ff14;
}

.feed{
height:170px;
overflow-y:auto;
font-family:monospace;
font-size:.88rem;
}

.feed div{
padding:7px 0;
border-bottom:1px solid rgba(57,255,20,.18);
}

.footer{
text-align:center;
padding-top:10px;
font-size:.9rem;
color:#d4af37;
}

@media(max-width:900px){

.main{
grid-template-columns:1fr;
grid-template-rows:55vh auto;
}

.logo{
font-size:2.7rem;
}

header{
height:100px;
}

}

</style>
</head>

<body>

<header>

<div class="logo">TACNET</div>

<div class="subtitle">
MULTI-AGENCY TASK FORCE SEARCH APP
</div>

<div class="tagline">
FEDERAL • STATE • LOCAL
</div>

</header>

<div class="main">

<div class="mapwrap">

<div class="topstatus">

<div class="pill">
NET ACTIVE
</div>

<div class="pill" id="gpsstatus">
GPS READY
</div>

</div>

<div id="map"></div>

</div>

<div class="side">

<div class="card">

<h2>OS / AGENCY TOKEN ACCESS</h2>

<input type="password" id="token" placeholder="ENTER OPERATION TOKEN">

<button class="green" onclick="joinAgency()">
JOIN SECURE OPS ROOM
</button>

</div>

<div class="card">

<h2>ADDRESS SEARCH</h2>

<input type="text" id="address" placeholder="ENTER ADDRESS">

<button class="green" onclick="searchAddress()">
GO
</button>

</div>

<div class="card">

<h2>TACTICAL TOOLS</h2>

<div class="actiongrid">

<button class="action" onclick="startPerimeter()">
START PERIMETER
</button>

<button class="action" onclick="lockPerimeter()">
LOCK PERIMETER
</button>

<button class="action" onclick="resetPerimeter()">
RESET PERIMETER
</button>

<button class="action" onclick="markEvidence()">
EVIDENCE
</button>

<button class="action" onclick="markOfficer()">
UNIT
</button>

<button class="action" onclick="dropLKP()">
LKP
</button>

<button class="red" onclick="sendSOS()">
🚨 OFFICER DOWN SOS
</button>

</div>

</div>

<div class="card">

<h2>FIELD REPORT</h2>

<textarea id="notes" rows="7" placeholder="ENTER FIELD NOTES"></textarea>

<button class="green" onclick="generateReport()">
GENERATE REPORT
</button>

</div>

<div class="card">

<h2>NET ACTIVITY FEED</h2>

<div class="feed" id="feed"></div>

</div>

<div class="footer">

APP CREATOR EARL A. WOOD<br>
DEPUTY SHERIFF RETIRED

</div>

</div>

</div>

<script>

const map = L.map('map',{
doubleClickZoom:false
}).setView([37.3349,-79.5236],13);

setTimeout(()=>{
map.invalidateSize();
},500);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

/* GPS */

let officerMarker;

navigator.geolocation.watchPosition((pos)=>{

const lat = pos.coords.latitude;
const lng = pos.coords.longitude;

if(officerMarker){
map.removeLayer(officerMarker);
}

officerMarker = L.circleMarker([lat,lng],{

radius:10,
color:'#00aaff',
fillColor:'#00aaff',
fillOpacity:1

}).addTo(map)

.bindPopup('ACTIVE UNIT');

map.setView([lat,lng],15);

document.getElementById('gpsstatus').innerText =
'LIVE GPS ACTIVE';

},()=>{

document.getElementById('gpsstatus').innerText =
'GPS ERROR';

});

/* FEED */

function addFeed(text){

const feed =
document.getElementById('feed');

const div =
document.createElement('div');

div.innerHTML =
new Date().toLocaleTimeString()
+ ' — ' + text;

feed.prepend(div);

}

/* ADDRESS SEARCH */

async function searchAddress(){

const query =
document.getElementById('address').value;

if(!query){
alert('ENTER ADDRESS');
return;
}

const response = await fetch(
'https://nominatim.openstreetmap.org/search?format=json&q='
+ encodeURIComponent(query)
);

const data = await response.json();

if(data.length){

const lat =
parseFloat(data[0].lat);

const lng =
parseFloat(data[0].lon);

map.setView([lat,lng],16);

L.marker([lat,lng])
.addTo(map)
.bindPopup('SEARCH LOCATION')
.openPopup();

addFeed('ADDRESS SEARCH COMPLETE');

}else{

alert('ADDRESS NOT FOUND');

}

}

/* TOKEN */

function joinAgency(){

const token =
document.getElementById('token').value;

if(token.length < 4){

alert('INVALID TOKEN');

return;

}

addFeed('SECURE OPS JOINED');

alert('TOKEN ACCEPTED');

}

/* PERIMETER */

let perimeterMode = false;
let perimeterLocked = false;

let perimeterPoints = [];

let perimeterPolygon = null;

function startPerimeter(){

perimeterMode = true;
perimeterLocked = false;

perimeterPoints = [];

if(perimeterPolygon){
map.removeLayer(perimeterPolygon);
}

addFeed('PERIMETER MODE ACTIVE');

}

function lockPerimeter(){

if(perimeterPoints.length < 3){

alert('NEED 3 OR MORE POINTS');

return;

}

perimeterLocked = true;
perimeterMode = false;

addFeed('PERIMETER LOCKED');

}

function resetPerimeter(){

perimeterMode = false;
perimeterLocked = false;

perimeterPoints = [];

if(perimeterPolygon){
map.removeLayer(perimeterPolygon);
}

addFeed('PERIMETER RESET');

}

map.on('click',(e)=>{

if(!perimeterMode) return;

if(perimeterLocked) return;

perimeterPoints.push([
e.latlng.lat,
e.latlng.lng
]);

L.circleMarker(e.latlng,{
radius:5,
color:'#39ff14'
}).addTo(map);

if(perimeterPolygon){
map.removeLayer(perimeterPolygon);
}

perimeterPolygon = L.polygon(
perimeterPoints,
{
color:'#39ff14',
fillColor:'#39ff14',
fillOpacity:.18,
weight:2
}
).addTo(map);

});

/* SOS FIXED */

function sendSOS(){

navigator.geolocation.getCurrentPosition((pos)=>{

const lat = pos.coords.latitude;
const lng = pos.coords.longitude;

L.circle([lat,lng],{

radius:90,
color:'#ff0000',
fillColor:'#ff0000',
fillOpacity:.35,
weight:3

}).addTo(map);

L.marker([lat,lng])
.addTo(map)
.bindPopup('🚨 OFFICER DOWN SOS')
.openPopup();

map.setView([lat,lng],17);

addFeed('🚨 OFFICER DOWN SOS ACTIVATED');

alert('SOS TRANSMITTED');

},()=>{

alert('GPS UNAVAILABLE');

});

}

/* MARKERS */

function markEvidence(){

map.once('click',(e)=>{

L.circleMarker(e.latlng,{

radius:8,
color:'#ffd700',
fillColor:'#ffd700',
fillOpacity:1

}).addTo(map)

.bindPopup('EVIDENCE');

addFeed('EVIDENCE MARKED');

});

}

function markOfficer(){

map.once('click',(e)=>{

L.circleMarker(e.latlng,{

radius:8,
color:'#00aaff',
fillColor:'#00aaff',
fillOpacity:1

}).addTo(map)

.bindPopup('FIELD UNIT');

addFeed('UNIT DEPLOYED');

});

}

function dropLKP(){

map.once('click',(e)=>{

L.marker(e.latlng)
.addTo(map)
.bindPopup('LAST KNOWN POSITION');

addFeed('LKP DROPPED');

});

}

/* REPORT */

function generateReport(){

const notes =
document.getElementById('notes').value;

const win =
window.open('','_blank');

win.document.write(`

<html>

<head>

<title>TACNET REPORT</title>

<style>

body{
font-family:Arial;
padding:40px;
}

h1{
color:#1b5e20;
}

.report{
border:2px solid #000;
padding:20px;
margin-top:20px;
}

</style>

</head>

<body>

<h1>TACNET FIELD REPORT</h1>

<div class="report">

<p><b>DATE:</b>
${new Date().toLocaleString()}</p>

<hr>

<p>${notes}</p>

</div>

<br><br>

<p>
APP CREATOR EARL A. WOOD
</p>

</body>

</html>

`);

win.print();

addFeed('PROFESSIONAL REPORT GENERATED');

}

addFeed('TACNET CORE INITIALIZED');

</script>

</body>
</html>
