<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TACNET CORE</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
    margin:0;
    background:#102414;
    color:white;
    font-family:Arial,sans-serif;
}

.header{
    background:#132d18;
    padding:15px;
    text-align:center;
    border-bottom:2px solid #2cff88;
}

.header h1{
    margin:0;
    color:#ffd700;
    font-size:36px;
    letter-spacing:4px;
}

.header p{
    margin-top:8px;
    font-size:16px;
}

.controls{
    padding:10px;
    background:#18361f;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:10px;
    border:none;
    border-radius:8px;
    font-size:18px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    margin-bottom:10px;
    border:none;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;
}

.searchBtn{
    background:#2cff88;
    color:black;
}

.perimeterBtn{
    background:#0077ff;
    color:white;
}

.sosBtn{
    background:red;
    color:white;
}

#map{
    width:100%;
    height:70vh;
}

.legend{
    padding:10px;
    background:#18361f;
    line-height:2;
    font-size:17px;
}

.dot{
    display:inline-block;
    width:15px;
    height:15px;
    border-radius:50%;
    margin-right:8px;
}

.blue{background:blue;}
.lightblue{background:#66ccff;}
.red{background:red;}
.green{background:#00ff88;}
.purple{background:purple;}

.status{
    text-align:center;
    padding:10px;
    background:#132d18;
    font-size:16px;
}

</style>
</head>

<body>

<div class="header">
    <h1>TACNET</h1>
    <p>CORE SYSTEM ONLINE</p>
</div>

<div class="controls">

<input
type="text"
id="address"
placeholder="Enter Address">

<button
class="searchBtn"
onclick="searchLocation()">
SEARCH LOCATION
</button>

<button
class="perimeterBtn"
onclick="drawPerimeter()">
CREATE PERIMETER
</button>

<button
class="sosBtn"
onclick="sosAlert()">
SOS OFFICER DOWN
</button>

</div>

<div id="map"></div>

<div class="legend">

<div><span class="dot blue"></span>Law Enforcement</div>

<div><span class="dot lightblue"></span>K9 Units</div>

<div><span class="dot red"></span>Search & Rescue</div>

<div><span class="dot green"></span>Civilians</div>

<div><span class="dot purple"></span>Person of Interest</div>

</div>

<div class="status" id="status">
Initializing GPS...
</div>

<script>

let map;
let userMarker;
let perimeterCircle;

function initMap(){

    map = L.map('map').setView([37.4138,-79.1422],13);

    L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        attribution:'OpenStreetMap'
    }).addTo(map);

    if(navigator.geolocation){

        navigator.geolocation.getCurrentPosition(

        function(position){

            let lat = position.coords.latitude;
            let lon = position.coords.longitude;

            map.setView([lat,lon],15);

            userMarker = L.marker([lat,lon])
            .addTo(map)
            .bindPopup("YOUR LOCATION")
            .openPopup();

            addPersonnelMarkers();

            document.getElementById("status").innerHTML =
            "GPS CONNECTED";

        },

        function(){

            document.getElementById("status").innerHTML =
            "GPS FAILED";

        });

    }else{

        document.getElementById("status").innerHTML =
        "GPS NOT SUPPORTED";

    }

}

function drawPerimeter(){

    if(!userMarker){
        alert("GPS not available");
        return;
    }

    let pos = userMarker.getLatLng();

    if(perimeterCircle){
        map.removeLayer(perimeterCircle);
    }

    perimeterCircle = L.circle(pos,{
        radius:1609,
        color:'red',
        fillColor:'#f03',
        fillOpacity:0.2
    }).addTo(map);

    map.fitBounds(perimeterCircle.getBounds());

}

function sosAlert(){

    alert("SOS ALERT ACTIVATED");

}

function searchLocation(){

    let address =
    document.getElementById("address").value;

    if(address.length < 3){
        alert("Enter address");
        return;
    }

    fetch(
    'https://nominatim.openstreetmap.org/search?format=json&q='
    + encodeURIComponent(address))

    .then(response => response.json())

    .then(data => {

        if(data.length > 0){

            let lat = data[0].lat;
            let lon = data[0].lon;

            map.setView([lat,lon],15);

            L.marker([lat,lon])
            .addTo(map)
            .bindPopup(address)
            .openPopup();

        }else{

            alert("Address not found");

        }

    });

}

function addPersonnelMarkers(){

    const personnel = [

    {
        type:"LAW",
        lat:37.4138,
        lon:-79.1422,
        color:"blue"
    },

    {
        type:"K9",
        lat:37.4238,
        lon:-79.1522,
        color:"#66ccff"
    },

    {
        type:"SAR",
        lat:37.4038,
        lon:-79.1322,
        color:"red"
    },

    {
        type:"CIVILIAN",
        lat:37.4188,
        lon:-79.1222,
        color:"#00ff88"
    },

    {
        type:"POI",
        lat:37.4288,
        lon:-79.1622,
        color:"purple"
    }

    ];

    personnel.forEach(unit => {

        L.circleMarker(
        [unit.lat,unit.lon],
        {
            radius:10,
            color:unit.color,
            fillColor:unit.color,
            fillOpacity:0.9
        })

        .addTo(map)

        .bindPopup(unit.type);

    });

}

initMap();

</script>

</body>
</html>
