<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TACNET Tactical Recon</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        :root {
            --green: #00ff33;
            --gold: #ffcc00;
            --blue: #0088ff;
            --red: #ff2222;
        }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
            font-family: Arial, Helvetica, sans-serif; color: #fff;
        }

        /* IOS RED NIGHT VISION SYSTEM OVERLAYS */
        body::before {
            content: ''; position: fixed; inset: 0;
            background: repeating-linear-gradient(
                to bottom,
                rgba(255, 0, 0, .04),
                rgba(255, 0, 0, .04) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none; z-index: 99999;
        }

        body::after {
            content: ''; position: fixed; inset: 0;
            box-shadow: inset 0 0 200px rgba(255, 0, 0, .45), inset 0 0 100px rgba(255, 0, 0, .35);
            pointer-events: none; z-index: 99998;
        }

        /* LANDING PAGE SPLASH CONTROLLER */
        #landingPage {
            position: absolute; inset: 0; background: #000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 5000;
        }

        #landingImage {
            width: 100%; max-width: 420px; height: auto;
            object-fit: contain; box-shadow: 0 0 40px rgba(255, 0, 0, .45);
        }

        .enter-btn {
            margin-top: 20px; width: 280px; padding: 18px; border: none;
            background: #00ff33; color: #000; font-size: 1.2rem;
            font-weight: 900; letter-spacing: 3px; border-radius: 8px;
            cursor: pointer; box-shadow: 0 0 20px #00ff33, 0 0 35px rgba(255, 0, 0, .7);
        }

        .enter-btn:active { transform: scale(.96); }

        /* MAIN APP CONSOLE FRAME */
        #appPage {
            display: none; width: 100%; height: 100%; flex-direction: column;
        }

        /* COMMAND BAR HEADER */
        .top-header {
            height: 78px;
            background: linear-gradient(to bottom, #3f3a15, #151200);
            border-bottom: 3px solid var(--gold);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 12px; box-shadow: 0 0 18px rgba(255, 0, 0, .55);
        }

        .agency-logo { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; }
        .badge-star { width: 58px; height: 58px; object-fit: contain; }
        .center-branding { text-align: center; flex: 1; }
        
        .header-title {
            margin: 0; color: var(--gold); font-size: 2rem;
            letter-spacing: 5px; font-weight: 900;
            text-shadow: 0 0 15px rgba(255, 0, 0, .8);
        }

        .header-sub { margin: 0; font-size: .7rem; letter-spacing: 2px; }

        /* TECHNICAL OPERATIONAL VIEWPORT */
        .console-container {
            padding: 10px; height: calc(100vh - 120px);
            overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
        }

        /* SYSTEM TELEMETRY ADDRESS INPUT BAR */
        .address-bar-frame {
            display: flex; border: 2px solid var(--green); border-radius: 5px;
            overflow: hidden; background: #000; box-shadow: 0 0 14px rgba(255, 0, 0, .7);
        }

        .tactical-ai {
            width: 95px;
            background: linear-gradient(to bottom, #ff4444, #550000);
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; letter-spacing: 1px; box-shadow: 0 0 15px rgba(255, 0, 0, .8);
        }

        .address-input-field {
            flex: 1; background: #000; border: none; color: #fff;
            padding: 14px; font-size: 1rem; outline: none;
        }

        .go-btn {
            width: 90px; border: none; background: var(--green); color: #000;
            font-weight: 900; font-size: 1rem; cursor: pointer; letter-spacing: 2px;
            box-shadow: 0 0 12px var(--green), 0 0 25px rgba(255, 0, 0, .7);
        }

        /* RECON SCREEN MATRIX BOX */
        .radar-screen-container {
            position: relative; height: 340px; border: 3px solid #444;
            border-radius: 6px; overflow: hidden;
            box-shadow: inset 0 0 25px rgba(255, 0, 0, .5), 0 0 15px rgba(255, 0, 0, .5);
        }

        #map { width: 100%; height: 100%; background: #000; }

        .night-vision-glow {
            position: absolute; inset: 0;
            background: radial-gradient(circle, rgba(255, 0, 0, .18), rgba(0, 0, 0, .20));
            pointer-events: none; z-index: 500;
        }

        /* RECON BLIP GRAPHICS DESIGN */
        .k9-custom-blip {
            border: 2px solid var(--green); border-radius: 50%;
            box-shadow: 0 0 10px var(--green), 0 0 8px rgba(255,0,0,0.8);
            object-fit: cover; background-color: #000000;
        }

        .vsp-custom-blip {
            border: 2px solid var(--blue); border-radius: 50%;
            box-shadow: 0 0 10px var(--blue), 0 0 8px rgba(255,0,0,0.8);
            object-fit: cover; background-color: #000000;
        }

        /* LAYER HUD CONTROL TOGGLES */
        .map-layer-controls {
            position: absolute; top: 10px; right: 10px;
            display: flex; flex-direction: column; gap: 6px; z-index: 1000;
        }

        .layer-btn {
            background: #000; color: var(--green); border: 2px solid var(--green);
            padding: 9px 12px; font-weight: bold; border-radius: 4px; cursor: pointer;
            text-transform: uppercase; font-size: 0.75rem;
        }

        .layer-btn.active { background: var(--green); color: #000; }

        /* TELEMETRY FEED OUTS */
        .data-log-panel { border-top: 1px dashed var(--gold); padding-top: 8px; }
        .log-status-header { color: var(--gold); font-weight: bold; }
        .log-body-text { font-family: monospace; font-size: .9rem; line-height: 1.5; }

        /* TACTICAL EMERGENCY CALL MATRIX */
        .bottom-action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        
        .action-grid-btn {
            padding: 13px; background: #000; border-radius: 5px;
            text-align: center; font-weight: bold; cursor: pointer; text-transform: uppercase;
        }

        .btn-pink { border: 2px solid #ff3366; color: #ff3366; }
        .btn-red { border: 2px solid #ff3333; color: #ff3333; }
        .btn-orange { border: 2px solid #ff8800; color: #ff8800; }
        .btn-teal { border: 2px solid #00cccc; color: #00cccc; }
        .btn-gold { border: 2px solid var(--gold); color: var(--gold); }
        .btn-blue { border: 2px solid var(--blue); color: var(--blue); }

        .btn-stop-audio {
            grid-column: span 2; border: 2px solid #ff3333; background: #220000;
            color: #ff9999; padding: 14px; text-align: center; border-radius: 5px;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
        }

        /* FIXED ASSIGNED RECOGNITION CREATOR RUN FOOTER */
        .fixed-creator-footer {
            height: 42px; background: #050505; border-top: 2px solid #222;
            display: flex; align-items: center; justify-content: center;
        }

        .creator-text { color: #ff7777; font-size: .8rem; letter-spacing: 2px; font-weight: bold; }
    </style>
</head>

<body>

    <div id="landingPage">
        <img src="FDD.png" id="landingImage" onerror="this.style.borderColor='red'">
        <button class="enter-btn" onclick="enterTacnet()">ENTER TACNET</button>
    </div>

    <div id="appPage">
        <div class="top-header">
            <img class="badge-star" src="amherst_badge.png.jpg">
            <div class="center-branding">
                <h1 class="header-title">TACNET</h1>
                <p class="header-sub">NEXTLINE MULTI-AGENCY TACTICAL TASK FORCE</p>
            </div>
            <div style="display:flex;gap:10px;">
                <img class="agency-logo" src="gshep_2.jpg">
                <img class="agency-logo" src="va.png-modified.jpg">
            </div>
        </div>

        <div class="console-container">
            <div class="address-bar-frame">
                <div class="tactical-ai">⚡ TAC-AI</div>
                <input type="text" class="address-input-field" placeholder="ENTER TARGET ADDRESS" id="target-address-input">
                <button class="go-btn" onclick="searchAddress()">GO</button>
            </div>

            <div class="radar-screen-container">
                <div id="map"></div>
                <div class="night-vision-glow"></div>
                <div class="map-layer-controls">
                    <button class="layer-btn active" id="btn-sat" onclick="switchMapLayer('sat')">Satellite</button>
                    <button class="layer-btn" id="btn-street" onclick="switchMapLayer('street')">Street</button>
                    <button class="layer-btn" id="btn-terrain" onclick="switchMapLayer('terrain')">Terrain</button>
                </div>
            </div>

            <div class="data-log-panel">
                <div class="log-status-header">📍 PERIMETER STATUS</div>
                <div class="log-body-text">
                    Target Sector: <span id="log-target-address">Awaiting Address...</span>
                </div>
            </div>

            <div class="bottom-action-grid">
                <div class="action-grid-btn btn-pink" onclick="speakMedicalProtocol('cpr')">🐾 K9 CPR</div>
                <div class="action-grid-btn btn-red" onclick="speakMedicalProtocol('gunshot')">💥 GUNSHOT</div>
                <div class="action-grid-btn btn-orange" onclick="speakMedicalProtocol('heatstroke')">☀️ HEAT STROKE</div>
                <div class="action-grid-btn btn-teal" onclick="speakMedicalProtocol('snakebite')">🐍 SNAKE BITE</div>
                <div class="action-grid-btn btn-gold" onclick="speakMedicalProtocol('vet')">🏥 EMERGENCY VET</div>
                <div class="action-grid-btn btn-blue" onclick="speakMedicalProtocol('rally')">🐕 RALLY</div>
                <div class="btn-stop-audio" onclick="killVoiceTransmission()">🛑 STOP TRANSMISSION</div>
            </div>
        </div>

        <div class="fixed-creator-footer">
            <p class="creator-text">APP CREATOR DEPUTY SHERIFF EARL A. WOOD RETIRED VA</p>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        function enterTacnet(){
            document.getElementById('landingPage').style.display='none';
            document.getElementById('appPage').style.display='flex';
            setTimeout(()=>{
                map.invalidateSize();
            },400);
        }

        var synth = window.speechSynthesis;
        var map;
        var activeLayer;
        var searchCircle;
        var k9Marker, vspMarker1, vspMarker2;

        // Baseline Operational Coordinates
        var defaultLat = 37.4338;
        var defaultLng = -79.1114;

        // FIXED CHANNELS: URL structures flipped from {z}/{x}/{y} to accurate {z}/{y}/{x} parameters
        var layers = {
            sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 20
            }),
            street: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{y}/{x}.png', {
                maxZoom: 20
            }),
            terrain: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{y}/{x}.png', {
                maxZoom: 17
            })
        };

        function initMap(){
            map = L.map('map',{
                center:[defaultLat, defaultLng],
                zoom:15,
                zoomControl:false,
                attributionControl:false
            });

            activeLayer = layers.sat;
            activeLayer.addTo(map);

            searchCircle = L.circle([defaultLat, defaultLng], {
                color:'#00ff33',
                fillColor:'#00ff33',
                fillOpacity:.10,
                radius:804
            }).addTo(map);

            // CUSTOM FIELD BLIP DESIGN LAYOUTS
            var k9Icon = L.divIcon({
                className: 'custom-div-icon',
                html: '<img class="k9-custom-blip" src="gshep_2.jpg" width="34" height="34">',
                iconSize: [34, 34],
                iconAnchor: [17, 17]
            });

            var vspIcon = L.divIcon({
                className: 'custom-div-icon',
                html: '<img class="vsp-custom-blip" src="va.png-modified.jpg" width="30" height="30">',
                iconSize: [30, 30],
                iconAnchor: [15, 15]
            });

            // FIXED CHANNELS: Standardized tracking assets mounted directly into primary initialization sequence
            k9Marker = L.marker([defaultLat, defaultLng], {icon: k9Icon}).addTo(map).bindPopup("<b>WOOD-K91 (LEAD)</b>").openPopup();
            vspMarker1 = L.marker([37.438, -79.117], {icon: vspIcon}).addTo(map).bindPopup("<b>VSP PERIMETER UNIT</b>"); 
            vspMarker2 = L.marker([37.430, -79.106], {icon: vspIcon}).addTo(map).bindPopup("<b>SUPPORT CO-1</b>"); 

            setTimeout(()=>{
                map.invalidateSize();
            },300);
        }

        function switchMapLayer(type){
            map.removeLayer(activeLayer);
            activeLayer = layers[type];
            activeLayer.addTo(map);

            document.querySelectorAll('.layer-btn').forEach(btn=>{
                btn.classList.remove('active');
            });
            document.getElementById('btn-'+type).classList.add('active');
            map.invalidateSize();
        }

        async function searchAddress(){
            const address = document.getElementById('target-address-input').value;
            if(address.trim()===''){
                alert('ENTER TARGET ADDRESS');
                return;
            }

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
                const data = await response.json();

                if(data.length===0){
                    alert('ADDRESS NOT FOUND');
                    return;
                }

                const lat = parseFloat(data[0].lat);
                const lon = parseFloat(data[0].lon);

                map.setView([lat,lon],16);

                if(searchCircle){ map.removeLayer(searchCircle); }

                searchCircle = L.circle([lat,lon], {
                    color:'#00ff33',
                    fillColor:'#00ff33',
                    fillOpacity:.10,
                    radius:804
                }).addTo(map);

                // Update active tracking units to lock layout focus on new search epicenter
                k9Marker.setLatLng([lat, lon]);
                vspMarker1.setLatLng([lat + 0.0042, lon - 0.0056]);
                vspMarker2.setLatLng([lat - 0.0038, lon + 0.0054]);

                document.getElementById('log-target-address').innerText = address.toUpperCase();
                map.invalidateSize();

            } catch(err) {
                alert('MAP SEARCH ERROR');
                console.log(err);
            }
        }

        function killVoiceTransmission(){
            if(synth) { synth.cancel(); }
        }

        // FIXED CHANNELS: Full tactical instruction sets re-fused directly into hardware transmission pipeline
        function speakMedicalProtocol(type){
            if(!synth) return;
            synth.cancel();
            let msg='';

            if(type==='cpr'){
                msg='Executing K9 CPR instructions. Lay the dog on a firm surface on its right side. Verify airway is completely clear. Deliver thirty chest compressions just behind the elbow, then extend the neck and deliver two rescue breaths directly into the nostrils. Repeat cycle.';
            }
            if(type==='gunshot'){
                msg='Executing K9 Gunshot trauma response. Immediately pack the entry site tightly using hemostatic gauze from your tactical medical bag. Apply heavy, steady, manual direct pressure without stopping for a minimum of three minutes. Do not remove gauze if it saturates; layer more over top.';
            }
            if(type==='heatstroke'){
                msg='Executing K9 Heat Stroke protocol. Cease tracking and field operations immediately. Relocate canine to shaded terrain or air-conditioned fleet transport. Apply room-temperature running water over the stomach, inner thighs, and paw pads. Direct ambient air conditioning toward the body.';
            }
            if(type==='snakebite'){
                msg='Executing K9 Snake Bite procedure. Restrain canine and minimize all physical exertion to restrict systemic spread of venom. Keep the bite location positioned below heart level if possible. Cleanse area gently. Do not apply ice, or use a tourniquet.';
            }
            if(type==='vet'){
                msg='Sourcing emergency veterinary triage routing. Field telemetry data compiled. Contacting regional police veterinary dispatch line to stand by for priority emergency intake.';
            }
            if(type==='rally'){
                msg='Command directive issued: All perimeter units collapse cordon formations and rally coordinates back inward on target lead asset position, Wood Canine One.';
            }

            let speech = new SpeechSynthesisUtterance(msg);
            speech.lang='en-US';
            speech.rate = 1.0; 
            speech.pitch = 1.0; 
            synth.speak(speech);
        }

        window.onload = initMap;
    </script>
</body>
</html>
