<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TACNET | MULTI-AGENCY TACTICAL TASK FORCE</title>
    <style>
        :root {
            --hunter-green: #1B3022;
            --neon-green: #39FF14;
            --gold: #D4AF37;
            --sos-red: #B22222;
            --glass: rgba(20, 35, 25, 0.9);
            --panel-bg: #2b2b2b;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #111; color: var(--gold);
            font-family: 'Courier New', Courier, monospace; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* MASTER TACTICAL BANNER FRAME */
        .master-banner {
            background: linear-gradient(180deg, #4a3f1a 0%, #1a1505 100%);
            border: 4px solid #5a5a5a;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: inset 0 0 20px #000;
        }

        .banner-seal {
            height: 90px;
            width: auto;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        .banner-center-text {
            text-align: center;
            flex-grow: 1;
        }

        .banner-title {
            font-size: 3.2rem;
            font-weight: bold;
            letter-spacing: 6px;
            margin: 0;
            color: var(--gold);
            text-shadow: 3px 3px 0px #000;
        }

        .banner-subtext {
            font-size: 1.1rem;
            color: #fff;
            font-weight: bold;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* CONSOLE WORKSPACE */
        .console-body {
            display: flex;
            flex-grow: 1;
            padding: 15px;
            gap: 15px;
            background: #222;
            border-bottom: 4px solid #5a5a5a;
        }

        /* LIVE SCREEN AREA */
        .screen-container {
            flex-grow: 1;
            position: relative;
            border: 5px solid #444;
            background-color: #000;
            box-shadow: 0 0 15px #000;
            overflow: hidden;
        }

        #live-map {
            width: 100%; height: 100%;
            background-image: url('https://maps.googleapis.com/maps/api/staticmap?center=37.4514,-79.1522&zoom=14&size=1000x800&maptype=satellite');
            background-size: cover; background-position: center;
        }

        /* MULTI-SHAPE TACTICAL MARKERS */
        .marker {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
            font-size: 0.75rem;
            box-shadow: 0 0 8px #000;
        }

        /* Shape 1: Standard Blue Circles (LEO) */
        .marker-circle {
            width: 40px; height: 40px;
            background: rgba(30, 144, 255, 0.85);
            border: 2px solid #00bfff;
            border-radius: 50%;
        }

        /* Shape 2: Amber Hexagon (K9 Master Head) */
        .marker-hex {
            width: 50px; height: 50px;
            background: rgba(218, 165, 32, 0.9);
            border: 2px solid var(--gold);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            font-size: 0.9rem;
        }

        /* Shape 3: Red Diamond (LEO Perimeter Lead) */
        .marker-diamond {
            width: 45px; height: 45px;
            background: rgba(178, 34, 34, 0.9);
            border: 2px solid #ff4500;
            transform: rotate(45deg);
        }
        .marker-diamond span { transform: rotate(-45deg); }

        /* Shape 4: Green Triangle (LEO-2 Outpost) */
        .marker-triangle {
            width: 45px; height: 45px;
            background: rgba(34, 139, 34, 0.9);
            border: 2px solid var(--neon-green);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            padding-top: 12px; box-sizing: border-box;
        }

        /* Shape 5: Purple Square (LEO Support) */
        .marker-square {
            width: 40px; height: 40px;
            background: rgba(138, 43, 226, 0.85);
            border: 2px solid #da70d6;
        }

        /* HARDWARE CONTROL PANEL */
        .control-panel {
            width: 260px;
            background: #333;
            border: 3px solid #5a5a5a;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: inset 0 0 10px #000;
        }

        .panel-heading {
            background: #222;
            padding: 6px;
            text-align: center;
            font-weight: bold;
            border: 1px solid var(--gold);
            font-size: 0.85rem;
        }

        /* TACTICAL RUGGED BUTTONS */
        .hw-btn {
            background: linear-gradient(180deg, #555 0%, #222 100%);
            border: 2px solid #666; color: var(--gold);
            padding: 12px; font-weight: bold; font-family: monospace;
            cursor: pointer; text-transform: uppercase; border-radius: 4px;
            box-shadow: 0 3px 0 #111; text-align: center;
        }
        .hw-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #111; }
        .hw-btn-gold { border-color: var(--gold); background: linear-gradient(180deg, #6b561b 0%, #221a05 100%); }

        .btn-sos-hardware {
            background: linear-gradient(180deg, var(--sos-red) 0%, #500 100%);
            border: 2px solid #ff4500; color: #fff;
            padding: 15px; font-size: 1rem; animation: panel-pulse 2s infinite;
        }

        @keyframes panel-pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }

        /* CREATOR LOWER BANNER */
        .creator-footer {
            background: #000;
            color: #ff6347;
            text-align: center;
            padding: 12px 0;
            font-size: 1.3rem;
            font-weight: bold;
            letter-spacing: 2px;
            border-top: 2px solid #333;
        }

        /* NIGHT VISION OVERLAY */
        .nvg-active {
            filter: brightness(0.7) contrast(1.3) sepia(100%) hue-rotate(85deg) !important;
        }
    </style>
</head>
<body id="master-console">

    <div class="master-banner">
        <img src="amherst_badge.png.jpg" alt="Sheriff Star" class="banner-seal" onerror="this.style.display='none'">
        <div class="banner-center-text">
            <div class="banner-title">TACNET</div>
            <div class="banner-subtext">NEXTLINE MULTI-AGENCY TACTICAL TASK FORCE</div>
        </div>
        <img src="gshep_2.jpg" alt="K9 Medallion" class="banner-seal" style="margin-right: 15px;" onerror="this.style.display='none'">
        <img src="va.png-modified.jpg" alt="VSP Patch" class="banner-seal" onerror="this.style.display='none'">
    </div>

    <div class="console-body">
        
        <div class="screen-container">
            <div id="live-map"></div>

            <div class="marker marker-circle" style="top: 20%; left: 40%;">LEO</div>
            <div class="marker marker-circle" style="top: 55%; left: 30%;">LEO</div>
            <div class="marker marker-circle" style="top: 65%; left: 45%;">LEO</div>
            
            <div class="marker marker-hex" style="top: 35%; left: 25%;">K9</div>
            
            <div class="marker marker-diamond" style="top: 25%; left: 15%;"><span>LEO</span></div>
            
            <div class="marker marker-triangle" style="top: 25%; left: 75%;">LEO-2</div>
            
            <div class="marker marker-square" style="top: 45%; left: 78%;">LEO</div>
        </div>

        <div class="control-panel">
            <div class="panel-heading">SYSTEM EXECUTION</div>
            <button class="hw-btn hw-btn-gold" onclick="alert('Tactical Search Operations Started.')">START SEARCH</button>
            <button class="hw-btn hw-btn-gold" onclick="startK9Voice()">K9 DEPLOY</button>
            
            <div class="panel-heading" style="margin-top: 10px;">SAFETY SYSTEM</div>
            <button class="hw-btn btn-sos-hardware" onclick="triggerSOS()">OFFICER SOS</button>
            
            <button class="hw-btn" style="margin-top: auto; border-color: var(--neon-green);" onclick="toggleNVG()">NIGHT VISION</button>
        </div>
    </div>

    <div class="creator-footer">
        APP CREATOR DEPUTY SHERIFF EARL A. WOOD RETIRED VA
    </div>

    <script>
        // CORE TACTICAL COMMAND FUNCTIONS
        function toggleNVG() {
            document.getElementById('master-console').classList.toggle('nvg-active');
        }

        function startK9Voice() {
            if ('speechSynthesis' in window) {
                const speech = new SpeechSynthesisUtterance("TACNET K9 Deployment Framework initialized. Hands-free voice logs active.");
                window.speechSynthesis.speak(speech);
            } else {
                alert("K9 Deploy Active (Speech Engine not supported by browser).");
            }
        }

        function triggerSOS() {
            alert("CRITICAL EMERGENCY: SOS Broadcasted to Amherst Dispatch and all Field Units.");
        }
    </script>
</body>
</html>
