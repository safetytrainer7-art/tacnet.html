<style>
    /* REPORTING PANEL STYLING */
    .report-overlay {
        position: fixed; top: 10%; left: 10%; width: 80%; height: 80%;
        background: rgba(0, 10, 20, 0.98); border: 3px solid var(--gold);
        z-index: 5000; display: none; padding: 20px; color: var(--neon);
        box-shadow: 0 0 50px #000; overflow-y: auto;
    }
    .log-entry { border-bottom: 1px solid var(--glass); padding: 8px; font-size: 12px; }
    .timestamp { color: var(--gold); font-weight: bold; margin-right: 10px; }
    .report-input { 
        width: 100%; background: #111; border: 1px solid var(--neon); 
        color: #fff; padding: 10px; margin-top: 10px; font-family: monospace;
    }
</style>

<div id="report-panel" class="report-overlay">
    <h2 style="text-align:center; color:var(--gold);">OFFICIAL INCIDENT LOG</h2>
    <div id="log-container">
        <!-- AUTOMATIC TIMESTAMPS APPEAR HERE -->
    </div>
    
    <h4 style="color:var(--gold); margin-top:20px;">OFFICER NOTES & DISPOSITION</h4>
    <textarea id="officer-notes" class="report-input" rows="4" placeholder="Enter search results, final disposition, and multi-agency units involved..."></textarea>
    
    <div style="display:flex; gap:10px; margin-top:20px;">
        <button class="tac-btn" style="flex:1;" onclick="generatePDF()">GENERATE PDF REPORT</button>
        <button class="tac-btn" style="flex:1; border-color:cyan; color:cyan;" onclick="sendEmail()">EMAIL TO COMMAND</button>
        <button class="tac-btn" style="flex:1; border-color:red;" onclick="toggleReport()">CLOSE</button>
    </div>
</div>

<script>
    let incidentLogs = [];

    // AUTOMATIC TIMESTAMP FUNCTION
    function addToLog(action) {
        const now = new Date();
        const timestamp = now.toLocaleDateString() + " " + now.toLocaleTimeString();
        const entry = { time: timestamp, event: action };
        incidentLogs.push(entry);
        
        const logHtml = `<div class="log-entry"><span class="timestamp">[${timestamp}]</span> ${action}</div>`;
        document.getElementById('log-container').innerHTML += logHtml;
    }

    function toggleReport() {
        const panel = document.getElementById('report-panel');
        panel.style.display = (panel.style.display === 'none' || panel.style.display === '') ? 'block' : 'none';
    }

    // PDF GENERATION FOR COURT RECORDS
    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const notes = document.getElementById('officer-notes').value;

        doc.setFont("courier");
        doc.text("TACNET MULTI-AGENCY TACTICAL REPORT", 10, 10);
        doc.text("CREATED BY: DEPUTY SHERIFF EARL A. WOOD (RETIRED)", 10, 20);
        doc.text("--------------------------------------------------", 10, 25);
        
        let y = 35;
        incidentLogs.forEach(log => {
            doc.text(`${log.time}: ${log.event}`, 10, y);
            y += 10;
        });

        doc.text("OFFICER NOTES / DISPOSITION:", 10, y + 10);
        doc.text(doc.splitTextToSize(notes, 180), 10, y + 20);
        
        doc.save("TACNET_Search_Report.pdf");
    }

    // EMAIL INTEGRATION
    function sendEmail() {
        const notes = document.getElementById('officer-notes').value;
        const body = incidentLogs.map(l => `${l.time} - ${l.event}`).join('%0D%0A') + 
                     "%0D%0A%0D%0A DISPOSITION:%0D%0A" + notes;
        
        window.location.href = `mailto:?subject=TACNET Incident Report&body=${body}`;
    }

    // Tying existing buttons to the auto-logger
    function triggerMod(name) {
        addToLog("Accessed Module: " + name);
        // ... rest of your module logic
    }
</script>
