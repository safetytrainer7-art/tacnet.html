<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TACNET | MULTI-AGENCY TASK FORCE</title>
    <style>
        :root {
            --hunter-green: #1B3022;
            --neon-green: #39FF14;
            --gold: #D4AF37;
            --sos-red: #B22222;
            --glass: rgba(27, 48, 34, 0.85);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; color: var(--gold);
            font-family: 'Courier New', Courier, monospace; overflow: hidden;
        }

        /* ORIGINAL TACTICAL HEADER */
        .hud-header {
            position: absolute; top: 0; width: 100%; z-index: 10;
            background: linear-gradient(to bottom, var(--glass), transparent);
            text-align: center; padding: 15px 0; border-bottom: 2px solid var(--gold);
        }

        .title-main {
            font-size: 2.8rem; font-weight: bold; letter-spacing: 5px; margin: 0;
            text-shadow: 3px 3px 0px #000; text-transform: uppercase;
        }

        .title-sub { font-size: 1rem; letter-spacing: 2px; color: var(--neon-green); font-weight: bold; }

        /* FULL SCREEN MAP BACKGROUND */
        #main-map {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://maps.googleapis.com/maps/api/staticmap?center=37.4514,-79.1522&zoom=14&size=1200x1200&maptype=satellite');
            background-size: cover; background-position: center; z-index: 1;
        }

        /* HUD OVERLAYS */
        .hud-left, .hud-right {
            position: absolute; top: 140px; z-index: 10;
            display: flex; flex-direction: column; gap: 12px; padding: 10px;
        }

        .hud-left { left: 15px; }
        .hud-right { right: 15px; width: 240px; }

        .hud-bottom {
            position: absolute; bottom: 0; width: 100%; z-index: 10;
            background: var(--glass); display: flex; justify-content: space-around;
            padding: 20px 0; border-top: 2px solid var(--gold);
        }

        /* TACTICAL ELEMENTS */
        .tactical-box {
            background: var(--glass); border: 1px solid var(--gold);
            padding: 12px; border-radius: 4px; box-shadow: 0 0 15px #000;
        }

        .icon-circle {
            width: 60px; height: 60px; border: 2px solid var(--gold);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; background: var(--hunter-green);
            cursor: pointer; font-weight: bold; font-size: 0.8rem;
            text-align: center; line-height: 1.1; box-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        .btn-sos {
            background: var(--sos-red); color: #fff; border: 2px solid #fff;
            padding: 18px; font-weight: bold; border-radius: 8px;
            animation: pulse 1.5s infinite; cursor: pointer; font-size: 1.1rem;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }

        #perimeter-visual {
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
            width: 320px; height: 320px;
            border: 3px dashed var(--neon-green);
            background: rgba(57, 255, 20, 0.15);
            border-radius: 50%; display: none; z-index: 5;
        }
        
        button {
            background: var(--hunter-green); color: var(--gold);
            border: 1px solid var(--gold); padding: 10px 15px;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
        }
    </style>
</head>
<body id="tacnet-ui">

    <!-- MAP REMAINS FULL BACKGROUND -->
    <div id="main-map"></div>
    <div id="perimeter-visual"></div>

    <!-- ORIGINAL HEADER RESTORED -->
    <div class="hud-header">
        <div class="title-main">TACNET</div>
        <div class="title-sub">NEXTLINE MULTI-AGENCY TACTICAL TASK FORCE</div>
    </div>

    <!-- LEFT COMMAND DOCK -->
    <div class="hud-left">
        <div class="icon-circle" onclick="togglePerimeter()">PERIM<br>SET</div>
        <div class="icon-circle" onclick="dropMarker()">ARTCL<br>DROP</div>
        <div class="icon-circle" onclick="toggleNightVision()">NVG<br>MODE</div>
    </div>

    <!-- RIGHT MISSION DOCK -->
    <div class="hud-right">
        <div class="tactical-box">
            <div style="color: var(--neon-green); border-bottom: 1px solid var(--gold); font-weight: bold; padding-bottom: 5px;">OP: ALPHA-247</div>
            <div style="font-size: 0.9rem; margin-top: 8px;">
                AMHERST CO, VA<br>
                UNITS: 7 LEO / 2 K9<br>
                TEMP: 72°F / CLEAR
            </div>
        </div>
        <button class="btn-sos" onclick="triggerSOS()">SOS EMERGENCY</button>
    </div>

    <!-- BOTTOM NAVIGATION DOCK -->
    <div class="hud-bottom">
        <button onclick="alert('Live Ops Active')">LIVE OPS</button>
        <button onclick="startK9Guide()">K9 OPS</button>
        <button onclick="alert('Accessing VA/Federal Case Law')">CASE LAW</button>
        <button onclick="alert('Admin: Brotherhood Access Valid')">ADMIN</button>
    </div>

    <script>
        function togglePerimeter() {
            const p = document.getElementById('perimeter-visual');
            p.style.display = p.style.display === 'none' ? 'block' : 'none';
        }

        function dropMarker() { alert("Article Drop: GPS Tagged at Current Position."); }

        function toggleNightVision() {
            const ui = document.getElementById('tacnet-ui');
            ui.style.filter = ui.style.filter === 'sepia(1) hue-rotate(80deg) brightness(1.2)' ? 'none' : 'sepia(1) hue-rotate(80deg) brightness(1.2)';
        }

        function startK9Guide() {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance("TACNET K9 Guide Online. Operational and ready.");
            synth.speak(utter);
        }

        function triggerSOS() { alert("EMERGENCY SOS: SIGNAL BROADCASTED TO ALL TASK FORCE UNITS."); }
    </script>
</body>
</html>
