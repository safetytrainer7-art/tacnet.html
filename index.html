
<script>

const firebaseConfig = {
apiKey: "AIzaSyCvuvc6EAoh5S0O3kPcrGEhccTtjagSl_A",
authDomain: "safe-encounter-7a43a.firebaseapp.com",
databaseURL: "https://safe-encounter-7a43a-default-rtdb.firebaseio.com",
projectId: "safe-encounter-7a43a",
storageBucket: "safe-encounter-7a43a.firebasestorage.app",
messagingSenderId: "633429430474",
appId: "1:633429430474:web:9458093c40c218ca42e433"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let map;
let officerMarker;
let perimeterMode = false;
let perimeterPoints = [];
let perimeterLayer;
let addressSearchActive = false;

map = L.map('map').setView([37.3349,-79.5236],13);

setTimeout(()=>{
map.invalidateSize();
},500);

const streetLayer = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
);

const satelliteLayer = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
);

const terrainLayer = L.tileLayer(
'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png'
);

streetLayer.addTo(map);

L.control.layers({
"STREET":streetLayer,
"SATELLITE":satelliteLayer,
"TERRAIN":terrainLayer
}).addTo(map);

navigator.geolocation.watchPosition((pos)=>{

const lat = pos.coords.latitude;
const lng = pos.coords.longitude;

if(officerMarker){
map.removeLayer(officerMarker);
}

officerMarker = L.circleMarker([lat,lng],{
radius:10,
color:'#00aaff',
fillColor:'#00aaff',
fillOpacity:1
}).addTo(map)
.bindPopup('ACTIVE LAW ENFORCEMENT UNIT');

if(!addressSearchActive){
map.setView([lat,lng]);
}

document.getElementById('gps-status').innerText =
'LIVE GPS ACTIVE';

});

async function searchAddress(){

const query =
document.getElementById('address-search').value;

if(!query){
alert('ENTER ADDRESS');
return;
}

try{

const response = await fetch(
'https://nominatim.openstreetmap.org/search?format=json&q='
+ encodeURIComponent(query)
);

const data = await response.json();

if(data.length > 0){

const lat = parseFloat(data[0].lat);
const lng = parseFloat(data[0].lon);

addressSearchActive = true;

map.setView([lat,lng],16);

L.marker([lat,lng]).addTo(map)
.bindPopup('SEARCH LOCATION')
.openPopup();

addFeed('ADDRESS SEARCH COMPLETED');

setTimeout(()=>{
addressSearchActive = false;
},10000);

}else{
alert('ADDRESS NOT FOUND');
}

}catch(err){

alert('SEARCH ERROR');

}

}

function togglePerimeter(){

perimeterMode = !perimeterMode;

addFeed(
perimeterMode
? 'PERIMETER MODE ACTIVE'
: 'PERIMETER MODE DISABLED'
);

}

map.on('click',(e)=>{

if(!perimeterMode) return;

perimeterPoints.push([
e.latlng.lat,
e.latlng.lng
]);

L.circleMarker(e.latlng,{
radius:5,
color:'#39ff14'
}).addTo(map);

if(perimeterPoints.length < 3){
return;
}

if(perimeterLayer){
map.removeLayer(perimeterLayer);
}

perimeterLayer = L.polygon(
perimeterPoints,
{
color:'#39ff14',
fillColor:'#39ff14',
fillOpacity:.15
}
).addTo(map);

});

function addFeed(text){

const feed =
document.getElementById('feed');

if(!feed) return;

const item =
document.createElement('div');

item.innerHTML =
new Date().toLocaleTimeString()
+ ' — ' + text;

feed.prepend(item);

}

addFeed('TACNET CORE INITIALIZED');

</script>
