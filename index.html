
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TACNET</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<style>

body{
    margin:0;
    background:#050b12;
    font-family:Arial,sans-serif;
    overflow:hidden;
    color:white;
}

/* MAP */

#map{

    position:absolute;

    top:0;
    left:0;

    width:100vw;
    height:100vh;

    z-index:1;
}

/* CENTER VIEWPORT */

.viewport{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    width:92vw;
    height:92vh;

    border:2px solid #00e5ff;

    border-radius:22px;

    overflow:hidden;

    box-shadow:0 0 30px rgba(0,229,255,0.35);

    z-index:2;

    pointer-events:none;
}

/* HEADER */

.header{

    position:absolute;

    top:10px;
    left:50%;

    transform:translateX(-50%);

    width:90%;

    height:58px;

    background:rgba(0,0,0,0.72);

    border:1px solid rgba(0,229,255,0.3);

    border-radius:16px;

    z-index:3000;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:0 15px;
}

.logo h1{

    margin:0;

    color:#00e5ff;

    letter-spacing:3px;

    font-size:22px;
}

.logo p{

    margin:0;

    color:#9befff;

    font-size:10px;
}

.status{

    color:#9befff;

    font-size:11px;

    text-align:right;
}

/* SEARCH */

.searchBox{

    position:absolute;

    top:80px;

    left:50%;

    transform:translateX(-50%);

    width:72%;

    display:flex;

    gap:10px;

    z-index:3000;
}

.searchBox input{

    flex:1;

    padding:14px;

    border:none;

    border-radius:14px;

    background:rgba(0,0,0,0.75);

    border:1px solid rgba(0,229,255,0.3);

    color:white;
}

.searchBtn{

    width:90px;

    border:none;

    border-radius:14px;

    background:rgba(0,229,255,0.2);

    border:1px solid #00e5ff;

    color:white;

    font-weight:bold;
}

/* CONTROLS */

.controls{

    position:absolute;

    bottom:20px;

    left:50%;

    transform:translateX(-50%);

    display:flex;

    gap:10px;

    z-index:3000;

    flex-wrap:wrap;

    justify-content:center;

    width:90%;
}

.btn{

    width:85px;
    height:52px;

    border:none;

    border-radius:14px;

    background:rgba(0,0,0,0.75);

    border:1px solid rgba(255,255,255,0.14);

    color:white;

    font-weight:bold;
}

.law{ color:#1e90ff; }
.k9{ color:#00e5ff; }
.sar{ color:#ff9500; }
.perim{ color:#ffbb33; }
.reset{ color:#ff3377; }

</style>

</head>

<body>

<div id="map"></div>

<div class="viewport"></div>

<div class="header">

    <div class="logo">

        <h1>TACNET</h1>

        <p>FEDERAL • STATE • LOCAL</p>

    </div>

    <div class="status">

        GPS ONLINE<br>
        COMMAND ACTIVE

    </div>

</div>

<div class="searchBox">

    <input
    id="address"
    type="text"
    placeholder="Search Address">

    <button
    class="searchBtn"
    onclick="searchLocation()">

    GO

    </button>

</div>

<div class="controls">

    <button class="btn law">LAW</button>

    <button class="btn k9">K9</button>

    <button class="btn sar">SAR</button>

    <button
    class="btn perim"
    onclick="enablePerimeter()">

    PERIM

    </button>

    <button
    class="btn reset"
    onclick="resetMap()">

    RESET

    </button>

</div>

<script>

/* MAP */

const map = L.map('map').setView(
[37.4138,-79.1422],
13
);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution:'OpenStreetMap'
}
).addTo(map);

/* FIX MOBILE */

setTimeout(function(){

    map.invalidateSize();

},500);

/* GPS */

navigator.geolocation.getCurrentPosition(function(pos){

    const lat = pos.coords.latitude;

    const lon = pos.coords.longitude;

    map.setView([lat,lon],15);

    L.marker([lat,lon])

    .addTo(map)

    .bindPopup('COMMAND POSITION')

    .openPopup();

});

/* SEARCH */

function searchLocation(){

    const address =
    document.getElementById('address').value;

    fetch(
    'https://nominatim.openstreetmap.org/search?format=json&q='
    + encodeURIComponent(address)
    )

    .then(response => response.json())

    .then(data => {

        if(data.length > 0){

            const lat =
            parseFloat(data[0].lat);

            const lon =
            parseFloat(data[0].lon);

            map.setView([lat,lon],15);

            L.marker([lat,lon])

            .addTo(map)

            .bindPopup(address)

            .openPopup();

        }

    });

}

/* SEARCHERS */

let activeColor = '#1e90ff';

document.querySelectorAll('.btn')

.forEach(btn => {

    btn.addEventListener('click', function(){

        if(this.classList.contains('law'))
        activeColor = '#1e90ff';

        if(this.classList.contains('k9'))
        activeColor = '#00e5ff';

        if(this.classList.contains('sar'))
        activeColor = '#ff9500';

    });

});

/* PERIMETER */

let perimeterMode = false;

function enablePerimeter(){

    perimeterMode = true;

}

/* MAP CLICK */

map.on('click', function(e){

    if(perimeterMode){

        L.circle(

        [e.latlng.lat,e.latlng.lng],

        {
            radius:300,

            color:'#ffbb33',

            fillColor:'#ffbb33',

            fillOpacity:0.15
        })

        .addTo(map);

        perimeterMode = false;

    }else{

        L.circleMarker(

        [e.latlng.lat,e.latlng.lng],

        {
            radius:10,

            color:'#ffffff',

            weight:2,

            fillColor:activeColor,

            fillOpacity:1
        })

        .addTo(map);

    }

});

/* RESET */

function resetMap(){

    location.reload();

}

</script>

</body>
</html>
