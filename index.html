<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACNET - MULTI-AGENCY TASK FORCE</title>
    <style>
        /* THE THEME: DARK HUNTER GREEN & CRACKED GOLD */
        body {
            background-color: #1B3022;
            color: #D4AF37;
            font-family: 'Courier New', Courier, monospace; /* Rugged Look */
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            margin-bottom: 0;

            text-shadow: 2px 2px 0px #000, 4px 4px 0px rgba(0,0,0,0.5);

        .subtitle { font-size: 1.2rem; font-weight: bold; }
        .agencies { font-size: 0.9rem; color: #D4AF37; opacity: 0.8; }

        /* THE MAP AREA */
        #map-display {
            width: 100%;
            height: 400px;
            background-color: #000;
            border: 3px solid #D4AF37;
            margin-top: 20px;
            position: relative;
            /* Night Vision Filter */
            box-shadow: inset 0 0 20px #39FF14;
        }

        /* ARTICLE DROP BUTTONS */
        .article-bar {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        .icon-btn {
            border: 2px solid #D4AF37;
            border-radius: 50%; /* The Gold Circle */
            background: black;
            width: 60px;
            height: 60px;
            cursor: pointer;
            font-size: 1.5rem;
        }
    </style>
</head>

        <button class="icon-btn" title="Clothing">👕</button>

</html>
