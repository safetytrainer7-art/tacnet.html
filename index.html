<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>TACNET SEARCH COMMAND</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<script
src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<style>

*{
box-sizing:border-box;
}

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
font-family:Arial,sans-serif;
background:#050b12;
color:white;
}

#map{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
}

.overlay{
position:absolute;
inset:0;
background:
linear-gradient(
to bottom,
rgba(0,0,0,0.72),
rgba(0,0,0,0.15),
rgba(0,0,0,0.82)
);
pointer-events:none;
z-index:2;
}

.header{
position:absolute;
top:12px;
left:50%;
transform:translateX(-50%);
width:94%;
height:72px;
background:rgba(0,0,0,0.78);
border-radius:22px;
border:1px solid rgba(0,229,255,0.22);
display:flex;
justify-content:space-between;
align-items:center;
padding:0 18px;
backdrop-filter:blur(8px);
z-index:6000;
}

.branding h1{
margin:0;
font-size:28px;
letter-spacing:4px;
color:#00e5ff;
}

.branding p{
margin:4px 0 0 0;
font-size:10px;
letter-spacing:2px;
color:#c8faff;
}

.searchBar{
position:absolute;
top:96px;
left:50%;
transform:translateX(-50%);
width:88%;
display:flex;
gap:8px;
z-index:7000;
}

.searchBar input{
flex:1;
padding:14px;
border:none;
border-radius:14px;
background:rgba(0,0,0,0.82);
color:white;
border:1px solid rgba(0,229,255,0.18);
}

.searchBar button{
width:100px;
border:none;
border-radius:14px;
background:#00e5ff;
color:black;
font-weight:bold;
}

.eventPanel{
position:absolute;
top:150px;
right:16px;
width:260px;
max-height:320px;
overflow-y:auto;
background:rgba(0,0,0,0.9);
border:1px solid rgba(0,229,255,0.18);
border-radius:18px;
padding:14px;
z-index:8000;
}

.eventPanel h3{
margin-top:0;
color:#00e5ff;
}

.eventItem{
padding:10px;
margin-bottom:8px;
background:#0b1720;
border-radius:12px;
font-size:12px;
}

.modeDisplay{
position:absolute;
bottom:92px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.88);
padding:10px 18px;
border-radius:14px;
border:1px solid rgba(0,229,255,0.18);
z-index:8000;
}

.bottomHUD{
position:absolute;
bottom:16px;
left:50%;
transform:translateX(-50%);
width:94%;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:8px;
z-index:8000;
}

.bottomHUD button{
min-width:74px;
padding:12px;
border:none;
border-radius:12px;
background:rgba(0,0,0,0.88);
border:1px solid rgba(0,229,255,0.18);
color:white;
font-weight:bold;
}

.sectorLegend{
position:absolute;
left:16px;
top:150px;
width:220px;
background:rgba(0,0,0,0.9);
padding:14px;
border-radius:18px;
border:1px solid rgba(0,229,255,0.18);
z-index:8000;
}

.sectorLegend h3{
margin-top:0;
color:#00e5ff;
}

.sectorItem{
padding:10px;
margin-bottom:8px;
background:#0b1720;
border-radius:12px;
font-size:12px;
}

</style>

</head>

<body>

<div id="map"></div>

<div class="overlay"></div>

<div class="header">

<div class="branding">

<h1>TACNET</h1>

<p>TACTICAL SEARCH COMMAND</p>

</div>

<div>

LIVE OPS<br>
SECTOR CONTROL

</div>

</div>

<div class="searchBar">

<input
id="address"
type="text"
placeholder="SEARCH ADDRESS">

<button onclick="searchLocation()">
SEARCH
</button>

</div>

<div class="sectorLegend">

<h3>SECTOR STATUS</h3>

<div id="sectorFeed">

<div class="sectorItem">
NO ACTIVE SECTORS
</div>

</div>

</div>

<div class="eventPanel">

<h3>LIVE EVENTS</h3>

<div id="eventFeed">

<div class="eventItem">
SYSTEM READY
</div>

</div>

</div>

<div
class="modeDisplay"
id="modeDisplay">

MODE: NONE

</div>

<div class="bottomHUD">

<button onclick="selectTool('LAW')">
LAW
</button>

<button onclick="selectTool('K9')">
K9
</button>

<button onclick="selectTool('SAR')">
SAR
</button>

<button onclick="selectTool('SECTOR')">
SECTOR
</button>

<button onclick="selectTool('CLEAR')">
CLEAR
</button>

<button onclick="selectTool('EVID')">
EVID
</button>

<button onclick="selectTool('PERIM')">
PERIM
</button>

<button onclick="resetMap()">
RESET
</button>

</div>

<script>

/* MAP */

const map = L.map('map').setView(
[37.4138,-79.1422],
13
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'OpenStreetMap',
maxZoom:19
}
).addTo(map);

/* SEARCH */

function searchLocation(){

const address =
document.getElementById('address').value;

fetch(
'https://nominatim.openstreetmap.org/search?format=json&q='
+ encodeURIComponent(address)
)

.then(response => response.json())

.then(data => {

if(data.length > 0){

const lat =
parseFloat(data[0].lat);

const lon =
parseFloat(data[0].lon);

map.setView([lat,lon],15);

L.marker([lat,lon])
.addTo(map)
.bindPopup(address);

addEvent(
'LOCATION SEARCHED'
);

}

});

}

/* EVENTS */

function addEvent(text){

const feed =
document.getElementById('eventFeed');

const item =
document.createElement('div');

item.className =
'eventItem';

item.innerHTML =
new Date().toLocaleTimeString()
+ ' — '
+ text;

feed.prepend(item);

}

/* SECTOR FEED */

let sectorCount = 0;

function addSectorCard(name,status){

const feed =
document.getElementById('sectorFeed');

if(feed.innerHTML.includes('NO ACTIVE SECTORS')){
feed.innerHTML = '';
}

const item =
document.createElement('div');

item.className =
'sectorItem';

item.innerHTML =
'<strong>'
+ name +
'</strong><br>'
+ status;

feed.prepend(item);

}

/* TOOL SYSTEM */

let selectedTool = null;

let operationalLayers = [];

function selectTool(tool){

selectedTool = tool;

document
.getElementById('modeDisplay')
.innerHTML =
'MODE: ' + tool;

addEvent(
tool + ' MODE SELECTED'
);

}

/* MAP ACTIONS */

map.on('click', function(e){

if(!selectedTool){
return;
}

const lat = e.latlng.lat;
const lng = e.latlng.lng;

let layer;

/* LAW */

if(selectedTool === 'LAW'){

layer = L.circleMarker(
[lat,lng],
{
radius:8,
color:'blue',
fillColor:'blue',
fillOpacity:1
}
)
.addTo(map)
.bindPopup('LAW UNIT');

}

/* K9 */

if(selectedTool === 'K9'){

layer = L.circleMarker(
[lat,lng],
{
radius:8,
color:'#00e5ff',
fillColor:'#00e5ff',
fillOpacity:1
}
)
.addTo(map)
.bindPopup('K9 UNIT');

}

/* SAR */

if(selectedTool === 'SAR'){

layer = L.circleMarker(
[lat,lng],
{
radius:8,
color:'orange',
fillColor:'orange',
fillOpacity:1
}
)
.addTo(map)
.bindPopup('SAR TEAM');

}

/* EVIDENCE */

if(selectedTool === 'EVID'){

layer = L.circleMarker(
[lat,lng],
{
radius:7,
color:'yellow',
fillColor:'yellow',
fillOpacity:1
}
)
.addTo(map)
.bindPopup('EVIDENCE');

}

/* PERIMETER */

if(selectedTool === 'PERIM'){

layer = L.circle(
[lat,lng],
{
radius:1200,
color:'red',
fillColor:'#ff0000',
fillOpacity:0.06
}
)
.addTo(map);

}

/* SEARCH SECTOR */

if(selectedTool === 'SECTOR'){

sectorCount++;

const sectorName =
'SECTOR-' + sectorCount;

layer = L.rectangle(
[
[lat - 0.003,lng - 0.003],
[lat + 0.003,lng + 0.003]
],
{
color:'#00ff88',
weight:2,
fillOpacity:0.08
}
)
.addTo(map)
.bindPopup(sectorName);

addSectorCard(
sectorName,
'ACTIVE SEARCH'
);

addEvent(
sectorName + ' CREATED'
);

}

/* CLEARED SECTOR */

if(selectedTool === 'CLEAR'){

layer = L.circle(
[lat,lng],
{
radius:500,
color:'#00ff88',
fillColor:'#00ff88',
fillOpacity:0.12
}
)
.addTo(map)
.bindPopup('SECTOR CLEARED');

addEvent(
'SEARCH AREA CLEARED'
);

}

/* SAVE */

if(layer){

operationalLayers.push(layer);

}

});

/* RESET */

function resetMap(){

operationalLayers.forEach(layer => {
map.removeLayer(layer);
});

operationalLayers = [];

selectedTool = null;

sectorCount = 0;

document
.getElementById('modeDisplay')
.innerHTML =
'MODE: NONE';

document
.getElementById('sectorFeed')
.innerHTML =
'<div class=\"sectorItem\">NO ACTIVE SECTORS</div>';

addEvent(
'MAP RESET'
);

}

</script>

</body>
</html>
