<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TACNET CORE</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
    margin:0;
    background:#081018;
    color:white;
    font-family:Arial,sans-serif;
}

.header{
    background:rgba(10,20,30,0.9);
    padding:15px;
    text-align:center;
    border-bottom:1px solid #00e5ff;
}

.header h1{
    margin:0;
    color:#00e5ff;
    font-size:34px;
    letter-spacing:4px;
    text-shadow:0 0 12px #00e5ff;
}

.controls{
    padding:12px;
    background:rgba(15,25,35,0.85);
}

input,select{
    width:100%;
    padding:14px;
    margin-bottom:10px;
    border:none;
    border-radius:12px;
    font-size:18px;
    box-sizing:border-box;

    background:rgba(255,255,255,0.08);
    color:white;

    border:1px solid rgba(0,229,255,0.4);
}

button{
    width:100%;
    padding:14px;
    margin-bottom:10px;
    border:none;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    color:white;
}

.searchBtn{
    background:rgba(0,229,255,0.25);
    border:1px solid #00e5ff;
}

.perimeterBtn{
    background:rgba(255,150,0,0.25);
    border:1px solid #ff9500;
}

.sosBtn{
    background:rgba(255,0,0,0.25);
    border:1px solid #ff3333;
}

.resetBtn{
    background:rgba(255,0,120,0.25);
    border:1px solid #ff0077;
}

#map{
    width:100%;
    height:70vh;
}

.status{
    text-align:center;
    padding:10px;
    background:#101820;
    color:#00e5ff;
}

</style>
</head>

<body>

<div class="header">
<h1>TACNET</h1>
<p>CORE SYSTEM ONLINE</p>
</div>

<div class="controls">

<select id="unitType">

<option value="#1e90ff">
LAW ENFORCEMENT
</option>

<option value="#00e5ff">
K9 UNIT
</option>

<option value="#ff9500">
SEARCH & RESCUE
</option>

<option value="#00ffaa">
CIVILIAN
</option>

<option value="#ff00aa">
PERSON OF INTEREST
</option>

</select>

<input
type="text"
id="address"
placeholder="Enter Address">

<button
class="searchBtn"
onclick="searchLocation()">
SEARCH LOCATION
</button>

<button
class="perimeterBtn"
onclick="drawPerimeter()">
CREATE PERIMETER
</button>

<button
class="sosBtn"
onclick="sosAlert()">
SOS OFFICER DOWN
</button>

<button
class="resetBtn"
onclick="resetMap()">
RESET MAP
</button>

</div>

<div id="map"></div>

<div class="status" id="status">
Initializing GPS...
</div>

<script>

let map;
let userMarker;
let perimeterCircle;
let deployedMarkers = [];

function initMap(){

    map = L.map('map').setView([37.4138,-79.1422],13);

    L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        attribution:'OpenStreetMap'
    }).addTo(map);

    if(navigator.geolocation){

        navigator.geolocation.getCurrentPosition(

        function(position){

            let lat = position.coords.latitude;
            let lon = position.coords.longitude;

            map.setView([lat,lon],15);

            userMarker =
            L.marker([lat,lon])
            .addTo(map)
            .bindPopup("YOUR LOCATION")
            .openPopup();

            document.getElementById("status").innerHTML =
            "GPS CONNECTED";

        },

        function(){

            document.getElementById("status").innerHTML =
            "GPS FAILED";

        });

    }

    enableDeployment();

}

function enableDeployment(){

    map.on('click', function(e){

        let dropdown =
        document.getElementById("unitType");

        let color =
        dropdown.options[
        dropdown.selectedIndex
        ].value;

        let marker =

        L.circleMarker(
        [e.latlng.lat,e.latlng.lng],
        {
            radius:16,
            color:"#ffffff",
            weight:3,
            fillColor:color,
            fillOpacity:1
        })

        .addTo(map);

        marker.bindPopup("DEPLOYED UNIT");

        marker.on('click', function(){

            map.removeLayer(marker);

        });

        deployedMarkers.push(marker);

    });

}

function drawPerimeter(){

    if(!userMarker){

        alert("GPS not available");
        return;

    }

    let pos =
    userMarker.getLatLng();

    if(perimeterCircle){

        map.removeLayer(perimeterCircle);

    }

    perimeterCircle =

    L.circle(pos,{
        radius:1609,
        color:'#ff9500',
        fillColor:'#ff9500',
        fillOpacity:0.15
    })

    .addTo(map);

    map.fitBounds(
    perimeterCircle.getBounds()
    );

}

function resetMap(){

    deployedMarkers.forEach(marker => {

        map.removeLayer(marker);

    });

    deployedMarkers = [];

    if(perimeterCircle){

        map.removeLayer(perimeterCircle);

    }

}

function sosAlert(){

    alert("SOS ALERT ACTIVATED");

}

function searchLocation(){

    let address =
    document.getElementById("address").value;

    fetch(
    'https://nominatim.openstreetmap.org/search?format=json&q='
    + encodeURIComponent(address))

    .then(response => response.json())

    .then(data => {

        if(data.length > 0){

            let lat = data[0].lat;
            let lon = data[0].lon;

            map.setView([lat,lon],15);

            L.marker([lat,lon])
            .addTo(map)
            .bindPopup(address)
            .openPopup();

        }else{

            alert("Address not found");

        }

    });

}

initMap();

</script>

</body>
</html>
