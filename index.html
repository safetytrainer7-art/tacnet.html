<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TACNET - MOBILE SEARCH & K9 MEDICAL HUD</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --pure-black: #000000;
            --neon-green: #00ff33;
            --gold-primary: #dfb720;
            --alert-red: #ff0033;
            --dark-gray: #111111;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--pure-black); 
            color: var(--neon-green); 
            font-family: 'Share Tech Mono', monospace; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 6px;
            padding-top: calc(6px + env(safe-area-inset-top));
            padding-bottom: calc(6px + env(safe-area-inset-bottom));
        }

        /* HEADER BLOCK */
        .header-frame {
            border-bottom: 2px solid var(--neon-green);
            padding-bottom: 4px;
            margin-bottom: 6px;
        }
        .header-frame h1 { 
            font-family: 'Black Ops One', sans-serif; 
            color: var(--gold-primary); 
            font-size: 1.8rem; 
            line-height: 1;
        }
        .header-frame span {
            font-size: 0.75rem;
            color: #ffffff;
            letter-spacing: 2px;
        }

        /* HARD-LOCKED STABLE MAP CANVAS */
        .map-wrapper {
            height: 48vh; /* Fixed height prevents iOS freezing */
            width: 100%;
            position: relative;
            border: 1px solid var(--neon-green);
            border-radius: 4px;
            background: #000;
            margin-bottom: 6px;
        }
        #search-map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* VOICE BAR */
        .voice-bar {
            display: flex;
            gap: 6px;
            background: var(--dark-gray);
            padding: 6px;
            border: 1px solid var(--gold-primary);
            border-radius: 4px;
            margin-bottom: 6px;
        }
        .mic-btn {
            background: var(--alert-red);
            color: #fff;
            border: none;
            font-family: 'Black Ops One', sans-serif;
            font-size: 0.85rem;
            padding: 0 14px;
            border-radius: 3px;
            font-weight: bold;
        }
        .voice-input {
            flex-grow: 1;
            background: #000;
            border: 1px solid var(--neon-green);
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            padding: 8px;
            font-size: 0.9rem;
            border-radius: 3px;
        }

        /* DATA & PROTOCOL READOUT BOX */
        .intel-vault {
            background: var(--dark-gray);
            border: 1px solid var(--neon-green);
            padding: 10px;
            border-radius: 4px;
            flex-grow: 1;
            min-height: 140px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .vault-title {
            font-family: 'Black Ops One', sans-serif;
            color: var(--gold-primary);
            font-size: 1.1rem;
            border-bottom: 1px dashed var(--neon-green);
            padding-bottom: 4px;
            margin-bottom: 6px;
        }
        .vault-body {
            color: #ffffff;
            font-size: 1rem;
            line-height: 1.4;
        }

        /* TACTICAL EMERGENCY DIRECT TOUCH TARGETS */
        .emergency-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            margin-top: 6px;
        }
        .emergency-btn {
            background: rgba(255, 0, 51, 0.15);
            border: 1px solid var(--alert-red);
            color: #ff3355;
            padding: 12px 4px;
            font-family: 'Black Ops One', sans-serif;
            font-size: 0.85rem;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
        }
        .emergency-btn:active {
            background: var(--alert-red);
            color: #fff;
        }

        /* TIMELINE AUDIT FOOTER */
        .system-logs {
            font-size: 0.7rem;
            color: #888;
            margin-top: 6px;
            border-top: 1px solid #333;
            padding-top: 4px;
        }

        /* PULSING INCIDENT MARKER EFFECT */
        @keyframes targetPulse {
            0% { transform: scale(0.6); opacity: 1; box-shadow: 0 0 0 0 rgba(255, 0, 51, 0.8); }
            70% { transform: scale(1.2); opacity: 0.6; box-shadow: 0 0 0 8px rgba(255, 0, 51, 0); }
            100% { transform: scale(0.6); opacity: 1; box-shadow: 0 0 0 0 rgba(255, 0, 51, 0); }
        }
        .pulse-marker {
            background: rgba(255, 0, 51, 0.4);
            border: 2px solid #ff0033;
            border-radius: 50%;
            animation: targetPulse 1.3s infinite;
        }
    </style>
</head>
<body>

    <div class="header-frame">
        <h1>TACNET // SEARCH LINK</h1>
        <span>DESIGN COPPED BY EX Deputy Earl A. Wood</span>
    </div>

    <div class="map-wrapper">
        <div id="search-map"></div>
    </div>

    <div class="voice-bar">
        <button class="mic-btn" onclick="triggerVoiceReceiver()" id="mic-node">🎙️ MIC</button>
        <input type="text" class="voice-input" id="transcription-node" placeholder="Say: 'TAC, K9 CPR' or location address">
    </div>

    <div class="intel-vault">
        <div class="vault-title" id="display-title">SYSTEM PROTOCOL DECK</div>
        <div class="vault-body" id="display-body">
            Map loaded. Task Force sync ready. Use the mic or tap an emergency asset below to broadcast immediate K9 first aid protocols.
        </div>
    </div>

    <div class="emergency-grid">
        <button class="emergency-btn" onclick="triggerMedicalProtocol('cpr')">🐾 K9 CPR</button>
        <button class="emergency-btn" onclick="triggerMedicalProtocol('gunshot')">💥 GUNSHOT/BLEED</button>
        <button class="emergency-btn" onclick="triggerMedicalProtocol('heat')">☀️ HEAT STROKE</button>
        <button class="emergency-btn" onclick="triggerMedicalProtocol('snake')">🐍 SNAKE BITE</button>
        <button class="emergency-btn" onclick="triggerMedicalProtocol('vet')" style="border-color:var(--gold-primary); color:var(--gold-primary);">🏥 EMERGENCY VET</button>
        <button class="emergency-btn" style="border-color:var(--neon-green); color:var(--neon-green);" onclick="triggerCenterSearch()">🎯 LOCK MY CORE</button>
    </div>

    <div class="system-logs" id="log-node">
        [SYSTEM START]: Lightweight layout activated. Roster tags restricted to NAME-NUMBER.
    </div>

    <script>
        let mainMap = null;
        let activeCordon = null;
        let activeCenter = null;

        // MEDICAL DATA BASELINE FOR IMMEDIATE AUDIO ROUTING
        const medicalDatabase = {
            cpr: {
                title: "🚨 EMERGENCY CRITICAL: K9 CPR PROTOCOL",
                text: "1. Lay dog on RIGHT side. Clear mouth airway, pull tongue forward. \n2. Close muzzle entirely with hands. Deliver 2 rescue breaths into the nose. \n3. Compress chest immediately behind elbow: 30 compressions at a rate of 100-120 per minute. \n4. Ratio: 2 breaths to 30 compressions. Check femoral pulse every 2 minutes.",
                audio: "K9 C P R protocol active. Place dog on right side. Clear airway. Close muzzle, deliver two breaths into the nose, followed by thirty chest compressions behind the elbow. Repeat cycle."
            },
            gunshot: {
                title: "🚨 EMERGENCY CRITICAL: K9 GUNSHOT / SEVERE BLEEDING",
                text: "1. Apply immediate direct pressure with clean gauze or hand. \n2. Pack wound cavity deeply with hemostatic gauze if available. \n3. Apply pressure wrap bandage firmly. \n4. Maintain steady compression. Do NOT apply tourniquets to high-torso or junctional neck regions.",
                audio: "Gunshot wound protocol active. Apply immediate heavy direct pressure. Pack the wound cavity deeply with gauze. Hold pressure dressing firmly. Do not remove original blood pads."
            },
            heat: {
                title: "🚨 EMERGENCY CRITICAL: K9 HEAT EXHAUSTION / OVERHEAT",
                text: "1. Alert if core temp exceeds 103 degrees. Critical danger zone is 106 degrees. \n2. Move dog to shade/AC immediately. \n3. Apply lukewarm water to abdomen, armpits, and paw pads. \n4. CRITICAL WARNING: Never use ice water or full submerge, as it constricts blood vessels and traps core heat.",
                audio: "Heat exhaustion protocol active. Target core temperature reduction. Use lukewarm water on abdomen and pads. Avoid ice water completely as it traps internal heat. Run air conditioning full blast."
            },
            snake: {
                title: "🚨 EMERGENCY CRITICAL: K9 SNAKE BITE",
                text: "1. Restrict dog's movement completely to slow venom travel. Carry the dog. \n2. Keep bite wound site BELOW heart level if possible. \n3. Clean wound with fresh water. Do NOT cut the skin, do NOT apply a tourniquet, and do NOT attempt to suck venom out.",
                audio: "Snake bite protocol active. Restrict dog movement entirely. Carry the dog to slow venom spread. Keep bite level below the heart. Do not cut or apply tourniquets."
            },
            vet: {
                title: "🏥 EMERGENCY ROUTE: NEAREST EMERGENCY VETERINARY CLINIC",
                text: "Amherst Veterinary Hospital / 24-Hour Regional Trauma Desk.\nRoute: Direct via US-29 South.\nContact Line: Pre-routed over radio deck. Notify perimeter units to call ahead.",
                audio: "Emergency Vet route active. Emergency hospital vector mapped via twenty-nine south. Patching communication line to trauma desk now."
            }
        };

        // SYSTEM INITIALIZER
        window.onload = function() {
            // Default center locked securely to Amherst County Sheriff baseline coordinates
            mainMap = L.map('search-map', { zoomControl: false, dragging: true, tap: false }).setView([37.5857, -79.0517], 13);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 }).addTo(mainMap);
            
            // Populating simulated live units cleanly using Name and Unit Number Only
            addSimulatedTaskForceUnit([37.589, -79.055], "WOOD-K91");
            addSimulatedTaskForceUnit([37.582, -79.048], "SMITH-104");
            addSimulatedTaskForceUnit([37.592, -79.062], "VSP-212");

            document.getElementById('search-map').addEventListener('touchmove', function(e) { e.stopPropagation(); }, { passive: true });
        };

        function addSimulatedTaskForceUnit(coords, nameNumberTag) {
            L.marker(coords, {
                icon: L.divIcon({
                    html: `<div style="background:#00ff33; color:#000; font-family:'Share Tech Mono'; font-weight:bold; padding:2px 6px; border-radius:3px; border:1px solid #fff; font-size:10px; white-space:nowrap;">${nameNumberTag}</div>`,
                    iconSize: [60, 20],
                    iconAnchor: [30, 10]
                })
            }).addTo(mainMap);
        }

        // TRIGGER TREATMENT ARRAYS
        function triggerMedicalProtocol(type) {
            const data = medicalDatabase[type];
            document.getElementById('display-title').innerText = data.title;
            document.getElementById('display-body').innerText = data.text;
            
            const time = new Date().toLocaleTimeString();
            document.getElementById('log-node').innerText = `[${time}] MEDICAL PROTOCOL DEPLOYED: ${type.toUpperCase()}`;
            
            if (type === 'vet') {
                // Drop emergency flashing red dot at the designated medical extraction point
                if (activeCenter) { mainMap.removeLayer(activeCenter); }
                let pulseIcon = L.divIcon({ className: 'pulse-marker', iconSize: [24, 24], iconAnchor: [12, 12] });
                activeCenter = L.marker([37.575, -79.045], { icon: pulseIcon }).addTo(mainMap);
                mainMap.setView([37.575, -79.045], 14);
            }

            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let msg = new SpeechSynthesisUtterance(data.audio);
                window.speechSynthesis.speak(msg);
            }
        }

        // SPEECH INPUT RECOGNITION DRIVER
        function triggerVoiceReceiver() {
            const SpeechEngine = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechEngine) {
                alert("Voice link driver unavailable on this browser setup.");
                return;
            }

            const rec = new SpeechEngine();
            rec.continuous = false;
            rec.lang = 'en-US';

            rec.onstart = function() {
                document.getElementById('mic-node').innerText = "🔊 LISTENING";
                document.getElementById('mic-node').style.background = "#dfb720";
            };

            rec.onend = function() {
                document.getElementById('mic-node').innerText = "🎙️ MIC";
                document.getElementById('mic-node').style.background = "var(--alert-red)";
            };

            rec.onresult = function(event) {
                let textIn = event.results[0][0].transcript.toLowerCase();
                document.getElementById('transcription-node').value = textIn;
                
                // Parse Emergency Directives
                if (textIn.includes("cpr")) { triggerMedicalProtocol('cpr'); }
                else if (textIn.includes("gunshot") || textIn.includes("bleeding")) { triggerMedicalProtocol('gunshot'); }
                else if (textIn.includes("heat") || textIn.includes("temperature")) { triggerMedicalProtocol('heat'); }
                else if (textIn.includes("snake")) { triggerMedicalProtocol('snake'); }
                else if (textIn.includes("vet")) { triggerMedicalProtocol('vet'); }
                else if (textIn.includes("pull up") || textIn.includes("address") || textIn.includes("location")) {
                    let searchAddr = textIn.replace("pull up", "").replace("address", "").replace("tac", "").trim();
                    executeGeoCordonLock(searchAddr);
                }
            };
            rec.start();
        }

        // LIGHTWEIGHT RADAR AREA CORDON CALCULATOR
        function executeGeoCordonLock(addressStr) {
            if (!addressStr) return;
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addressStr)}`)
                .then(res => res.json())
                .then(data => {
                    if (data && data.length > 0) {
                        const lat = parseFloat(data[0].lat);
                        const lon = parseFloat(data[0].lon);
                        
                        if (activeCenter) { mainMap.removeLayer(activeCenter); }
                        if (activeCordon) { mainMap.removeLayer(activeCordon); }

                        let pulseIcon = L.divIcon({ className: 'pulse-marker', iconSize: [20, 20], iconAnchor: [10, 10] });
                        activeCenter = L.marker([lat, lon], { icon: pulseIcon }).addTo(mainMap);

                        activeCordon = L.circle([lat, lon], {
                            radius: 804.67, color: '#00ff33', weight: 2, fillColor: '#00ff33', fillOpacity: 0.1
                        }).addTo(mainMap);

                        mainMap.setView([lat, lon], 14);
                        document.getElementById('display-title').innerText = "📍 SEARCH EPICENTER LOCKED";
                        document.getElementById('display-body').innerText = `Perimeter 1/2 mile cordon established around: ${addressStr}`;
                        
                        if ('speechSynthesis' in window) {
                            window.speechSynthesis.cancel();
                            window.speechSynthesis.speak(new SpeechSynthesisUtterance("Search perimeter locked. There you go, sir."));
                        }
                    }
                }).catch(e => console.log(e));
        }

        function triggerCenterSearch() {
            // Instantly fly map view straight back to center operational layout
            mainMap.setView([37.5857, -79.0517], 13);
            const time = new Date().toLocaleTimeString();
            document.getElementById('log-node').innerText = `[${time}] RADAR LOCK RESET TO COMMAND BASELINE`;
        }
    </script>
</body>
</html>
