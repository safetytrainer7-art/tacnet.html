
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TACNET - STABILITY TEST DECK</title>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            background-color: #000000; 
            color: #00ff33; 
            font-family: monospace; 
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* SIMPLE TWO-PAGE SYSTEM */
        .app-page {
            display: none; 
            width: 100%;
            height: 100%;
            padding: 20px;
            flex-direction: column;
            justify-content: center;
        }
        
        /* FORCE PAGE TO SHOW WHEN ACTIVE */
        .active-page {
            display: flex !important; 
        }

        /* PAGE 1 DESIGN ELEMENTS */
        .test-card {
            border: 2px solid #dfb720;
            background: #121212;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 { color: #dfb720; font-size: 2rem; margin-bottom: 10px; }
        p { color: #ffffff; font-size: 1rem; margin-bottom: 5px; }

        .test-trigger-btn {
            background: #00ff33;
            color: #000000;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 0 10px #00ff33;
        }

        /* PAGE 2 DESIGN ELEMENTS */
        .return-btn {
            background: transparent;
            border: 1px solid #dfb720;
            color: #dfb720;
            padding: 10px;
            font-size: 1rem;
            border-radius: 4px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="app-page active-page" id="screen-1">
        <div class="test-card">
            <h1>TACNET</h1>
            <p>STABILITY TEST CONSOLE</p>
            <p style="color:#00ff33; margin-top:15px;">DESIGN SPECCED BY:</p>
            <p style="font-weight:bold;">DEPUTY EARL A. WOOD (RET)</p>
        </div>

        <button class="test-trigger-btn" onclick="switchTestScreen(2)">👉 TAP TO TEST RECON PAGE</button>
    </div>

    <div class="app-page" id="screen-2">
        <div class="test-card" style="border-color:#ff0033;">
            <h1 style="color:#ff0033;">PAGE 2 LIVE</h1>
            <p>If you can read this, your phone's multi-page router link is 100% operational.</p>
        </div>

        <button class="return-btn" onclick="switchTestScreen(1)">⬅️ RETURN TO PORTAL</button>
    </div>

    <script>
        // BACK-TO-BASICS PAGE SWITCHER
        function switchTestScreen(screenNum) {
            // Hide both screens completely
            document.getElementById('screen-1').classList.remove('active-page');
            document.getElementById('screen-2').classList.remove('active-page');
            
            // Force open only the requested screen
            if(screenNum === 1) {
                document.getElementById('screen-1').classList.add('active-page');
            } else if(screenNum === 2) {
                document.getElementById('screen-2').classList.add('active-page');
            }
        }
    </script>
</body>
</html>
