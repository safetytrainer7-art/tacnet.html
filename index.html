
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TACNET CORE</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
    margin:0;
    background:#102414;
    color:white;
    font-family:Arial,sans-serif;
}

.header{
    background:#132d18;
    padding:15px;
    text-align:center;
}

.header h1{
    margin:0;
    color:#ffd700;
    font-size:34px;
}

.controls{
    padding:10px;
    background:#18361f;
}

input,select{
    width:100%;
    padding:14px;
    margin-bottom:10px;
    border:none;
    border-radius:8px;
    font-size:18px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    margin-bottom:10px;
    border:none;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;
}

.searchBtn{
    background:#2cff88;
}

.perimeterBtn{
    background:#0077ff;
    color:white;
}

.sosBtn{
    background:red;
    color:white;
}

#map{
    height:70vh;
    width:100%;
}

.status{
    text-align:center;
    padding:10px;
    background:#132d18;
}

</style>
</head>

<body>

<div class="header">
<h1>TACNET</h1>
<p>CORE SYSTEM ONLINE</p>
</div>

<div class="controls">

<select id="unitType">

<option value="blue">
LAW ENFORCEMENT
</option>

<option value="#66ccff">
K9 UNIT
</option>

<option value="red">
SEARCH & RESCUE
</option>

<option value="#00ff88">
CIVILIAN
</option>

<option value="purple">
PERSON OF INTEREST
</option>

</select>

<input
type="text"
id="address"
placeholder="Enter Address">

<button
class="searchBtn"
onclick="searchLocation()">
SEARCH LOCATION
</button>

<button
class="perimeterBtn"
onclick="drawPerimeter()">
CREATE PERIMETER
</button>

<button
class="sosBtn"
onclick="sosAlert()">
SOS OFFICER DOWN
</button>

</div>

<div id="map"></div>

<div class="status" id="status">
Initializing GPS...
</div>

<script>

let map;
let userMarker;
let perimeterCircle;

function initMap(){

    map = L.map('map').setView([37.4138,-79.1422],13);

    L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        attribution:'OpenStreetMap'
    }).addTo(map);

    if(navigator.geolocation){

        navigator.geolocation.getCurrentPosition(

        function(position){

            let lat = position.coords.latitude;
            let lon = position.coords.longitude;

            map.setView([lat,lon],15);

            userMarker =
            L.marker([lat,lon])
            .addTo(map)
            .bindPopup("YOUR LOCATION")
            .openPopup();

            document.getElementById("status").innerHTML =
            "GPS CONNECTED";

        },

        function(){

            document.getElementById("status").innerHTML =
            "GPS FAILED";

        });

    }

    enableDeployment();

}

function enableDeployment(){

    map.on('click', function(e){

        let color =
        document.getElementById("unitType").value;

        L.circleMarker(
        [e.latlng.lat,e.latlng.lng],
        {
            radius:10,
            color:color,
            fillColor:color,
            fillOpacity:0.9
        })

        .addTo(map)

        .bindPopup("DEPLOYED UNIT");

    });

}

function drawPerimeter(){

    if(!userMarker){
        alert("GPS not available");
        return;
    }

    let pos = userMarker.getLatLng();

    if(perimeterCircle){
        map.removeLayer(perimeterCircle);
    }

    perimeterCircle =
    L.circle(pos,{
        radius:1609,
        color:'red',
        fillColor:'#f03',
        fillOpacity:0.2
    }).addTo(map);

    map.fitBounds(perimeterCircle.getBounds());

}

function sosAlert(){

    alert("SOS ALERT ACTIVATED");

}

function searchLocation(){

    let address =
    document.getElementById("address").value;

    fetch(
    'https://nominatim.openstreetmap.org/search?format=json&q='
    + encodeURIComponent(address))

    .then(response => response.json())

    .then(data => {

        if(data.length > 0){

            let lat = data[0].lat;
            let lon = data[0].lon;

            map.setView([lat,lon],15);

            L.marker([lat,lon])
            .addTo(map)
            .bindPopup(address)
            .openPopup();

        }else{

            alert("Address not found");

        }

    });

}

initMap();

</script>

</body>
</html>
