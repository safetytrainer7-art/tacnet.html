<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>TACNET COMMAND</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
background:#000;
color:#fff;
font-family:sans-serif;
margin:0;
padding:0;
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

/* HOME PAGE */

#home-page{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:9999;
background:#0d160d;
padding:20px;
box-sizing:border-box;
text-align:center;
display:block;
}

.logo{
color:#D4AF37;
font-size:3.5em;
font-weight:900;
margin-bottom:0;
text-shadow:0 0 15px #000;
}

.subtext{
color:#ebff00;
font-weight:bold;
margin-top:5px;
}

.input-box{
width:90%;
max-width:400px;
background:#000;
border:1px solid #39FF14;
color:#39FF14;
padding:15px;
margin:10px 0;
font-family:monospace;
font-size:1em;
}

.deploy-btn{
width:90%;
max-width:400px;
background:#D4AF37;
color:#000;
border:none;
padding:20px;
font-weight:bold;
cursor:pointer;
font-size:1em;
}

.deploy-btn:active{
background:#39FF14;
}

/* HUD */

#hud-container{
display:none;
flex-direction:column;
height:100vh;
}

#map-display{
flex-grow:1;
width:100%;
}

/* COMMAND TRAY */

.command-tray{
height:180px;
background:#111;
border-top:2px solid #D4AF37;
display:grid;
grid-template-columns:1fr 1fr;
gap:5px;
padding:10px;
box-sizing:border-box;
}

.tool-btn{
background:#222;
color:#D4AF37;
border:1px solid #444;
font-weight:bold;
font-size:0.8em;
display:flex;
align-items:center;
justify-content:center;
text-transform:uppercase;
cursor:pointer;
}

.tool-btn:active{
background:#39FF14;
color:#000;
}

</style>
</head>

<body>

<!-- HOME PAGE -->

<div id="home-page">

<h1 class="logo">TACNET</h1>

<p class="subtext">
ONE NET. ALL AGENCIES.
</p>

<div style="
border-left:3px solid #D4AF37;
padding:10px;
margin:20px auto;
max-width:400px;
">

<input
type="text"
id="inc-name"
class="input-box"
placeholder="INCIDENT TYPE">

<input
type="text"
id="unit-id"
class="input-box"
placeholder="OPERATOR CALLSIGN">

<input
type="password"
id="demo-code"
class="input-box"
placeholder="SECURE ACCESS CODE">

<button
class="deploy-btn"
onclick="deployNet()">

[ INITIALIZE DEPLOYMENT ]

</button>

</div>

<div style="
position:absolute;
bottom:15px;
width:100%;
left:0;
color:#39FF14;
font-size:0.8em;
font-family:monospace;
">

APP CREATOR EARL A. WOOD
DEPUTY SHERIFF RETIRED

</div>

</div>

<!-- HUD -->

<div id="hud-container">

<div id="map-display"></div>

<div class="command-tray">

<div class="tool-btn"
onclick="startPerimeter()">

SET PERIMETER

</div>

<div class="tool-btn"
onclick="logEvidence()">

MARK EVIDENCE

</div>

<div class="tool-btn"
onclick="alert('FINAL DISPOSITION COMING SOON')">

FINAL DISPOSITION

</div>

<div class="tool-btn"
onclick="location.reload()"
style="color:#ff4444;">

TERMINATE SEARCH

</div>

</div>

</div>

<script>

var map;
var perimActive = false;
var markers = [];
var polyline;

/* DEPLOY */

function deployNet(){

const validCode = "TACNET-DEMO-0515";

const enteredCode =
document.getElementById('demo-code').value;

if(enteredCode !== validCode){

alert("INVALID ACCESS CODE");

return;
}

if(!document.getElementById('inc-name').value){

alert("INCIDENT TYPE REQUIRED");

return;
}

document.getElementById('home-page').style.display='none';

document.getElementById('hud-container').style.display='flex';

/* MAP */

map = L.map('map-display',{
zoomControl:false
}).setView([37.5,-79.0],13);

L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
).addTo(map);

/* GPS */

map.locate({
setView:true,
watch:true,
enableHighAccuracy:true
});

map.on('locationfound', function(e){

L.circle(e.latlng,{
radius:10,
color:'#00aaff'
}).addTo(map)
.bindPopup('ACTIVE TACNET UNIT')
.openPopup();

});

}

/* PERIMETER */

function startPerimeter(){

perimActive = !perimActive;

if(perimActive){

alert("CLICK MAP TO DRAW PERIMETER");

}

map.on('click', function(e){

if(!perimActive) return;

L.circleMarker(e.latlng,{
radius:5,
color:'#39FF14'
}).addTo(map);

markers.push(e.latlng);

if(polyline){

map.removeLayer(polyline);

}

polyline = L.polyline(markers,{
color:'#39FF14',
weight:4
}).addTo(map);

});

}

/* EVIDENCE */

function logEvidence(){

map.locate().on('locationfound', function(e){

L.circleMarker(e.latlng,{
radius:10,
color:'#D4AF37'
})
.addTo(map)
.bindPopup("EVIDENCE LOGGED")
.openPopup();

});

}

</script>

</body>
</html>
