<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>TACNET MASTER</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<script
src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<style>

*{
box-sizing:border-box;
}

html,body{

margin:0;
padding:0;

width:100%;
height:100%;

overflow:hidden;

background:#050b12;

font-family:Arial,sans-serif;

color:white;
}

/* MAP */

#map{

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

z-index:1;

background:#07131d;
}

/* VIEWPORT */

.viewport{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:94vw;
height:92vh;

border:2px solid #00e5ff;

border-radius:26px;

box-shadow:
0 0 20px rgba(0,229,255,0.25),
0 0 60px rgba(0,229,255,0.12);

pointer-events:none;

z-index:2;
}

/* HEADER */

.header{

position:absolute;

top:10px;
left:50%;

transform:translateX(-50%);

width:92%;

height:56px;

z-index:3000;

background:rgba(0,0,0,0.75);

border:1px solid rgba(0,229,255,0.3);

border-radius:18px;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 14px;
}

.logo h1{

margin:0;

font-size:20px;

letter-spacing:3px;

color:#00e5ff;
}

.logo p{

margin:0;

font-size:9px;

color:#9befff;
}

.status{

text-align:right;

font-size:10px;

color:#9befff;
}

/* SEARCH */

.searchBox{

position:absolute;

top:74px;
left:50%;

transform:translateX(-50%);

width:72%;

display:flex;

gap:8px;

z-index:3000;
}

.searchBox input{

flex:1;

padding:12px;

border:none;

border-radius:14px;

background:rgba(0,0,0,0.75);

border:1px solid rgba(0,229,255,0.25);

color:white;

font-size:14px;
}

.searchBtn{

width:72px;

border:none;

border-radius:14px;

background:rgba(0,229,255,0.2);

border:1px solid #00e5ff;

color:white;

font-weight:bold;
}

/* MAP MODES */

.mapModes{

position:absolute;

top:122px;
left:50%;

transform:translateX(-50%);

display:flex;

gap:6px;

z-index:3000;
}

.mapModes button{

width:70px;
height:30px;

border:none;

border-radius:10px;

background:rgba(0,0,0,0.78);

border:1px solid rgba(0,229,255,0.25);

color:#00e5ff;

font-size:10px;

font-weight:bold;
}

/* MISSION PANEL */

.missionPanel{

position:absolute;

top:164px;
left:50%;

transform:translateX(-50%);

width:250px;

padding:10px;

background:rgba(0,0,0,0.82);

border:1px solid rgba(0,229,255,0.25);

border-radius:18px;

z-index:3000;

display:flex;

flex-direction:column;

gap:8px;
}

.missionPanel input,
.missionPanel select{

padding:10px;

border:none;

border-radius:10px;

background:#09141d;

color:white;

font-size:12px;
}

.missionPanel button{

height:38px;

border:none;

border-radius:12px;

background:#00e5ff;

color:black;

font-weight:bold;
}

#missionStatus{

font-size:11px;

color:#9befff;

text-align:center;
}

/* CONTROLS */

.leftControls,
.rightControls,
.bottomControls{

position:absolute;

z-index:3000;

display:flex;

gap:8px;
}

.leftControls{

left:10px;

top:52%;

transform:translateY(-50%);

flex-direction:column;
}

.rightControls{

right:10px;

top:52%;

transform:translateY(-50%);

flex-direction:column;
}

.bottomControls{

bottom:12px;

left:50%;

transform:translateX(-50%);
}

/* BUTTONS */

.toolBtn{

width:68px;
height:40px;

border:none;

border-radius:12px;

background:rgba(0,0,0,0.78);

border:1px solid rgba(255,255,255,0.1);

color:white;

font-size:11px;

font-weight:bold;
}

.law{ color:#1e90ff; }
.k9{ color:#00e5ff; }
.sar{ color:#ff9500; }
.civ{ color:#00ffaa; }
.poi{ color:#ff00aa; }
.evid{ color:#ffffff; }
.perim{ color:#ffbb33; }
.reset{ color:#ff3377; }

/* DRAWER */

.drawerTab{

position:absolute;

top:190px;
right:0;

width:38px;
height:120px;

background:rgba(0,0,0,0.85);

border-left:1px solid #00e5ff;

border-top:1px solid #00e5ff;

border-bottom:1px solid #00e5ff;

border-radius:14px 0 0 14px;

z-index:4000;

display:flex;

justify-content:center;

align-items:center;

writing-mode:vertical-rl;

font-size:11px;

font-weight:bold;

color:#00e5ff;
}

.drawer{

position:absolute;

top:180px;
right:-210px;

width:210px;

height:260px;

background:rgba(0,0,0,0.92);

border-left:1px solid #00e5ff;

border-top:1px solid #00e5ff;

border-bottom:1px solid #00e5ff;

border-radius:18px 0 0 18px;

z-index:3500;

padding:12px;

overflow-y:auto;

transition:right 0.3s ease;
}

.drawer.active{

right:0;
}

.drawer h3{

margin-top:0;

color:#00e5ff;

font-size:14px;
}

.unitEntry{

margin-bottom:10px;

padding-bottom:8px;

border-bottom:1px solid rgba(255,255,255,0.08);

font-size:11px;
}

/* COMPASS */

.compass{

position:absolute;

top:190px;
left:10px;

width:54px;
height:54px;

border-radius:50%;

background:rgba(0,0,0,0.75);

border:2px solid #00e5ff;

color:#00e5ff;

display:flex;

justify-content:center;

align-items:center;

font-size:20px;

z-index:3000;
}

</style>

</head>

<body>

<div id="map"></div>

<div class="viewport"></div>

<div class="header">

<div class="logo">

<h1>TACNET</h1>

<p>FEDERAL • STATE • LOCAL</p>

</div>

<div class="status">

GPS ONLINE<br>
COMMAND ACTIVE

</div>

</div>

<div class="searchBox">

<input
id="address"
type="text"
placeholder="Search Address">

<button
class="searchBtn"
onclick="searchLocation()">

GO

</button>

</div>

<!-- MAP MODES -->

<div class="mapModes">

<button onclick="setStreet()">
STREET
</button>

<button onclick="setSatellite()">
SAT
</button>

<button onclick="setTerrain()">
TERRAIN
</button>

<button onclick="setNight()">
NIGHT
</button>

</div>

<!-- MISSION PANEL -->

<div class="missionPanel">

<input
id="opName"
type="text"
placeholder="Operation Name">

<input
id="suspect"
type="text"
placeholder="Suspect">

<input
id="direction"
type="text"
placeholder="Last Direction">

<select id="riskLevel">

<option>LOW RISK</option>
<option>MEDIUM RISK</option>
<option>HIGH RISK</option>

</select>

<button onclick="startMission()">
START OP
</button>

<div id="missionStatus">

NO ACTIVE OPERATION

</div>

</div>

<!-- LEFT -->

<div class="leftControls">

<button class="toolBtn law">
LAW
</button>

<button class="toolBtn k9">
K9
</button>

<button class="toolBtn sar">
SAR
</button>

</div>

<!-- RIGHT -->

<div class="rightControls">

<button class="toolBtn civ">
CIV
</button>

<button class="toolBtn poi">
POI
</button>

<button class="toolBtn evid">
EVID
</button>

</div>

<!-- BOTTOM -->

<div class="bottomControls">

<button
class="toolBtn perim"
onclick="enablePerimeter()">

PERIM

</button>

<button
class="toolBtn reset"
onclick="resetMap()">

RESET

</button>

</div>

<!-- COMPASS -->

<div class="compass">
N
</div>

<!-- DRAWER TAB -->

<div
class="drawerTab"
onclick="toggleDrawer()">

UNITS

</div>

<!-- DRAWER -->

<div
class="drawer"
id="drawer">

<h3>ACTIVE UNITS</h3>

<div id="unitList"></div>

</div>

<script>

/* MAP */

const map = L.map('map').setView(
[37.4138,-79.1422],
13
);

/* TILE SYSTEM */

let currentLayer;

function setLayer(url,maxZoom=19){

if(currentLayer){

map.removeLayer(currentLayer);

}

currentLayer = L.tileLayer(url,{

maxZoom:maxZoom,

attribution:'Map'

});

currentLayer.addTo(map);

}

/* DEFAULT */

setStreet();

/* MAP MODES */

function setStreet(){

setLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
);

}

function setSatellite(){

setLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
);

}

function setTerrain(){

setLayer(
'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
17
);

}

function setNight(){

setLayer(
'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
20
);

}

/* RENDER FIX */

window.addEventListener('load', function(){

setTimeout(function(){

map.invalidateSize();

},700);

});

/* GPS */

navigator.geolocation.getCurrentPosition(

function(pos){

map.setView(
[
pos.coords.latitude,
pos.coords.longitude
],
15
);

}

);

/* SEARCH */

function searchLocation(){

const address =
document.getElementById('address').value;

fetch(
'https://nominatim.openstreetmap.org/search?format=json&q='
+ encodeURIComponent(address)
)

.then(response => response.json())

.then(data => {

if(data.length > 0){

const lat =
parseFloat(data[0].lat);

const lon =
parseFloat(data[0].lon);

map.setView([lat,lon],15);

}

});

}

/* DRAWER */

function toggleDrawer(){

document
.getElementById('drawer')
.classList.toggle('active');

}

/* MISSION */

let missionActive = false;

let missionStart;

function startMission(){

const op =
document.getElementById('opName').value;

const suspect =
document.getElementById('suspect').value;

const direction =
document.getElementById('direction').value;

const risk =
document.getElementById('riskLevel').value;

missionStart =
new Date();

missionActive = true;

document
.getElementById('missionStatus')

.innerHTML =

'<b>ACTIVE:</b> ' + op +

'<br>SUSPECT: ' + suspect +

'<br>DIRECTION: ' + direction +

'<br>RISK: ' + risk +

'<br>STARTED: ' +

missionStart.toLocaleTimeString();

}

/* UNIT SYSTEM */

let activeColor = '#1e90ff';

let activeUnit = 'LAW';

let unitCounter = 1;

/* BUTTONS */

document
.querySelectorAll('.toolBtn')

.forEach(btn => {

btn.addEventListener('click', function(){

if(this.classList.contains('law')){

activeColor = '#1e90ff';
activeUnit = 'LAW';
}

if(this.classList.contains('k9')){

activeColor = '#00e5ff';
activeUnit = 'K9';
}

if(this.classList.contains('sar')){

activeColor = '#ff9500';
activeUnit = 'SAR';
}

if(this.classList.contains('civ')){

activeColor = '#00ffaa';
activeUnit = 'CIV';
}

if(this.classList.contains('poi')){

activeColor = '#ff00aa';
activeUnit = 'POI';
}

if(this.classList.contains('evid')){

activeColor = '#ffffff';
activeUnit = 'EVID';
}

});

});

/* PERIMETER */

let perimeterMode = false;

function enablePerimeter(){

perimeterMode = true;

}

/* MAP EVENTS */

map.on('click', function(e){

if(perimeterMode){

L.circle(

[e.latlng.lat,e.latlng.lng],

{
radius:300,

color:'#ffbb33',

fillColor:'#ffbb33',

fillOpacity:0.15
}

)

.addTo(map);

perimeterMode = false;

}else{

const marker = L.circleMarker(

[e.latlng.lat,e.latlng.lng],

{
radius:10,

color:'#ffffff',

weight:2,

fillColor:activeColor,

fillOpacity:1
}

)

.addTo(map);

const unitID =
activeUnit + '-' + unitCounter;

unitCounter++;

const time =
new Date().toLocaleTimeString();

marker.bindPopup(

'<b>' + unitID + '</b><br>' +

'TIME: ' + time

)

.openPopup();

/* DRAWER ENTRY */

const entry =
document.createElement('div');

entry.className = 'unitEntry';

entry.innerHTML =

'<b>' + unitID + '</b><br>' +

'TIME: ' + time;

document
.getElementById('unitList')
.prepend(entry);

}

});

/* RESET */

function resetMap(){

location.reload();

}

</script>

</body>
</html>
