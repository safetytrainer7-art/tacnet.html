<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TACNET COMMAND</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<style>

*{
    box-sizing:border-box;
}

html,body{

    margin:0;
    padding:0;

    width:100%;
    height:100%;

    overflow:hidden;

    background:#050b12;

    font-family:Arial,sans-serif;

    color:white;
}

/* MAP */

#map{

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:100%;

    z-index:1;
}

/* VIEWPORT */

.viewport{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    width:94vw;
    height:92vh;

    border:2px solid #00e5ff;

    border-radius:26px;

    box-shadow:
    0 0 20px rgba(0,229,255,0.3),
    0 0 60px rgba(0,229,255,0.15);

    z-index:2;

    pointer-events:none;
}

/* HEADER */

.header{

    position:absolute;

    top:12px;
    left:50%;

    transform:translateX(-50%);

    width:92%;

    height:60px;

    z-index:3000;

    background:rgba(0,0,0,0.72);

    border:1px solid rgba(0,229,255,0.35);

    border-radius:18px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:0 16px;

    backdrop-filter:blur(10px);
}

.logo h1{

    margin:0;

    font-size:22px;

    color:#00e5ff;

    letter-spacing:3px;
}

.logo p{

    margin:0;

    font-size:10px;

    color:#9befff;
}

.status{

    text-align:right;

    font-size:11px;

    color:#9befff;
}

/* SEARCH */

.searchBox{

    position:absolute;

    top:84px;
    left:50%;

    transform:translateX(-50%);

    width:74%;

    display:flex;

    gap:10px;

    z-index:3000;
}

.searchBox input{

    flex:1;

    padding:14px;

    border:none;

    border-radius:14px;

    background:rgba(0,0,0,0.72);

    border:1px solid rgba(0,229,255,0.3);

    color:white;

    font-size:16px;
}

.searchBtn{

    width:90px;

    border:none;

    border-radius:14px;

    background:rgba(0,229,255,0.2);

    border:1px solid #00e5ff;

    color:white;

    font-weight:bold;

    font-size:15px;
}

/* CONTROLS */

.leftControls,
.rightControls,
.bottomControls{

    position:absolute;

    z-index:3000;

    display:flex;

    gap:10px;
}

.leftControls{

    left:12px;

    top:50%;

    transform:translateY(-50%);

    flex-direction:column;
}

.rightControls{

    right:12px;

    top:50%;

    transform:translateY(-50%);

    flex-direction:column;
}

.bottomControls{

    bottom:14px;

    left:50%;

    transform:translateX(-50%);

    flex-direction:row;
}

/* BUTTONS */

.toolBtn{

    width:92px;
    height:54px;

    border:none;

    border-radius:16px;

    background:rgba(0,0,0,0.74);

    border:1px solid rgba(255,255,255,0.14);

    color:white;

    font-weight:bold;

    font-size:14px;

    backdrop-filter:blur(10px);
}

.law{ color:#1e90ff; }

.k9{ color:#00e5ff; }

.sar{ color:#ff9500; }

.civ{ color:#00ffaa; }

.poi{ color:#ff00aa; }

.evid{ color:#ffffff; }

.perim{ color:#ffbb33; }

.reset{ color:#ff3377; }

/* WEATHER */

.weather{

    position:absolute;

    top:160px;
    right:14px;

    width:160px;

    padding:12px;

    z-index:3000;

    border-radius:16px;

    background:rgba(0,0,0,0.72);

    border:1px solid rgba(0,229,255,0.25);

    font-size:12px;
}

/* COMPASS */

.compass{

    position:absolute;

    top:160px;
    left:14px;

    width:72px;
    height:72px;

    border-radius:50%;

    background:rgba(0,0,0,0.72);

    border:2px solid #00e5ff;

    color:#00e5ff;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:28px;

    z-index:3000;
}

</style>

</head>

<body>

<div id="map"></div>

<div class="viewport"></div>

<!-- HEADER -->

<div class="header">

    <div class="logo">

        <h1>TACNET</h1>

        <p>FEDERAL • STATE • LOCAL</p>

    </div>

    <div class="status">

        GPS ONLINE<br>
        COMMAND ACTIVE

    </div>

</div>

<!-- SEARCH -->

<div class="searchBox">

    <input
    id="address"
    type="text"
    placeholder="Search Address">

    <button
    class="searchBtn"
    onclick="searchLocation()">

    GO

    </button>

</div>

<!-- LEFT -->

<div class="leftControls">

    <button class="toolBtn law">
    LAW
    </button>

    <button class="toolBtn k9">
    K9
    </button>

    <button class="toolBtn sar">
    SAR
    </button>

</div>

<!-- RIGHT -->

<div class="rightControls">

    <button class="toolBtn civ">
    CIV
    </button>

    <button class="toolBtn poi">
    POI
    </button>

    <button class="toolBtn evid">
    EVID
    </button>

</div>

<!-- BOTTOM -->

<div class="bottomControls">

    <button
    class="toolBtn perim"
    onclick="enablePerimeter()">

    PERIM

    </button>

    <button
    class="toolBtn reset"
    onclick="resetMap()">

    RESET

    </button>

</div>

<!-- COMPASS -->

<div class="compass">
N
</div>

<!-- WEATHER -->

<div class="weather">

Wind: 8 MPH NW<br>
Temp: 61°F<br>
Clear Conditions

</div>

<script>

/* MAP */

const map = L.map('map').setView(
[37.4138,-79.1422],
13
);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution:'OpenStreetMap'
}
).addTo(map);

/* MOBILE FIX */

setTimeout(function(){

    map.invalidateSize();

},600);

/* GPS */

navigator.geolocation.getCurrentPosition(

function(pos){

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    map.setView([lat,lon],15);

    L.marker([lat,lon])

    .addTo(map)

    .bindPopup('COMMAND POSITION')

    .openPopup();

}

);

/* SEARCH */

function searchLocation(){

    const address =
    document.getElementById('address').value;

    fetch(
    'https://nominatim.openstreetmap.org/search?format=json&q='
    + encodeURIComponent(address)
    )

    .then(response => response.json())

    .then(data => {

        if(data.length > 0){

            const lat =
            parseFloat(data[0].lat);

            const lon =
            parseFloat(data[0].lon);

            map.setView([lat,lon],15);

            L.marker([lat,lon])

            .addTo(map)

            .bindPopup(address)

            .openPopup();

        }

    });

}

/* UNIT SYSTEM */

let activeColor = '#1e90ff';

let activeUnit = 'LAW';

let unitCounter = 1;

/* BUTTONS */

document
.querySelectorAll('.toolBtn')

.forEach(btn => {

    btn.addEventListener('click', function(){

        if(this.classList.contains('law')){

            activeColor = '#1e90ff';
            activeUnit = 'LAW';
        }

        if(this.classList.contains('k9')){

            activeColor = '#00e5ff';
            activeUnit = 'K9';
        }

        if(this.classList.contains('sar')){

            activeColor = '#ff9500';
            activeUnit = 'SAR';
        }

        if(this.classList.contains('civ')){

            activeColor = '#00ffaa';
            activeUnit = 'CIV';
        }

        if(this.classList.contains('poi')){

            activeColor = '#ff00aa';
            activeUnit = 'POI';
        }

        if(this.classList.contains('evid')){

            activeColor = '#ffffff';
            activeUnit = 'EVID';
        }

    });

});

/* PERIMETER */

let perimeterMode = false;

function enablePerimeter(){

    perimeterMode = true;

}

/* MAP ACTION */

map.on('click', function(e){

    if(perimeterMode){

        L.circle(

        [e.latlng.lat,e.latlng.lng],

        {
            radius:300,

            color:'#ffbb33',

            fillColor:'#ffbb33',

            fillOpacity:0.15
        })

        .addTo(map);

        perimeterMode = false;

    }else{

        const marker = L.circleMarker(

        [e.latlng.lat,e.latlng.lng],

        {
            radius:10,

            color:'#ffffff',

            weight:2,

            fillColor:activeColor,

            fillOpacity:1
        })

        .addTo(map);

        const unitID =
        activeUnit + '-' + unitCounter;

        unitCounter++;

        const time =
        new Date().toLocaleTimeString();

        marker.bindPopup(

        '<b>' + unitID + '</b><br>' +

        'TIME: ' + time

        );

    }

});

/* RESET */

function resetMap(){

    location.reload();

}

</script>

</body>
</html>
