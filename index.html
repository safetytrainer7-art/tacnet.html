<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TACNET - HIGH VISIBILITY PATROL HUD</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --pure-black: #000000;
            --neon-green: #00ff33;
            --gold-primary: #dfb720;
            --alert-red: #ff0033;
            --dark-gray: #151515;
            --police-blue: #0044ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--pure-black); 
            color: var(--neon-green); 
            font-family: 'Share Tech Mono', monospace; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 8px;
            padding-top: calc(8px + env(safe-area-inset-top));
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
        }

        /* SIMPLIFIED BANNER */
        .header-frame {
            border-bottom: 2px solid var(--neon-green);
            padding-bottom: 4px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-frame h1 { 
            font-family: 'Black Ops One', sans-serif; 
            color: var(--gold-primary); 
            font-size: 1.6rem; 
        }
        .header-frame span {
            font-size: 0.8rem;
            color: #ffffff;
            font-weight: bold;
        }

        /* HIGH-STABILITY MAP BOX */
        .map-wrapper {
            height: 45vh; /* Fixed height keeps layout stable on iOS */
            width: 100%;
            border: 2px solid var(--neon-green);
            border-radius: 6px;
            background: #000;
            margin-bottom: 8px;
            overflow: hidden;
        }
        #search-map {
            width: 100%;
            height: 100%;
        }

        /* HIGH-VISIBILITY SOLID MAP MARKERS */
        .tactical-unit-pin {
            background-color: var(--police-blue);
            color: #ffffff;
            border: 2px solid #ffffff;
            border-radius: 50%;
            font-family: 'Black Ops One', sans-serif;
            font-size: 1.1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 8px rgba(0, 68, 255, 0.8);
        }

        /* VOICE BAR */
        .voice-bar {
            display: flex;
            gap: 8px;
            background: var(--dark-gray);
            padding: 8px;
            border: 1px solid var(--gold-primary);
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .mic-btn {
            background: var(--alert-red);
            color: #fff;
            border: none;
            font-family: 'Black Ops One', sans-serif;
            font-size: 0.9rem;
            padding: 0 16px;
            border-radius: 4px;
            font-weight: bold;
        }
        .voice-input {
            flex-grow: 1;
            background: #000;
            border: 1px solid var(--neon-green);
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            padding: 10px;
            font-size: 1rem;
            border-radius: 4px;
        }

        /* SCROLLABLE MEDICAL READOUT MATRIX */
        .intel-vault {
            background: var(--dark-gray);
            border: 1px solid var(--neon-green);
            padding: 12px;
            border-radius: 6px;
            flex-grow: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; /* Smooth iOS scrolling */
            margin-bottom: 8px;
        }
        .vault-title {
            font-family: 'Black Ops One', sans-serif;
            color: var(--gold-primary);
            font-size: 1.2rem;
            border-bottom: 1px dashed var(--neon-green);
            padding-bottom: 4px;
            margin-bottom: 8px;
        }
        .vault-body {
            color: #ffffff;
            font-size: 1.1rem;
            line-height: 1.5;
            white-space: pre-line;
        }

        /* LARGE DIRECT TAP TARGET EMERGENCY BUTTONS */
        .emergency-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        .emergency-btn {
            background: rgba(255, 0, 51, 0.1);
            border: 2px solid var(--alert-red);
            color: #ff4466;
            padding: 14px 4px;
            font-family: 'Black Ops One', sans-serif;
            font-size: 0.95rem;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
        }
        .emergency-btn:active {
            background: var(--alert-red);
            color: #fff;
        }

        /* PULSING EXTRACTION MARKER EFFECT */
        @keyframes targetPulse {
            0% { transform: scale(0.6); opacity: 1; box-shadow: 0 0 0 0 rgba(255, 0, 51, 0.8); }
            70% { transform: scale(1.3); opacity: 0.5; box-shadow: 0 0 0 10px rgba(255, 0, 51, 0); }
            100% { transform: scale(0.6); opacity: 1; box-shadow: 0 0 0 0 rgba(255, 0, 51, 0); }
        }
        .pulse-marker {
            background: rgba(255, 0, 51, 0.5);
            border: 2px solid #ff0033;
            border-radius: 50%;
            animation: targetPulse 1.2s infinite;
        }
    </style>
</head>
<body>

    <div class="header-frame">
        <h1>TACNET MOBILE SEARCH</h1>
        <span>DEPUTY WOOD ORIGINAL</span>
    </div>

    <div class="map-wrapper">
        <div id="search-map"></div>
    </div>

    <div class="voice-bar">
        <button class="mic-btn" onclick="triggerVoiceReceiver()" id="mic-node">🎙️ MIC</button>
        <input type="text" class="voice-input" id="transcription-node" placeholder="Say: 'TAC, K9 CPR' or location">
    </div>

    <div class="intel-vault">
        <div class="vault-title" id="display-title">TACTICAL COMMAND PANEL</div>
        <div class="vault-body" id="display-body">
            Map display active. Drag map with thumb to pan. Clear solid unit markers 1, 2, and 3 are deployed. Use the mic or tap a button below to activate K9 Emergency First Aid protocols.
        </div>
    </div>

    <div class="emergency-grid">
        <button class="emergency-btn" onclick="triggerMedicalProtocol('cpr')">🐾 1. K9 CPR</button>
        <button class="emergency-btn" onclick="triggerMedicalProtocol('gunshot')">💥 2. GUNSHOT</button>
        <button class="emergency-btn" onclick="triggerMedicalProtocol('heat')">☀️ 3. HEAT STROKE</button>
        <button class="emergency-btn" onclick="triggerMedicalProtocol('snake')">🐍 4. SNAKE BITE</button>
        <button class="emergency-btn" onclick="triggerMedicalProtocol('vet')" style="border-color:var(--gold-primary); color:var(--gold-primary);">🏥 EMERGENCY VET</button>
        <button class="emergency-btn" onclick="resetMapToBaseline()" style="border-color:var(--neon-green); color:var(--neon-green);">🎯 RE-CENTER MAP</button>
    </div>

    <script>
        let mainMap = null;
        let activeCordon = null;
        let activeCenter = null;

        // EMERGENCY RESPONDER MEDICAL DICTIONARY
        const medicalDatabase = {
            cpr: {
                title: "🚨 CRITICAL MANDATE: K9 CPR PROTOCOL",
                text: "• POSITION: Lay dog on RIGHT side.\n• AIRWAY: Open mouth, clear fluid, pull tongue forward.\n• RESCUE BREATHS: Close muzzle completely with hands. Blow 2 breaths directly into the nose.\n• COMPRESSIONS: Compress chest right behind the elbow. Deliver 30 fast compressions (100-120 per minute).\n• RATIO: Continue cycle of 2 breaths to 30 compressions. Recheck femoral pulse every 2 minutes.",
                audio: "K9 CPR protocol initialized. Position the tracking dog on its right side. Clear the oral airway and pull the tongue forward. Seal the muzzle and deliver two breaths directly into the nose, followed immediately by thirty chest compressions behind the elbow structure. Maintain this cycle."
            },
            gunshot: {
                title: "🚨 CRITICAL MANDATE: K9 GUNSHOT / SEVERE HEMORRHAGE",
                text: "• DIRECT PRESSURE: Place clean gauze or hand directly over the wound with maximum force.\n• PACKING: Pack the wound cavity deeply with hemostatic gauze if available.\n• WRAPPING: Apply a firm pressure wrap bandage. Maintain steady pressure.\n• WARNING: Do NOT apply tourniquets to the high-torso or junctional areas where neck meets body.",
                audio: "Gunshot and severe hemorrhage protocol active. Apply immediate heavy direct pressure over the site. Pack the wound cavity deeply with gauze. Apply a tight pressure wrap. Do not attempt tourniquets on high-torso junctional areas."
            },
            heat: {
                title: "🚨 CRITICAL MANDATE: K9 HEAT EXHAUSTION & TEMP STATUS",
                text: "• TARGET METRICS: Alert status at 103 degrees. Deadly emergency threshold at 106 degrees.\n• DEPLOYMENT: Move dog to shade or cooled cruiser interior immediately.\n• COOLING ACTION: Apply lukewarm water to abdomen, armpits, and paw pads. Fan continuously.\n• CRITICAL WARNING: Never use ice water or complete submerge. This constricts blood vessels and traps killer heat inside the core.",
                audio: "Heat exhaustion and body temperature protocol active. Move the dog to shade or air conditioning immediately. Apply lukewarm water to the abdomen, armpits, and paw pads. Never use ice water, as it locks the heat inside the dog's core."
            },
            snake: {
                title: "🚨 CRITICAL MANDATE: K9 SNAKE BITE TREATMENT",
                text: "• MOVEMENT: Restrict dog's physical movement entirely to slow venom spread. Carry the dog.\n• PLACEMENT: Keep the puncture bite site BELOW heart level if possible.\n• FIRST AID: Flush wound with clean water. Do NOT cut the wound, do NOT apply tourniquets, and do NOT try to suck out venom.",
                audio: "Snake bite protocol active. Restrict all physical movement to slow venom travel. Carry the dog to the transport vehicle. Keep the bite site lower than heart level. Do not cut or suction the wound."
            },
            vet: {
                title: "🏥 EXTRACTION EMERGENCY: EMERGENCY VETERINARY ROUTE",
                text: "• AMHERST EMERGENCY VET HOSP\n• CLINICAL ROUTE: Direct vector via US-29 South.\n• TAC ACTION: Radio desk notified to alert trauma staff. Prepare vehicle extraction.",
                audio: "Emergency veterinary extraction vector armed. Route mapped direct via twenty-nine south. Radio room has been updated to alert the clinical trauma staff to prepare for immediate arrival."
            }
        };

        // SETUP ENGINE
        window.onload = function() {
            // High stability configurations - standard dragging completely unlocked
            mainMap = L.map('search-map', { zoomControl: false, dragging: true, tap: false }).setView([37.5857, -79.0517], 13);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 }).addTo(mainMap);
            
            // Build High-Visibility Solid Colored Circular Pins
            deploySolidTacticalPin([37.589, -79.055], "1", "WOOD-K91");
            deploySolidTacticalPin([37.582, -79.048], "2", "SMITH-104");
            deploySolidTacticalPin([37.592, -79.062], "3", "VSP-212");

            // Stop map touch conflicts on phone layouts
            document.getElementById('search-map').addEventListener('touchmove', function(e) { e.stopPropagation(); }, { passive: true });
        };

        function deploySolidTacticalPin(coords, numberDisplay, labelText) {
            L.marker(coords, {
                icon: L.divIcon({
                    className: 'tactical-unit-pin',
                    html: numberDisplay,
                    iconSize: [30, 30],
                    iconAnchor: [15, 15]
                })
            }).addTo(mainMap).bindPopup(`<strong style="font-family:monospace; font-size:14px; color:#000;">${labelText}</strong>`);
        }

        // PROTOCOL TRIGGER PIPELINE
        function triggerMedicalProtocol(type) {
            const proto = medicalDatabase[type];
            document.getElementById('display-title').innerText = proto.title;
            document.getElementById('display-body').innerText = proto.text;
            
            if (type === 'vet') {
                if (activeCenter) { mainMap.removeLayer(activeCenter); }
                let pulseIcon = L.divIcon({ className: 'pulse-marker', iconSize: [26, 26], iconAnchor: [13, 13] });
                activeCenter = L.marker([37.575, -79.045], { icon: pulseIcon }).addTo(mainMap);
                mainMap.setView([37.575, -79.045], 14);
            }

            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let outputMsg = new SpeechSynthesisUtterance(proto.audio);
                window.speechSynthesis.speak(outputMsg);
            }
        }

        // IOS SPEECH RECOGNITION DRIVER
        function triggerVoiceReceiver() {
            const SpeechEngineClass = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechEngineClass) {
                alert("Voice driver link missing on this configuration browser.");
                return;
            }

            const activeRec = new SpeechEngineClass();
            activeRec.continuous = false;
            activeRec.lang = 'en-US';

            activeRec.onstart = function() {
                document.getElementById('mic-node').innerText = "🔊 LISTEN";
                document.getElementById('mic-node').style.background = "#dfb720";
            };

            activeRec.onend = function() {
                document.getElementById('mic-node').innerText = "🎙️ MIC";
                document.getElementById('mic-node').style.background = "var(--alert-red)";
            };

            activeRec.onresult = function(event) {
                let spokenPhrase = event.results[0][0].transcript.toLowerCase();
                document.getElementById('transcription-node').value = spokenPhrase;
                
                if (spokenPhrase.includes("cpr")) { triggerMedicalProtocol('cpr'); }
                else if (spokenPhrase.includes("gunshot") || spokenPhrase.includes("bleed")) { triggerMedicalProtocol('gunshot'); }
                else if (spokenPhrase.includes("heat") || spokenPhrase.includes("temperature")) { triggerMedicalProtocol('heat'); }
                else if (spokenPhrase.includes("snake")) { triggerMedicalProtocol('snake'); }
                else if (spokenPhrase.includes("vet")) { triggerMedicalProtocol('vet'); }
                else if (spokenPhrase.includes("pull up") || spokenPhrase.includes("address") || spokenPhrase.includes("location")) {
                    let extractedLocation = spokenPhrase.replace("pull up", "").replace("address", "").replace("tac", "").trim();
                    executeMobileRadarLock(extractedLocation);
                }
            };
            activeRec.start();
        }

        function executeMobileRadarLock(addressQuery) {
            if (!addressQuery) return;
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addressQuery)}`)
                .then(res => res.json())
                .then(data => {
                    if (data && data.length > 0) {
                        const latPoint = parseFloat(data[0].lat);
                        const lonPoint = parseFloat(data[0].lon);
                        
                        if (activeCenter) { mainMap.removeLayer(activeCenter); }
                        if (activeCordon) { mainMap.removeLayer(activeCordon); }

                        let redPulseIcon = L.divIcon({ className: 'pulse-marker', iconSize: [20, 20], iconAnchor: [10, 10] });
                        activeCenter = L.marker([latPoint, lonPoint], { icon: redPulseIcon }).addTo(mainMap);

                        activeCordon = L.circle([latPoint, lonPoint], {
                            radius: 804.67, color: '#00ff33', weight: 2, fillColor: '#00ff33', fillOpacity: 0.1
                        }).addTo(mainMap);

                        mainMap.setView([latPoint, lonPoint], 14);
                        document.getElementById('display-title').innerText = "📍 TARGET RADAR LOCK";
                        document.getElementById('display-body').innerText = `1/2 Mile Containment Cordon active around target area: ${addressQuery}`;
                        
                        if ('speechSynthesis' in window) {
                            window.speechSynthesis.cancel();
                            window.speechSynthesis.speak(new SpeechSynthesisUtterance("Perimeter cordon established."));
                        }
                    }
                }).catch(err => console.log(err));
        }

        function resetMapToBaseline() {
            mainMap.setView([37.5857, -79.0517], 13);
            document.getElementById('display-title').innerText = "🎯 MAP REGISTER RESET";
            document.getElementById('display-body').innerText = "Map layout focus centered back to target sector baseline view.";
        }
    </script>
</body>
</html>
