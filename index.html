<div class="tool-grid">
    <div class="tool-btn" onclick="toggleOverlay('med-overlay')">K9 MEDIC</div>
    <div class="tool-btn" onclick="toggleOverlay('law-overlay')">CASE LAW</div>
    <div class="tool-btn" onclick="dropMarker('GOLD', 'ARTICLE FOUND')" style="color:#D4AF37;">MARK ARTICLE</div>
    <div class="tool-btn" onclick="startPerimeter()" id="perim-btn">PERIMETER</div>
</div>

<script>
    // THE "ONE NET" REAL-TIME ENGINE
    var netUnits = {}; // This will hold every officer on the net

    function updateNetLocation(lat, lng, callsign) {
        // This function will eventually 'push' your location to the cloud
        console.log("Broadcasting " + callsign + " to the Net...");
    }

    function dropMarker(color, label) {
        map.locate({setView: false}).on('locationfound', function(e) {
            var markerColor = (color == 'GOLD') ? '#D4AF37' : '#39FF14';
            L.circleMarker(e.latlng, {
                radius: 10,
                color: markerColor,
                fillOpacity: 1
            }).addTo(map).bindPopup("<b>" + label + "</b><br>" + new Date().toLocaleTimeString()).openPopup();
            alert(label + " LOGGED AT COORDINATES.");
        });
    }

    // UPDATED DEPLOYMENT LOGIC
    function deployNet() {
        var inc = document.getElementById('inc-name').value;
        var callsign = document.getElementById('unit-id').value || "UNIT-1";
        
        document.getElementById('home-page').style.display = 'none';
        document.getElementById('hud-container').style.display = 'flex';
        
        map = L.map('map-display', { zoomControl: false }).setView([37.52, -79.05], 15);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        // START TRACKING
        map.watchLocation({setView: true, maxZoom: 17});
        
        map.on('locationfound', function(e) {
            // Update your own marker
            if (!netUnits['me']) {
                netUnits['me'] = L.circleMarker(e.latlng, {radius: 8, color: 'red'}).addTo(map);
            } else {
                netUnits['me'].setLatLng(e.latlng);
            }
            // Send to the bridge
            updateNetLocation(e.latlng.lat, e.latlng.lng, callsign);
        });
    }
</script>
