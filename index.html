<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TACNET MOBILE COMMAND</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial,sans-serif;
    overflow:hidden;
    background:#050b12;
    color:white;
}

/* HEADER */

.header{

    position:absolute;

    top:0;
    left:0;
    right:0;

    height:60px;

    background:rgba(5,10,18,0.92);

    border-bottom:1px solid #00e5ff;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:0 15px;

    z-index:3000;

    backdrop-filter:blur(10px);
}

.logo h1{

    margin:0;

    font-size:24px;

    color:#00e5ff;

    letter-spacing:3px;

    text-shadow:0 0 12px #00e5ff;
}

.logo p{

    margin:0;

    font-size:10px;

    color:#8eefff;
}

.status{

    font-size:11px;

    color:#8eefff;

    text-align:right;
}

/* MAP */

#map{

    width:100vw;

    height:100vh;
}

/* SEARCH */

.searchBox{

    position:absolute;

    top:75px;

    left:50%;

    transform:translateX(-50%);

    width:92%;

    z-index:3000;

    display:flex;

    gap:8px;
}

.searchBox input{

    flex:1;

    padding:14px;

    border:none;

    border-radius:14px;

    background:rgba(0,0,0,0.7);

    color:white;

    border:1px solid rgba(0,229,255,0.35);
}

.searchBtn{

    padding:14px 18px;

    border:none;

    border-radius:14px;

    background:rgba(0,229,255,0.2);

    border:1px solid #00e5ff;

    color:white;

    font-weight:bold;
}

/* COMPASS */

.compass{

    position:absolute;

    top:145px;

    right:15px;

    width:75px;

    height:75px;

    border-radius:50%;

    background:rgba(0,0,0,0.65);

    border:2px solid #00e5ff;

    display:flex;

    justify-content:center;

    align-items:center;

    color:#00e5ff;

    font-size:28px;

    z-index:3000;
}

/* WEATHER */

.weather{

    position:absolute;

    bottom:120px;

    right:15px;

    width:170px;

    padding:12px;

    border-radius:16px;

    background:rgba(0,0,0,0.65);

    border:1px solid rgba(0,229,255,0.3);

    z-index:3000;

    font-size:12px;
}

/* FLOATING TOOLS */

.floatingTools{

    position:absolute;

    left:15px;

    bottom:120px;

    z-index:3000;

    display:flex;

    flex-direction:column;

    gap:10px;
}

.floatBtn{

    width:95px;

    height:52px;

    border:none;

    border-radius:14px;

    font-weight:bold;

    color:white;
}

.perimeterBtn{

    background:rgba(255,149,0,0.2);

    border:1px solid #ff9500;
}

.sosBtn{

    background:rgba(255,0,0,0.2);

    border:1px solid #ff3333;
}

/* TOOLBAR */

.toolbar{

    position:absolute;

    bottom:0;

    left:0;

    right:0;

    height:95px;

    background:rgba(5,10,18,0.94);

    border-top:1px solid #00e5ff;

    z-index:3000;

    display:flex;

    overflow-x:auto;

    padding:10px;

    gap:10px;
}

.toolBtn{

    min-width:85px;

    border:none;

    border-radius:16px;

    background:rgba(255,255,255,0.06);

    border:1px solid rgba(255,255,255,0.12);

    font-weight:bold;
}

/* COLORS */

.law{
    color:#1e90ff;
}

.k9{
    color:#00e5ff;
}

.sar{
    color:#ff9500;
}

.civ{
    color:#00ffaa;
}

.poi{
    color:#ff00aa;
}

.ev{
    color:#ffffff;
}

.reset{
    color:#ff3377;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

    <div class="logo">

        <h1>TACNET</h1>

        <p>
        FEDERAL • STATE • LOCAL
        </p>

    </div>

    <div class="status">

        GPS ONLINE<br>
        COMMAND ACTIVE

    </div>

</div>

<!-- SEARCH -->

<div class="searchBox">

    <input
    type="text"
    id="address"
    placeholder="Search Address">

    <button
    class="searchBtn"
    onclick="searchLocation()">

    GO

    </button>

</div>

<!-- COMPASS -->

<div class="compass">
N
</div>

<!-- WEATHER -->

<div class="weather">

Wind: 8 MPH NW<br>
Temp: 61°F<br>
Conditions: Clear

</div>

<!-- FLOATING TOOLS -->

<div class="floatingTools">

    <button
    class="floatBtn perimeterBtn"
    onclick="togglePerimeter()">

    PERIM

    </button>

    <button
    class="floatBtn sosBtn"
    onclick="sosAlert()">

    SOS

    </button>

</div>

<!-- MAP -->

<div id="map"></div>

<!-- TOOLBAR -->

<div class="toolbar">

    <button class="toolBtn law">
    LAW
    </button>

    <button class="toolBtn k9">
    K9
    </button>

    <button class="toolBtn sar">
    SAR
    </button>

    <button class="toolBtn civ">
    CIV
    </button>

    <button class="toolBtn poi">
    POI
    </button>

    <button class="toolBtn ev">
    EVID
    </button>

    <button
    class="toolBtn reset"
    onclick="resetMap()">

    RESET

    </button>

</div>

<script>

/* MAP */

const map = L.map('map').setView(
[37.4138,-79.1422],
13
);

/* MOBILE FIX */

setTimeout(function(){

    map.invalidateSize();

},500);

/* TILES */

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution:'OpenStreetMap'
}
).addTo(map);

/* GPS */

navigator.geolocation.getCurrentPosition(

function(pos){

    const lat =
    pos.coords.latitude;

    const lon =
    pos.coords.longitude;

    map.setView([lat,lon],15);

    L.marker([lat,lon])

    .addTo(map)

    .bindPopup(
    'COMMAND POSITION'
    )

    .openPopup();

}

);

/* SEARCH */

function searchLocation(){

    const address =
    document.getElementById('address').value;

    fetch(
    'https://nominatim.openstreetmap.org/search?format=json&q='
    + encodeURIComponent(address)
    )

    .then(response => response.json())

    .then(data => {

        if(data.length > 0){

            const lat =
            parseFloat(data[0].lat);

            const lon =
            parseFloat(data[0].lon);

            map.setView([lat,lon],15);

            L.marker([lat,lon])

            .addTo(map)

            .bindPopup(address)

            .openPopup();

        }

    });

}

/* SEARCHERS */

let activeColor = '#1e90ff';

document
.querySelectorAll('.toolBtn')

.forEach(btn => {

    btn.addEventListener('click', function(){

        if(this.classList.contains('law'))
        activeColor = '#1e90ff';

        if(this.classList.contains('k9'))
        activeColor = '#00e5ff';

        if(this.classList.contains('sar'))
        activeColor = '#ff9500';

        if(this.classList.contains('civ'))
        activeColor = '#00ffaa';

        if(this.classList.contains('poi'))
        activeColor = '#ff00aa';

        if(this.classList.contains('ev'))
        activeColor = '#ffffff';

    });

});

/* MAP MARKERS */

map.on('click', function(e){

    if(perimeterMode){

        L.circle(

        [e.latlng.lat,e.latlng.lng],

        {
            radius:300,

            color:'#ff9500',

            fillColor:'#ff9500',

            fillOpacity:0.15
        })

        .addTo(map);

    }else{

        L.circleMarker(

        [e.latlng.lat,e.latlng.lng],

        {
            radius:10,

            color:'#ffffff',

            weight:2,

            fillColor:activeColor,

            fillOpacity:1
        })

        .addTo(map);

    }

});

/* PERIMETER */

let perimeterMode = false;

function togglePerimeter(){

    perimeterMode = !perimeterMode;

    if(perimeterMode){

        alert('PERIMETER MODE ACTIVE');

    }else{

        alert('PERIMETER MODE OFF');

    }

}

/* SOS */

function sosAlert(){

    alert('SOS OFFICER DOWN');

    navigator.vibrate?.(500);

}

/* RESET */

function resetMap(){

    location.reload();

}

</script>

</body>
</html>
