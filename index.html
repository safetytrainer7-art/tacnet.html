
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TACNET | MULTI-AGENCY TACTICAL TASK FORCE</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --hunter-green: #1B3022;
            --neon-green: #39FF14;
            --gold: #D4AF37;
            --sos-red: #B22222;
            --glass: rgba(20, 35, 25, 0.9);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #111; color: var(--gold);
            font-family: 'Courier New', Courier, monospace; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* BANNER AREA USING YOUR CUSTOM TNET IMAGE */
        .master-banner {
            background: #000;
            border-bottom: 4px solid var(--neon-green);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100px;
            overflow: hidden;
        }

        .master-banner img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* CONSOLE WORKSPACE */
        .console-body {
            display: flex;
            flex-grow: 1;
            padding: 10px;
            gap: 10px;
            background: #222;
        }

        /* THE LIVE SCREEN HOUSING THE MAP */
        .screen-container {
            flex-grow: 1;
            position: relative;
            border: 4px solid #444;
            background-color: #000;
            box-shadow: inset 0 0 20px #000;
        }

        #live-map {
            width: 100%; height: 100%;
        }

        /* CUSTOM CONTROLS OVERLAY ON THE RIGHT */
        .control-panel {
            width: 240px;
            background: #333;
            border: 3px solid #5a5a5a;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .panel-heading {
            background: #111;
            padding: 5px;
            text-align: center;
            font-weight: bold;
            border: 1px solid var(--gold);
            font-size: 0.8rem;
        }

        /* INTERACTIVE HARDWARE CONTROLS */
        .hw-btn {
            background: linear-gradient(180deg, #555 0%, #222 100%);
            border: 2px solid #666; color: var(--gold);
            padding: 12px; font-weight: bold; font-family: monospace;
            cursor: pointer; text-transform: uppercase; border-radius: 4px;
            text-align: center;
        }
        .hw-btn:active { background: var(--gold); color: #000; }
        .hw-btn-gold { border-color: var(--gold); background: linear-gradient(180deg, #6b561b 0%, #221a05 100%); }

        .btn-sos-hardware {
            background: linear-gradient(180deg, var(--sos-red) 0%, #500 100%);
            border: 2px solid #ff4500; color: #fff;
            padding: 15px; font-size: 1rem; font-weight: bold; cursor: pointer;
        }
        .btn-sos-hardware:active { background: #fff; color: var(--sos-red); }

        /* CREATOR FOOTER STAMP */
        .creator-footer {
            background: #000;
            color: #ff6347;
            text-align: center;
            padding: 10px 0;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            border-top: 2px solid #333;
        }

        /* NIGHT VISION FILTER EFFECT */
        .nvg-active {
            filter: brightness(0.7) contrast(1.4) sepia(100%) hue-rotate(85deg) !important;
        }

        /* MAP MARKER STYLES */
        .map-label {
            color: white;
            font-weight: bold;
            font-family: monospace;
            text-shadow: 1px 1px 2px black;
            font-size: 11px;
            text-align: center;
        }
    </style>
</head>
<body id="master-console">

    <div class="master-banner">
        <img src="tnet.png" alt="TACNET SYSTEM BANNER" onerror="this.style.display='none'; document.getElementById('alt-title').style.display='block'">
        <div id="alt-title" style="display:none; color:var(--gold); font-size:2rem; font-weight:bold;">TACNET MAIN CONSOLE</div>
    </div>

    <div class="console-body">
        
        <div class="screen-container">
            <div id="live-map"></div>
        </div>

        <div class="control-panel">
            <div class="panel-heading">SYSTEM EXECUTION</div>
            <button class="hw-btn hw-btn-gold" onclick="focusSearchArea()">CENTER ON SEARCH</button>
            <button class="hw-btn hw-btn-gold" onclick="startK9Voice()">K9 DEPLOY</button>
            
            <div class="panel-heading" style="margin-top: 10px;">SAFETY SYSTEM</div>
            <button class="hw-btn btn-sos-hardware" onclick="triggerSOS()">OFFICER SOS</button>
            
            <button class="hw-btn" style="margin-top: auto; border-color: var(--neon-green);" onclick="toggleNVG()">NIGHT VISION</button>
        </div>
    </div>

    <div class="creator-footer">
        APP CREATOR DEPUTY SHERIFF EARL A. WOOD RETIRED VA
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // INITIALIZE MAP LOCKED TO MADISON HEIGHTS / AMHERST CO, VA
        // COORDINATES: 37.4514, -79.1522
        var map = L.map('live-map').setView([37.4514, -79.1522], 14);

        // PULL FREE HIGH-RESOLUTION SAT IMAGES FROM USGS/NASA SERVERS
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tactical Satellite Feed Active'
        }).addTo(map);

        // DRAW COLOURED FIELD UNIT SYMBOLS DIRECTLY ON THE SATELLITE AREA
        
        // Blue Circles (LEO Field Units)
        var leo1 = L.circleMarker([37.456, -79.158], {color: '#00bfff', fillColor: '#1e90ff', fillOpacity: 0.8, radius: 14}).addTo(map);
        leo1.bindTooltip("<div class='map-label'>LEO-1</div>", {permanent: true, direction: 'center', className: 'map-label'}).openTooltip();

        var leo2 = L.circleMarker([37.448, -79.145], {color: '#00bfff', fillColor: '#1e90ff', fillOpacity: 0.8, radius: 14}).addTo(map);
        leo2.bindTooltip("<div class='map-label'>LEO</div>", {permanent: true, direction: 'center', className: 'map-label'}).openTooltip();

        // Amber Hexagon/Circle (K9 Tracking Command)
        var k9Unit = L.circleMarker([37.451, -79.162], {color: '#D4AF37', fillColor: '#b8860b', fillOpacity: 0.9, radius: 18}).addTo(map);
        k9Unit.bindTooltip("<div class='map-label' style='color:#000;'>K9</div>", {permanent: true, direction: 'center', className: 'map-label'}).openTooltip();

        // Red Marker (Search Perimeter Center Focus)
        var perimeterCenter = L.circleMarker([37.452, -79.151], {color: '#ff4500', fillColor: '#b22222', fillOpacity: 0.8, radius: 12}).addTo(map);
        perimeterCenter.bindTooltip("<div class='map-label'>LEO</div>", {permanent: true, direction: 'center', className: 'map-label'}).openTooltip();

        // Highlighted Visual Search Perimeter
        var operationalCircle = L.circle([37.4514, -79.1522], {
            color: '#39FF14',
            fillColor: '#39FF14',
            fillOpacity: 0.15,
            radius: 800,
            dashArray: '5, 5'
        }).addTo(map);

        // SYSTEM SCRIPT UTILITIES
        function focusSearchArea() {
            map.setView([37.4514, -79.1522], 14);
            alert("Console viewport re-centered on Madison Heights Command Sector.");
        }

        function toggleNVG() {
            document.getElementById('master-console').classList.toggle('nvg-active');
        }

        function startK9Voice() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const transmission = new SpeechSynthesisUtterance("TACNET K9 Guide Active. Systems operating at peak capability.");
                window.speechSynthesis.speak(transmission);
            } else {
                alert("K9 Audio Routing Triggered.");
            }
        }

        function triggerSOS() {
            alert("⚠️ CRITICAL EMERGENCY: SOS BROADCAST ACTIVE ⚠️\nTelemetry packet successfully routed to Amherst Communications Division.");
        }
    </script>
</body>
</html>
