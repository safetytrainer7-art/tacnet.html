
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TACNET Tactical Recon System</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        :root {
            --neon-green: #00ff66;
            --gold: #ffcc00;
            --blue: #1d7dff;
            --lightblue: #66d9ff;
            --red: #ff3030;
            --civilian: #28d96f;
            --night-vision-red: rgba(255, 0, 0, 0.42);
            --neon-glow-red: rgba(255, 0, 0, 0.80);
        }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; font-family: Arial, Helvetica, sans-serif;
            color: #fff; overflow: hidden;
        }

        /* FIXED HARD-CODED CRIMSON NIGHT VISION FILTERS */
        body::before {
            content: ''; position: fixed; inset: 0; pointer-events: none;
            background: repeating-linear-gradient(
                to bottom,
                rgba(255, 0, 0, .04),
                rgba(255, 0, 0, .04) 2px,
                transparent 2px,
                transparent 4px
            );
            z-index: 9999;
        }

        body::after {
            content: ''; position: fixed; inset: 0; pointer-events: none;
            box-shadow: inset 0 0 180px var(--night-vision-red), inset 0 0 80px rgba(100, 0, 0, 0.2);
            z-index: 9998;
        }

        /* PAGE 1: STAGING GATEWAY SCREEN */
        #landingPage {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: #000; z-index: 3000;
        }

        #landingImage {
            width: min(94vw, 420px); height: auto; object-fit: contain;
            box-shadow: 0 0 40px var(--night-vision-red);
        }

        .enterBtn {
            margin-top: 25px; padding: 18px 45px; border: none; border-radius: 10px;
            background: var(--neon-green); color: #000; font-size: 1.2rem;
            font-weight: 900; letter-spacing: 3px; cursor: pointer;
            box-shadow: 0 0 20px rgba(0,255,102,.8), 0 0 40px var(--night-vision-red);
        }
        .enterBtn:active { transform: scale(.96); }

        /* PAGE 2: HIGH-VISIBILITY OPERATIONAL CONSOLE */
        #appPage {
            display: none; height: 100%; flex-direction: column; background: #000;
        }

        /* TACTICAL COMMAND BAR */
        .topBar {
            height: 72px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 12px; background: linear-gradient(to bottom, #3b3510, #0f0f08);
            border-bottom: 2px solid var(--gold); box-shadow: 0 0 15px var(--night-vision-red);
            flex-shrink: 0;
        }

        .patch { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; }
        .titleWrap { text-align: center; flex: 1; }
        .title { margin: 0; font-size: 1.9rem; font-weight: 900; letter-spacing: 4px; color: var(--gold); text-shadow: 0 0 12px var(--neon-glow-red); }
        .subtitle { margin: 0; font-size: .70rem; letter-spacing: 2px; }

        /* ADDRESS VECTOR SEARCH HUD */
        .search-controls {
            padding: 8px; display: flex; gap: 8px; background: #050a05; flex-shrink: 0;
            border-bottom: 1px solid #112211;
        }

        #addressInput {
            flex: 1; background: #000; border: 2px solid var(--neon-green); color: #fff;
            padding: 12px; font-weight: bold; font-size: 1rem; outline: none;
            box-shadow: 0 0 8px rgba(255, 0, 0, 0.2);
        }

        .goBtn {
            width: 85px; background: var(--neon-green); color: #000; border: none;
            font-weight: 900; font-size: 1.1rem; cursor: pointer; letter-spacing: 1px;
            box-shadow: 0 0 12px var(--neon-green);
        }

        /* THE MAXIMUM EXTENSION MAP MATRIX SCREEN */
        #map {
            flex: 1; width: 100%; background: #000; z-index: 1;
        }

        /* ACTION SECTOR COUPLING PANELS */
        .bottomPanel {
            padding: 8px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px;
            background: #040904; border-top: 2px solid #152d15; flex-shrink: 0;
        }

        .actionBtn {
            padding: 12px; font-size: .85rem; border: none; font-weight: bold; cursor: pointer;
            background: #000; color: #fff; border: 2px solid var(--neon-green);
            text-transform: uppercase; box-shadow: 0 0 6px rgba(0,255,102,0.1);
        }

        .btn-blue { border-color: var(--blue); color: var(--blue); }
        .btn-lightblue { border-color: var(--lightblue); color: var(--lightblue); }
        .btn-red { border-color: var(--red); color: var(--red); }
        .btn-civilian { border-color: var(--civilian); color: var(--civilian); }
        .btn-gold { border-color: var(--gold); color: var(--gold); }
        
        .btn-stop-audio {
            grid-column: span 2; border: 2px solid #ff3333; background: #220000;
            color: #ff9999; padding: 12px; text-align: center; border-radius: 4px;
            font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.9rem;
            box-shadow: 0 0 10px var(--neon-glow-red);
        }

        /* FIXED AGENCY RECOGNITION STRIP FOOTER */
        .footer {
            height: 38px; display: flex; align-items: center; justify-content: center;
            background: #050505; color: #ff7777; font-size: .8rem; font-weight: bold;
            letter-spacing: 1px; border-top: 1px solid #1a1a1a; flex-shrink: 0;
            text-shadow: 0 0 5px var(--neon-glow-red);
        }
    </style>
</head>
<body>

    <div id="landingPage">
        <img src="FDD.png" id="landingImage" onerror="this.style.borderColor='red'">
        <button class="enterBtn" onclick="enterTacnet()">ENTER TACNET</button>
    </div>

    <div id="appPage">
        <div class="topBar">
            <img src="amherst_badge.png.jpg" class="patch" onerror="this.style.display='none'">
            <div class="titleWrap">
                <h1 class="title">TACNET</h1>
                <p class="subtitle">MULTI-AGENCY TASK FORCE SEARCH NETWORK</p>
            </div>
            <img src="va.png-modified.jpg" class="patch" onerror="this.style.display='none'">
        </div>

        <div class="search-controls">
            <input id="addressInput" placeholder="ENTER TARGET SEARCH ADDRESS" value="135 FLOSSIE DRIVE MADISON HEIGHTS VA">
            <button class="goBtn" onclick="searchAddress()">GO</button>
        </div>

        <div id="map"></div>

        <div class="bottomPanel">
            <button class="actionBtn btn-blue" onclick="addUnit('leo')">🐾 ADD LEO</button>
            <button class="actionBtn btn-lightblue" onclick="addUnit('k9')">🐕 ADD K9</button>
            <button class="actionBtn btn-red" onclick="addUnit('sar')">🆘 ADD SAR</button>
            <button class="actionBtn btn-civilian" onclick="addUnit('civilian')">🚶 ADD CIVILIAN</button>
            <button class="actionBtn btn-gold" onclick="speakMedicalProtocol('cpr')">➕ K9 CPR</button>
            <button class="actionBtn btn-gold" onclick="speakMedicalProtocol('gunshot')">💥 GUNSHOT</button>
            <button class="actionBtn btn-gold" onclick="speakMedicalProtocol('heatstroke')">☀️ HEAT STROKE</button>
            <button class="actionBtn btn-gold" onclick="speakMedicalProtocol('snakebite')">🐍 SNAKE BITE</button>
            <button class="actionBtn btn-gold" onclick="speakMedicalProtocol('vet')">🏥 EMERGENCY VET</button>
            <button class="actionBtn btn-blue" onclick="speakMedicalProtocol('rally')">🚨 RALLY ON K9-1</button>
            <button class="btn-stop-audio" onclick="killVoiceTransmission()">🛑 STOP TRANSMISSION</button>
        </div>

        <div class="footer">
            APP CREATOR DEPUTY SHERIFF EARL A. WOOD RETIRED VA
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        function enterTacnet(){
            document.getElementById('landingPage').style.display='none';
            document.getElementById('appPage').style.display='flex';
            initMap();
        }

        var synth = window.speechSynthesis;
        var map, activeLayer, perimeter;
        var units = [];

        // Operational Center Targets (Madison Heights, VA)
        var operationalLat = 37.4338;
        var operationalLng = -79.1114;

        // FIXED CHANNELS: Standardized rendering URL pathways {z}/{y}/{x} locked down
        var layers = {
            sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 20 }),
            street: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{y}/{x}.png', { maxZoom: 20 }),
            terrain: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{y}/{x}.png', { maxZoom: 17 })
        };

        function initMap(){
            // Launch satellite array directly over staging zone with native map controls active
            map = L.map('map', {zoomControl: true, attributionControl: false}).setView([operationalLat, operationalLng], 15);

            activeLayer = layers.sat;
            activeLayer.addTo(map);

            perimeter = L.circle([operationalLat, operationalLng], {
                color: '#00ff66',
                fillColor: '#00ff66',
                fillOpacity: .10,
                radius: 804 // 1/2 Mile Containment Circle Vector
            }).addTo(map);

            // Layer Selector Control Module
            L.control.layers({
                'Satellite Layer': layers.sat,
                'Street Map': layers.street,
                'Terrain View': layers.terrain
            }, null, { position: 'topright' }).addTo(map);

            // Handle browser device live location injection if active
            if(navigator.geolocation){
                navigator.geolocation.getCurrentPosition((position)=>{
                    operationalLat = position.coords.latitude;
                    operationalLng = position.coords.longitude;
                    map.setView([operationalLat, operationalLng], 15);
                    if(perimeter) { perimeter.setLatLng([operationalLat, operationalLng]); }
                }, null, {enableHighAccuracy: true});
            }

            // Instantly clear layout margins on mobile screens
            setTimeout(()=>{ map.invalidateSize(); }, 350);
        }

        async function searchAddress(){
            var address = document.getElementById('addressInput').value;
            if(address.trim() === '') return;

            try {
                var response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
                var data = await response.json();

                if(data.length === 0){
                    alert('TARGET COORDINATES NOT RESCANDED');
                    return;
                }

                operationalLat = parseFloat(data[0].lat);
                operationalLng = parseFloat(data[0].lon);

                map.setView([operationalLat, operationalLng], 16);

                if(perimeter){ map.removeLayer(perimeter); }

                perimeter = L.circle([operationalLat, operationalLng], {
                    color: '#00ff66',
                    fillColor: '#00ff66',
                    fillOpacity: .10,
                    radius: 804
                }).addTo(map);

                map.invalidateSize();

            } catch(e) {
                alert('COMMUNICATIONS TIMEOUT');
            }
        }

        // FIXED: Grounded offset generator locks added units strictly within the active circle perimeter view bounds
        function addUnit(type){
            var colors = { leo: '#1d7dff', k9: '#66d9ff', sar: '#ff3030', civilian: '#28d96f' };
            
            var placementLat = operationalLat + (Math.random() * .0024 - .0012);
            var placementLng = operationalLng + (Math.random() * .0024 - .0012);

            var marker = L.circleMarker([placementLat, placementLng], {
                radius: 9, color: '#fff', fillColor: colors[type], fillOpacity: 1, weight: 2
            }).addTo(map).bindPopup(`<b>${type.toUpperCase()} UNIT</b><br>Tracking Grid Active`);

            units.push(marker);
        }

        function killVoiceTransmission(){
            if(synth) { synth.cancel(); }
        }

        // HIGH-FIDELITY HUMAN VOICE NATURAL HARDWARE DELIVERIES
        function speakMedicalProtocol(type){
            if(!synth) return;
            synth.cancel();
            var msg = '';

            if(type==='cpr'){
                msg = 'Executing K9 CPR instructions. Lay the dog on a firm surface on its right side. Verify airway is completely clear. Deliver thirty chest compressions just behind the elbow, then extend the neck and deliver two rescue breaths directly into the nostrils. Repeat cycle.';
            }
            if(type==='gunshot'){
                msg = 'Executing K9 Gunshot trauma response. Immediately pack the entry site tightly using hemostatic gauze from your tactical medical bag. Apply heavy, steady, manual direct pressure without stopping for a minimum of three minutes. Do not remove gauze if it saturates; layer more over top.';
            }
            if(type==='heatstroke'){
                msg = 'Executing K9 Heat Stroke protocol. Cease tracking and field operations immediately. Relocate canine to shaded terrain or air-conditioned fleet transport. Apply room-temperature running water over the stomach, inner thighs, and paw pads. Direct ambient air conditioning toward the body.';
            }
            if(type==='snakebite'){
                msg = 'Executing K9 Snake Bite procedure. Restrain canine and minimize all physical exertion to restrict systemic spread of venom. Keep the bite location positioned below heart level if possible. Cleanse area gently. Do not apply ice, or use a tourniquet.';
            }
            if(type==='vet'){
                msg = 'Sourcing emergency veterinary triage routing. Field telemetry data compiled. Contacting regional police veterinary dispatch line to stand by for priority emergency intake.';
            }
            if(type==='rally'){
                msg = 'Command directive issued: All perimeter units collapse cordon formations and rally coordinates back inward on target lead asset position, Wood Canine One.';
            }

            var speech = new SpeechSynthesisUtterance(msg);
            speech.lang = 'en-US';
            speech.rate = 1.0; 
            speech.pitch = 1.0; 
            synth.speak(speech);
        }

        window.onload = function() {
            // Keep window standard bounds clear on mobile displays
            window.scrollTo(0, 0);
        };
    </script>
</body>
</html>
