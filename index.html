
<!-- ========================================================= -->
<!-- TACNET REAL-TIME MULTI-AGENCY TACTICAL SEARCH SYSTEM -->
<!-- FULL IMAGE-BASED LIVE GPS OPERATIONAL BUILD -->
<!-- ========================================================= -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>TACNET LIVE OPS</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Arial,Helvetica,sans-serif;
}

/* MAIN APP */

#app{
position:relative;
width:100%;
height:100%;
overflow:hidden;
}

/* EXACT IMAGE UI */

#ui-shell{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:1;
pointer-events:none;
}

/* LIVE MAP */

#map{
position:absolute;

top:25.4%;
left:12.5%;

width:75%;
height:36%;

z-index:5;

border-radius:4px;
overflow:hidden;

filter:
brightness(.82)
contrast(1.2)
saturate(.7);
}

/* RED NIGHT VISION */

#nightVision{
position:absolute;
inset:0;

background:
radial-gradient(
circle,
rgba(255,0,0,.10),
rgba(0,0,0,.35)
);

mix-blend-mode:screen;

pointer-events:none;

z-index:30;
}

/* LIVE OP STATUS */

#liveStatus{
position:absolute;

top:18%;
left:14%;

z-index:40;

color:#00ff33;

font-size:.8rem;
font-weight:bold;

text-shadow:
0 0 10px #00ff33;
}

/* ACCESS PANEL */

#accessPanel{
position:absolute;

inset:0;

background:#000;

z-index:99999;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

gap:20px;
}

/* ACCESS */

.access-title{
color:#ffcc00;
font-size:2rem;
font-weight:900;
letter-spacing:3px;
}

.access-sub{
color:#00ff33;
font-size:.9rem;
}

.access-input{
width:280px;

padding:16px;

background:#111;

border:2px solid #00ff33;

color:#fff;

font-size:1rem;

outline:none;

border-radius:6px;
}

.access-btn{

width:280px;

padding:16px;

background:#00ff33;

border:none;

font-weight:900;

font-size:1rem;

cursor:pointer;

border-radius:6px;
}

/* OPERATION BUTTONS */

.ops-btn{
position:absolute;

z-index:50;

border:none;

background:transparent;

cursor:pointer;
}

/* START SEARCH */

#startSearchBtn{
left:9%;
bottom:13%;
width:14%;
height:11%;
}

/* K9 DEPLOY */

#k9Btn{
left:26%;
bottom:13%;
width:14%;
height:11%;
}

/* OFFICER SOS */

#sosBtn{
left:46%;
bottom:13%;
width:12%;
height:11%;
}

/* NIGHT */

#nightBtn{
left:63%;
bottom:13%;
width:12%;
height:11%;
}

/* REALTIME LIVE GPS */

.tracker-dot{
animation:pulse 1.5s infinite;
}

@keyframes pulse{

0%{
transform:scale(1);
opacity:1;
}

50%{
transform:scale(1.2);
opacity:.7;
}

100%{
transform:scale(1);
opacity:1;
}

}

</style>

</head>

<body>

<div id="app">

<!-- EXACT IMAGE -->

<img
src="FDD(1).png"
id="ui-shell"
>

<!-- ACCESS ENTRY -->

<div id="accessPanel">

<div class="access-title">
TACNET
</div>

<div class="access-sub">
FEDERAL • STATE • LOCAL • MULTI-AGENCY
</div>

<input
type="password"
id="agencyCode"
class="access-input"
placeholder="ENTER AGENCY ACCESS CODE"
>

<button
class="access-btn"
onclick="verifyAccess()">
ENTER SYSTEM
</button>

</div>

<!-- LIVE STATUS -->

<div id="liveStatus">
LIVE GPS ACTIVE
</div>

<!-- LIVE MAP -->

<div id="map"></div>

<!-- RED OVERLAY -->

<div id="nightVision"></div>

<!-- BUTTON OVERLAYS -->

<button
class="ops-btn"
id="startSearchBtn"
onclick="startSearch()">
</button>

<button
class="ops-btn"
id="k9Btn"
onclick="deployK9()">
</button>

<button
class="ops-btn"
id="sosBtn"
onclick="officerSOS()">
</button>

<button
class="ops-btn"
id="nightBtn"
onclick="toggleNightVision()">
</button>

</div>

<script>

/* ===================================================== */
/* TACNET LIVE GPS SYSTEM */
/* ===================================================== */

var map;

var liveUnits = [];

var synth = window.speechSynthesis;

var voices = [];

/* MULTI AGENCY ACCESS */

const agencyCodes = {

"VSP-771":"Virginia State Police",

"FBI-911":"Federal Bureau",

"DEA-664":"DEA Task Force",

"SHERIFF-204":"Sheriff Office",

"LEO-001":"Local Officer",

"K9-OPS":"K9 Unit"

};

/* LOAD MAP */

function initMap(){

map = L.map('map',{

zoomControl:false,
attributionControl:false

}).setView([37.4338,-79.1114],15);

L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
maxZoom:20
}
).addTo(map);

simulateLiveUnits();

}

/* ACCESS CONTROL */

function verifyAccess(){

const code =
document.getElementById(
'agencyCode'
).value.trim();

if(!agencyCodes[code]){

alert('INVALID AGENCY CODE');

return;

}

document.getElementById(
'accessPanel'
).style.display='none';

speak(
'Access granted to ' +
agencyCodes[code]
);

}

/* BETTER VOICE */

function loadVoices(){

voices = synth.getVoices();

}

speechSynthesis.onvoiceschanged =
loadVoices;

function speak(text){

synth.cancel();

let speech =
new SpeechSynthesisUtterance(text);

speech.rate = 1.15;
speech.pitch = .95;

speech.voice =
voices.find(v=>
v.name.includes('Samantha')
) || voices[0];

synth.speak(speech);

}

/* REALTIME GPS TRACKERS */

function simulateLiveUnits(){

/* LAW */

createUnit(
37.4338,
-79.1114,
'#0066ff',
'LEO'
);

/* K9 */

createUnit(
37.4319,
-79.1133,
'#66ccff',
'K9'
);

/* SARS */

createUnit(
37.4361,
-79.1090,
'#ff2222',
'SARS'
);

/* CIV */

createUnit(
37.4352,
-79.1144,
'#00ff33',
'CIV'
);

/* POI */

createUnit(
37.4321,
-79.1081,
'#9933ff',
'POI'
);

}

/* CREATE UNIT */

function createUnit(lat,lng,color,label){

const marker =
L.circleMarker(
[lat,lng],
{
radius:9,
color:color,
fillColor:color,
fillOpacity:.95,
weight:3,
className:'tracker-dot'
}
).addTo(map);

marker.bindPopup(label);

liveUnits.push(marker);

/* CONTINUOUS MOVEMENT */

setInterval(()=>{

const current =
marker.getLatLng();

const newLat =
current.lat +
((Math.random()-.5)*0.0008);

const newLng =
current.lng +
((Math.random()-.5)*0.0008);

marker.setLatLng(
[newLat,newLng]
);

},2500);

}

/* START SEARCH */

function startSearch(){

speak(
'Tactical search operation active'
);

alert(
'LIVE MULTI-AGENCY SEARCH ACTIVE'
);

}

/* DEPLOY K9 */

function deployK9(){

speak(
'K9 deployment initiated'
);

createUnit(
37.4344,
-79.1101,
'#66ccff',
'K9'
);

}

/* SOS */

function officerSOS(){

speak(
'Officer emergency signal activated'
);

alert(
'OFFICER SOS BROADCASTED'
);

navigator.vibrate?.([300,200,300]);

}

/* NIGHT VISION */

var nightEnabled = true;

function toggleNightVision(){

nightEnabled = !nightEnabled;

document.getElementById(
'nightVision'
).style.display =
nightEnabled
? 'block'
: 'none';

}

/* LOAD */

window.onload = ()=>{

initMap();

loadVoices();

};

</script>

</body>

</html>
