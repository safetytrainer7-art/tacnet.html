<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>TACNET UNIT COMMAND</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<script
src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<style>

*{
box-sizing:border-box;
}

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
font-family:Arial,sans-serif;
background:#050b12;
color:white;
}

#map{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
}

.overlay{
position:absolute;
inset:0;
background:
linear-gradient(
to bottom,
rgba(0,0,0,0.72),
rgba(0,0,0,0.15),
rgba(0,0,0,0.82)
);
pointer-events:none;
z-index:2;
}

.viewport{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:96vw;
height:94vh;
border-radius:28px;
border:2px solid rgba(0,229,255,0.2);
box-shadow:
0 0 25px rgba(0,229,255,0.12),
0 0 80px rgba(0,229,255,0.08);
pointer-events:none;
z-index:5;
}

.header{
position:absolute;
top:12px;
left:50%;
transform:translateX(-50%);
width:94%;
height:72px;
background:rgba(0,0,0,0.78);
border-radius:22px;
border:1px solid rgba(0,229,255,0.22);
display:flex;
justify-content:space-between;
align-items:center;
padding:0 18px;
backdrop-filter:blur(8px);
z-index:6000;
}

.branding h1{
margin:0;
font-size:28px;
letter-spacing:4px;
color:#00e5ff;
}

.branding p{
margin:4px 0 0 0;
font-size:10px;
letter-spacing:2px;
color:#c8faff;
}

.status{
text-align:right;
font-size:11px;
line-height:1.5;
color:#c8faff;
}

.searchBar{
position:absolute;
top:96px;
left:50%;
transform:translateX(-50%);
width:88%;
display:flex;
gap:8px;
z-index:7000;
}

.searchBar input{
flex:1;
padding:14px;
border:none;
border-radius:14px;
background:rgba(0,0,0,0.82);
color:white;
border:1px solid rgba(0,229,255,0.18);
font-size:14px;
}

.searchBar button{
width:100px;
border:none;
border-radius:14px;
background:#00e5ff;
color:black;
font-weight:bold;
}

.sideTab{
position:absolute;
width:42px;
height:130px;
background:rgba(0,0,0,0.9);
display:flex;
justify-content:center;
align-items:center;
writing-mode:vertical-rl;
font-size:12px;
font-weight:bold;
color:#00e5ff;
z-index:7000;
}

.leftTab{
top:180px;
left:0;
border-right:1px solid #00e5ff;
border-radius:0 16px 16px 0;
}

.rightTab{
top:180px;
right:0;
border-left:1px solid #00e5ff;
border-radius:16px 0 0 16px;
}

.drawer{
position:absolute;
top:170px;
width:260px;
height:390px;
background:rgba(0,0,0,0.94);
padding:14px;
overflow-y:auto;
transition:0.3s ease;
z-index:6900;
}

.leftDrawer{
left:-260px;
border-right:1px solid #00e5ff;
border-radius:0 20px 20px 0;
}

.leftDrawer.active{
left:0;
}

.rightDrawer{
right:-260px;
border-left:1px solid #00e5ff;
border-radius:20px 0 0 20px;
}

.rightDrawer.active{
right:0;
}

.drawer h2{
margin-top:0;
font-size:16px;
color:#00e5ff;
}

.drawer input,
.drawer textarea,
.drawer select{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:12px;
background:#0b1720;
color:white;
}

.drawer button{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:12px;
background:#00e5ff;
color:black;
font-weight:bold;
}

.eventPanel{
position:absolute;
top:150px;
right:16px;
width:260px;
max-height:320px;
overflow-y:auto;
background:rgba(0,0,0,0.9);
border:1px solid rgba(0,229,255,0.18);
border-radius:18px;
padding:14px;
z-index:8000;
}

.eventPanel h3{
margin-top:0;
color:#00e5ff;
font-size:15px;
}

.eventItem{
padding:10px;
margin-bottom:8px;
background:#0b1720;
border-radius:12px;
font-size:12px;
line-height:1.4;
}

.unitPanel{
position:absolute;
left:16px;
bottom:120px;
width:260px;
max-height:260px;
overflow-y:auto;
background:rgba(0,0,0,0.9);
border:1px solid rgba(0,229,255,0.18);
border-radius:18px;
padding:14px;
z-index:8000;
}

.unitPanel h3{
margin-top:0;
color:#00e5ff;
font-size:15px;
}

.unitCard{
padding:10px;
margin-bottom:8px;
background:#0b1720;
border-radius:12px;
font-size:12px;
line-height:1.5;
}

.modeDisplay{
position:absolute;
bottom:90px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.88);
padding:10px 18px;
border-radius:14px;
border:1px solid rgba(0,229,255,0.18);
font-size:13px;
z-index:8000;
}

.bottomHUD{
position:absolute;
bottom:16px;
left:50%;
transform:translateX(-50%);
width:94%;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:8px;
z-index:8000;
}

.bottomHUD button{
min-width:72px;
padding:12px;
border:none;
border-radius:12px;
background:rgba(0,0,0,0.88);
border:1px solid rgba(0,229,255,0.18);
color:white;
font-weight:bold;
}

@media(max-width:768px){

.drawer{
width:220px;
}

.leftDrawer{
left:-220px;
}

.rightDrawer{
right:-220px;
}

.eventPanel{
width:200px;
}

.unitPanel{
width:200px;
}

}

</style>

</head>

<body>

<div id="map"></div>

<div class="overlay"></div>

<div class="viewport"></div>

<div class="header">

<div class="branding">

<h1>TACNET</h1>

<p>FEDERAL • STATE • LOCAL • TACTICAL NETWORK</p>

</div>

<div class="status">

GPS ONLINE<br>
CORE ACTIVE<br>
LIVE OPERATIONS

</div>

</div>

<div class="searchBar">

<input
id="address"
type="text"
placeholder="SEARCH ADDRESS">

<button onclick="searchLocation()">
SEARCH
</button>

</div>

<div
class="sideTab leftTab"
onclick="toggleMissionDrawer()">

MISSION

</div>

<div
class="drawer leftDrawer"
id="missionDrawer">

<h2>MISSION CONTROL</h2>

<input
type="text"
placeholder="OPERATION NAME">

<input
type="text"
placeholder="TARGET">

<input
type="text"
placeholder="LAST KNOWN DIRECTION">

<select>
<option>LOW RISK</option>
<option>MEDIUM RISK</option>
<option>HIGH RISK</option>
</select>

<button>START OPERATION</button>

<textarea
placeholder="MISSION NOTES">
</textarea>

<button>GENERATE REPORT</button>

</div>

<div
class="sideTab rightTab"
onclick="toggleUnitDrawer()">

UNITS

</div>

<div
class="drawer rightDrawer"
id="unitDrawer">

<h2>K9 MEDICAL</h2>

<button>K9 CPR</button>
<button>HEAT EXHAUSTION</button>
<button>SNAKEBITE</button>

<h2>LEGAL</h2>

<button>K9 DEPLOYMENT</button>
<button>SEARCH LAW</button>

</div>

<div
class="eventPanel">

<h3>LIVE OPERATIONS</h3>

<div id="eventFeed">

<div class="eventItem">
SYSTEM READY
</div>

</div>

</div>

<div
class="unitPanel">

<h3>ACTIVE UNIT STATUS</h3>

<div id="unitRoster">

<div class="unitCard">
NO ACTIVE UNITS
</div>

</div>

</div>

<div
class="modeDisplay"
id="modeDisplay">

MODE: NONE

</div>

<div class="bottomHUD">

<button onclick="selectTool('LAW')">
LAW
</button>

<button onclick="selectTool('K9')">
K9
</button>

<button onclick="selectTool('SAR')">
SAR
</button>

<button onclick="selectTool('CIV')">
CIV
</button>

<button onclick="selectTool('POI')">
POI
</button>

<button onclick="selectTool('EVID')">
EVID
</button>

<button onclick="selectTool('PERIM')">
PERIM
</button>

<button onclick="resetMap()">
RESET
</button>

</div>

<script>

/* MAP */

const map = L.map('map').setView(
[37.4138,-79.1422],
13
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'OpenStreetMap',
maxZoom:19
}
).addTo(map);

L.marker([37.4138,-79.1422])
.addTo(map)
.bindPopup('TACNET COMMAND CENTER')
.openPopup();

/* SEARCH */

function searchLocation(){

const address =
document.getElementById('address').value;

if(address.length < 3){
alert('Enter address');
return;
}

fetch(
'https://nominatim.openstreetmap.org/search?format=json&q='
+ encodeURIComponent(address)
)

.then(response => response.json())

.then(data => {

if(data.length > 0){

const lat =
parseFloat(data[0].lat);

const lon =
parseFloat(data[0].lon);

map.setView([lat,lon],15);

L.marker([lat,lon])
.addTo(map)
.bindPopup(address)
.openPopup();

addEvent('LOCATION SEARCHED');

}else{

alert('Address not found');

}

});

}

/* DRAWERS */

function toggleMissionDrawer(){

document
.getElementById('missionDrawer')
.classList.toggle('active');

}

function toggleUnitDrawer(){

document
.getElementById('unitDrawer')
.classList.toggle('active');

}

/* EVENTS */

function addEvent(text){

const feed =
document.getElementById('eventFeed');

const item =
document.createElement('div');

item.className =
'eventItem';

item.innerHTML =
new Date().toLocaleTimeString()
+ ' — '
+ text;

feed.prepend(item);

}

/* UNIT ROSTER */

let lawCount = 0;
let k9Count = 0;
let sarCount = 0;

function addUnitCard(name,status){

const roster =
document.getElementById('unitRoster');

if(roster.innerHTML.includes('NO ACTIVE UNITS')){
roster.innerHTML = '';
}

const card =
document.createElement('div');

card.className =
'unitCard';

card.innerHTML =
'<strong>'
+ name +
'</strong><br>'
+ status;

roster.prepend(card);

}

/* TOOL SYSTEM */

let selectedTool = null;

let operationalLayers = [];

function selectTool(tool){

selectedTool = tool;

document
.getElementById('modeDisplay')
.innerHTML =
'MODE: ' + tool;

addEvent(tool + ' MODE SELECTED');

}

/* MAP DEPLOYMENT */

map.on('click', function(e){

if(!selectedTool){
return;
}

const lat = e.latlng.lat;
const lng = e.latlng.lng;

let layer;
let unitName = '';
let unitStatus = '';

/* LAW */

if(selectedTool === 'LAW'){

lawCount++;

unitName =
'LAW-' + lawCount;

unitStatus =
'INNER PERIMETER';

layer = L.circleMarker(
[lat,lng],
{
radius:8,
color:'blue',
fillColor:'blue',
fillOpacity:1
}
)
.addTo(map)
.bindPopup(unitName);

addUnitCard(
unitName,
unitStatus
);

}

/* K9 */

if(selectedTool === 'K9'){

k9Count++;

unitName =
'K9-' + k9Count;

unitStatus =
'TRACKING';

layer = L.circleMarker(
[lat,lng],
{
radius:8,
color:'#00e5ff',
fillColor:'#00e5ff',
fillOpacity:1
}
)
.addTo(map)
.bindPopup(unitName);

addUnitCard(
unitName,
unitStatus
);

}

/* SAR */

if(selectedTool === 'SAR'){

sarCount++;

unitName =
'SAR-' + sarCount;

unitStatus =
'GRID SEARCH';

layer = L.circleMarker(
[lat,lng],
{
radius:8,
color:'orange',
fillColor:'orange',
fillOpacity:1
}
)
.addTo(map)
.bindPopup(unitName);

addUnitCard(
unitName,
unitStatus
);

}

/* CIV */

if(selectedTool === 'CIV'){

layer = L.circleMarker(
[lat,lng],
{
radius:8,
color:'green',
fillColor:'green',
fillOpacity:1
}
)
.addTo(map)
.bindPopup('CIVILIAN');

}

/* POI */

if(selectedTool === 'POI'){

layer = L.circleMarker(
[lat,lng],
{
radius:8,
color:'purple',
fillColor:'purple',
fillOpacity:1
}
)
.addTo(map)
.bindPopup('PERSON OF INTEREST');

}

/* EVIDENCE */

if(selectedTool === 'EVID'){

layer = L.circleMarker(
[lat,lng],
{
radius:7,
color:'yellow',
fillColor:'yellow',
fillOpacity:1
}
)
.addTo(map)
.bindPopup('EVIDENCE');

}

/* PERIMETER */

if(selectedTool === 'PERIM'){

layer = L.circle(
[lat,lng],
{
radius:1200,
color:'red',
fillColor:'#ff0000',
fillOpacity:0.08
}
)
.addTo(map);

}

/* SAVE */

if(layer){

operationalLayers.push(layer);

addEvent(
selectedTool + ' DEPLOYED'
);

}

});

/* RESET */

function resetMap(){

operationalLayers.forEach(layer => {
map.removeLayer(layer);
});

operationalLayers = [];

selectedTool = null;

lawCount = 0;
k9Count = 0;
sarCount = 0;

document
.getElementById('modeDisplay')
.innerHTML =
'MODE: NONE';

document
.getElementById('unitRoster')
.innerHTML =
'<div class=\"unitCard\">NO ACTIVE UNITS</div>';

addEvent('MAP RESET');

}

</script>

</body>
</html>
