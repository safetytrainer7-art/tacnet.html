<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACNET - Tactical Search Interface</title>
    <style>
        body { background-color: #0D0D0D; color: #39FF14; font-family: monospace; margin: 0; padding: 20px; overflow: hidden; }
        .hud-border { border: 2px solid #D4AF37; padding: 15px; border-radius: 10px; box-shadow: 0 0 15px #39FF14; }
        .ticker { background: rgba(57, 255, 20, 0.1); border-bottom: 1px solid #39FF14; padding: 5px; white-space: nowrap; overflow: hidden; margin-bottom: 15px; }
        .ticker-text { display: inline-block; animation: scroll 15s linear infinite; font-weight: bold; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .tactical-btn { background: #000; color: #39FF14; border: 1px solid #39FF14; padding: 15px; text-transform: uppercase; font-weight: bold; cursor: pointer; text-align: center; }
        .tactical-btn:active { background: #39FF14; color: #000; }
        .sos-btn { background: #000; color: #ff0000; border: 2px solid #ff0000; grid-column: span 2; padding: 20px; margin-top: 10px; font-size: 1.2em; box-shadow: 0 0 10px #ff0000; }
        h1 { color: #D4AF37; text-align: center; margin-top: 0; text-shadow: 0 0 5px #D4AF37; }
        #map-placeholder { height: 200px; border: 1px dashed #39FF14; margin: 10px 0; display: flex; align-items: center; justify-content: center; background: #1a1a1a; }
    </style>
</head>
<body>
    <div class="ticker"><div class="ticker-text">[ INCIDENT ACTIVE ] :: SEARCHING AREA BRACY, VA :: DEPLOYING TACNET CORE v1.0 :: UNIT: safetytrainer7</div></div>
    
    <div class="hud-border">
        <h1>TACNET</h1>
        <div style="text-align: center; font-size: 0.8em; color: #D4AF37;">AMHERST COUNTY S.O. PROOF OF CONCEPT</div>
        
        <div id="map-placeholder">
            [ GPS SIGNAL: INITIALIZING... ]
        </div>

        <div class="btn-grid">
            <div class="tactical-btn">Case Law</div>
            <div class="tactical-btn">K9 First Aid</div>
            <div class="tactical-btn">Clear Grid</div>
            <div class="tactical-btn">Report</div>
            <button class="tactical-btn sos-btn" onclick="alert('SOS BROADCAST SENT TO ALL UNITS')">OFFICER DOWN SOS</button>
        </div>
    </div>

    <div style="margin-top: 20px; font-size: 0.7em; text-align: center; color: #555;">
        DEVELOPED BY: DEPUTY EARL WOOD (RET) | LAW ENFORCEMENT ONLY
    </div>
</body>
</html>
