<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TACNET COMMAND</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#050b12;
    color:white;
    overflow:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
    background-size:40px 40px;
    pointer-events:none;
}

.header{
    height:70px;
    background:rgba(8,15,25,0.95);
    border-bottom:1px solid #00e5ff;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    box-shadow:0 0 20px rgba(0,229,255,0.25);
}

.logo h1{
    margin:0;
    color:#00e5ff;
    letter-spacing:4px;
    font-size:30px;
    text-shadow:0 0 15px #00e5ff;
}

.logo p{
    margin:0;
    color:#7ddfff;
    font-size:12px;
}

.statusBar{
    display:flex;
    gap:12px;
}

.statusItem{
    padding:8px 14px;
    border-radius:10px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(0,229,255,0.25);
    color:#9befff;
    font-size:13px;
}

.main{
    display:flex;
    height:calc(100vh - 70px);
}

.sidebar{
    width:320px;
    background:rgba(10,18,28,0.92);
    border-right:1px solid rgba(0,229,255,0.25);
    padding:18px;
    overflow-y:auto;
}

.panel{
    margin-bottom:18px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(0,229,255,0.18);
    border-radius:18px;
    padding:16px;
    backdrop-filter:blur(12px);
    box-shadow:0 0 18px rgba(0,229,255,0.08);
}

.panel h2{
    margin-top:0;
    color:#00e5ff;
    font-size:16px;
    letter-spacing:2px;
}

.deployGrid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.deployBtn{
    padding:14px;
    border:none;
    border-radius:14px;
    color:white;
    font-weight:bold;
    cursor:pointer;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.12);
}

.deployBtn.active{
    box-shadow:0 0 18px currentColor;
}

.law{ color:#1e90ff; }
.k9{ color:#00e5ff; }
.sar{ color:#ff9500; }
.civ{ color:#00ffaa; }
.poi{ color:#ff00aa; }
.ev{ color:#ffffff; }

input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    background:rgba(255,255,255,0.08);
    color:white;
    margin-bottom:10px;
    border:1px solid rgba(0,229,255,0.18);
}

.actionBtn{
    width:100%;
    padding:14px;
    margin-bottom:10px;
    border:none;
    border-radius:12px;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.searchBtn{
    background:rgba(0,229,255,0.18);
    border:1px solid #00e5ff;
}

.perimeterBtn{
    background:rgba(255,149,0,0.18);
    border:1px solid #ff9500;
}

.resetBtn{
    background:rgba(255,0,120,0.18);
    border:1px solid #ff0077;
}

.sosBtn{
    background:rgba(255,0,0,0.18);
    border:1px solid #ff3333;
}

.mapArea{
    position:relative;
    flex:1;
}

#map{
    width:100%;
    height:100%;
}

.compass{
    position:absolute;
    top:20px;
    right:20px;
    width:90px;
    height:90px;
    border-radius:50%;
    background:rgba(0,0,0,0.55);
    border:2px solid #00e5ff;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#00e5ff;
    font-size:28px;
    box-shadow:0 0 18px rgba(0,229,255,0.4);
    backdrop-filter:blur(10px);
}

.windBox{
    position:absolute;
    bottom:20px;
    right:20px;
    width:220px;
    background:rgba(0,0,0,0.55);
    border:1px solid rgba(0,229,255,0.35);
    border-radius:16px;
    padding:16px;
    backdrop-filter:blur(10px);
    box-shadow:0 0 18px rgba(0,229,255,0.2);
}

.windBox h3{
    margin-top:0;
    color:#00e5ff;
}

</style>
</head>
<body>

<div class="header">

    <div class="logo">
        <h1>TACNET</h1>
        <p>FEDERAL • STATE • LOCAL • TACTICAL NETWORK</p>
    </div>

    <div class="statusBar">
        <div class="statusItem">GPS ONLINE</div>
        <div class="statusItem">MISSION ACTIVE</div>
        <div class="statusItem">CORE SYSTEM STABLE</div>
    </div>

</div>

<div class="main">

    <div class="sidebar">

        <div class="panel">
            <h2>DEPLOYMENT</h2>

            <div class="deployGrid">

                <button class="deployBtn law active">LAW</button>
                <button class="deployBtn k9">K9</button>
                <button class="deployBtn sar">SAR</button>
                <button class="deployBtn civ">CIV</button>
                <button class="deployBtn poi">POI</button>
                <button class="deployBtn ev">EVIDENCE</button>

            </div>
        </div>

        <div class="panel">
            <h2>SEARCH LOCATION</h2>

            <input type="text" placeholder="Enter Address">

            <button class="actionBtn searchBtn">
                SEARCH LOCATION
            </button>
        </div>

        <div class="panel">
            <h2>MISSION CONTROLS</h2>

            <button class="actionBtn perimeterBtn">
                CREATE PERIMETER
            </button>

            <button class="actionBtn sosBtn">
                SOS OFFICER DOWN
            </button>

            <button class="actionBtn resetBtn">
                RESET MAP
            </button>

        </div>

    </div>

    <div class="mapArea">

        <div id="map"></div>

        <div class="compass">
            N
        </div>

        <div class="windBox">
            <h3>ENVIRONMENT</h3>
            <p>Wind: 8 MPH NW</p>
            <p>Temp: 61°F</p>
            <p>Conditions: Clear</p>
        </div>

    </div>

</div>

<script>

const map = L.map('map').setView([37.4138,-79.1422],13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution:'OpenStreetMap'
}).addTo(map);

navigator.geolocation.getCurrentPosition(function(pos){

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    map.setView([lat,lon],15);

    L.marker([lat,lon])
    .addTo(map)
    .bindPopup('COMMAND POSITION')
    .openPopup();

});

</script>

</body>
</html>
