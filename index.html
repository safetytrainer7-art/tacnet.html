<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TACNET | MULTI-AGENCY TACTICAL TASK FORCE</title>
    <style>
        :root {
            --hunter-green: #1B3022;
            --neon-green: #39FF14;
            --gold: #D4AF37;
            --sos-red: #B22222;
            --panel-bg: #2b2b2b;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #111; color: var(--gold);
            font-family: 'Courier New', Courier, monospace; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* FINALIZED TACTICAL HEADER */
        .hud-header {
            background: linear-gradient(180deg, #3a3010 0%, #151005 100%);
            border-bottom: 3px solid #444;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-seal {
            height: 60px;
            width: auto;
            border-radius: 50%;
        }

        .header-center-text {
            text-align: center;
            flex-grow: 1;
        }

        .title-main {
            font-size: 2.5rem; font-weight: bold; letter-spacing: 6px; margin: 0;
            color: var(--gold); text-shadow: 2px 2px 0px #000; text-transform: uppercase;
        }

        .title-sub { font-size: 0.9rem; letter-spacing: 2px; color: #fff; font-weight: bold; margin-top: 5px; }

        /* MAIN CONSOLE LAYOUT */
        .console-body {
            display: flex;
            flex-grow: 1;
            padding: 15px;
            gap: 15px;
            background: #1a1a1a;
            border-bottom: 3px solid #444;
        }

        /* PRIMARY SCREEN HOUSING */
        .screen-container {
            flex-grow: 1;
            position: relative;
            border: 4px solid #333;
            background-color: #000;
            box-shadow: inset 0 0 20px #000;
            overflow: hidden;
        }

        /* MULTI-SHAPE TACTICAL MARKERS */
        .marker {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
            font-size: 0.75rem;
            box-shadow: 0 0 8px rgba(0,0,0,0.8);
        }

        /* Blue Circles (LEO Field Units) */
        .marker-circle {
            width: 42px; height: 42px;
            background: rgba(30, 144, 255, 0.9);
            border: 2px solid #00bfff;
            border-radius: 50%;
        }

        /* Amber Hexagon (K9 Tracking Unit) */
        .marker-hex {
            width: 48px; height: 48px;
            background: rgba(218, 165, 32, 0.95);
            border: 2px solid var(--gold);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
        }

        /* Red Diamond (LEO Perimeter Unit) */
        .marker-diamond {
            width: 45px; height: 45px;
            background: rgba(178, 34, 34, 0.95);
            border: 2px solid #ff4500;
            transform: rotate(45deg);
        }
        .marker-diamond span { transform: rotate(-45deg); }

        /* Green Triangle (LEO Outpost) */
        .marker-triangle {
            width: 45px; height: 45px;
            background: rgba(34, 139, 34, 0.95);
            border: 2px solid var(--neon-green);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            padding-top: 14px; box-sizing: border-box;
        }

        /* Purple Square (LEO Support) */
        .marker-square {
            width: 40px; height: 40px;
            background: rgba(138, 43, 226, 0.9);
            border: 2px solid #da70d6;
        }

        /* RIGHT-SIDE CONTROL PANEL */
        .control-panel {
            width: 250px;
            background: #252525;
            border: 3px solid #444;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .panel-section-title {
            color: var(--gold);
            font-size: 0.8rem;
            text-align: center;
            letter-spacing: 1px;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
            margin-top: 5px;
        }

        /* CONSOLE ACTION CONTROLS */
        .console-btn {
            background: linear-gradient(180deg, #444 0%, #1a1a1a 100%);
            border: 1px solid var(--gold); color: var(--gold);
            padding: 12px; font-weight: bold; font-family: monospace;
            cursor: pointer; text-transform: uppercase; border-radius: 4px;
            text-align: center;
        }
        .console-btn:active { background: var(--gold); color: #000; }

        .btn-sos-console {
            background: linear-gradient(180deg, var(--sos-red) 0%, #400 100%);
            border: 1px solid #ff4500; color: #fff;
            padding: 16px; font-size: 1rem; font-weight: bold; cursor: pointer;
            border-radius: 4px; text-transform: uppercase;
        }
        .btn-sos-console:active { background: #fff; color: var(--sos-red); }

        .btn-nvg-console {
            border-color: var(--neon-green);
            color: var(--neon-green);
            margin-top: auto;
        }

        /* SETTLED CREATOR FOOTER STAMP */
        .creator-footer {
            background: #000;
            color: #ff4500;
            text-align: center;
            padding: 12px 0;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 3px;
            border-top: 3px solid #333;
        }

        /* NIGHT VISION MATRIX */
        .nvg-active {
            filter: brightness(0.7) contrast(1.3) sepia(100%) hue-rotate(85deg) !important;
        }
    </style>
</head>
<body id="master-ui">

    <div class="hud-header">
        <img src="amherst_badge.png.jpg" alt="Sheriff Star" class="header-seal" onerror="this.style.opacity='0.3'">
        <div class="header-center-text">
            <div class="title-main">TACNET</div>
            <div class="title-sub">NEXTLINE MULTI-AGENCY TACTICAL TASK FORCE</div>
        </div>
        <img src="gshep_2.jpg" alt="K9 Medallion" class="header-seal" onerror="this.style.opacity='0.3'">
    </div>

    <div class="console-body">
        
        <div class="screen-container">
            
            <div class="marker marker-diamond" style="top: 35%; left: 15%;"><span>LEO</span></div>
            <div class="marker marker-hex" style="top: 45%; left: 25%;">K9</div>
            <div class="marker marker-circle" style="top: 60%; left: 30%;">LEO</div>
            <div class="marker marker-circle" style="top: 32%; left: 40%;">LEO</div>
            <div class="marker marker-circle" style="top: 68%; left: 45%;">LEO</div>
            <div class="marker marker-triangle" style="top: 35%; left: 70%;">LEO-2</div>
            <div class="marker marker-square" style="top: 52%; left: 73%;">LEO</div>
            
        </div>

        <div class="control-panel">
            <div class="panel-section-title">SYSTEM EXECUTION</div>
            <button class="console-btn" onclick="alert('Tactical Grid Analysis Active.')">START SEARCH</button>
            <button class="console-btn" onclick="triggerK9Audio()">K9 DEPLOY</button>
            
            <div class="panel-section-title" style="margin-top: 10px;">SAFETY SYSTEM</div>
            <button class="btn-sos-console" onclick="triggerSOSAlert()">OFFICER SOS</button>
            
            <button class="console-btn btn-nvg-console" onclick="toggleNVGSystem()">NIGHT VISION</button>
        </div>
    </div>

    <div class="creator-footer">
        APP CREATOR DEPUTY SHERIFF EARL A. WOOD RETIRED VA
    </div>

    <script>
        function toggleNVGSystem() {
            document.getElementById('master-ui').classList.toggle('nvg-active');
        }

        function triggerK9Audio() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const phrase = new SpeechSynthesisUtterance("TACNET K9 Deployment Framework initialized. Hands-free voice logs active.");
                window.speechSynthesis.speak(phrase);
            } else {
                alert("K9 Audio Module Engaged.");
            }
        }

        function triggerSOSAlert() {
            alert("⚠️ CRITICAL ALARM: SOS TRANSMISSION ROUTED ⚠️\nTelemetry logs pushed directly to Amherst Communications Division.");
        }
    </script>
</body>
</html>
