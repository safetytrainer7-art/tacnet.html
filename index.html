<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TACNET V90 - TACTICAL TERMINAL</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --neon: #00ff41; --gold: #ffd700; --glass: rgba(0, 15, 30, 0.9); }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: var(--neon); font-family: 'Courier New', monospace; overflow: hidden; }
        
        /* HEADER - BALANCED PATCHES */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 2px solid var(--gold); background: #000; }
        .patch { width: 85px; height: 85px; object-fit: contain; filter: drop-shadow(0 0 5px var(--neon)); }
        .title-block { text-align: center; flex: 1; }
        .cracked { font-size: 36px; font-weight: 900; letter-spacing: 5px; margin: 0; text-shadow: 0 0 10px var(--neon); }
        .sub { font-size: 11px; color: var(--gold); font-weight: bold; }

        /* CENTER BADGE */
        .badge-center { display: block; margin: 5px auto; width: 55px; }

        /* MAIN LAYOUT - WIDE MAP VIEW */
        .main-grid { display: grid; grid-template-columns: 160px 1fr 160px; gap: 5px; height: 65vh; padding: 5px; }
        .side-panel { background: var(--glass); border: 1px solid var(--neon); border-radius: 8px; padding: 8px; display: flex; flex-direction: column; z-index: 1000; }
        #map { width: 100%; height: 100%; border: 1px solid var(--gold); border-radius: 5px; background: #111; }

        /* MODULE DISPLAY OVERLAY */
        #display-screen { 
            position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
            width: 90%; height: 250px; background: rgba(0,0,0,0.95); 
            border: 2px solid var(--gold); display: none; z-index: 2000;
            padding: 15px; overflow-y: auto; color: #fff; font-size: 14px;
        }

        .tac-btn { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 10px 5px; margin: 4px 0; font-size: 11px; font-weight: bold; border-radius: 4px; }
        .tac-btn:active { background: var(--neon); color: #000; }
        .footer { position: fixed; bottom: 0; width: 100%; text-align: center; padding: 10px; border-top: 2px solid var(--gold); color: var(--gold); font-size: 13px; background: #000; }
    </style>
</head>
<body>

<div class="header">
    <img src="image (2).png" class="patch" alt="FED">
    <div class="title-block">
        <h1 class="cracked">TACNET</h1>
        <div class="sub">MULTI-AGENCY TACTICAL TASK FORCE</div>
        <div class="sub" style="font-size: 9px; color: #fff;">FEDERAL • STATE • LOCAL</div>
    </div>
    <img src="image (1).jpg" class="patch" alt="VSP">
</div>

<img src="image.jpg" class="badge-center">

<div class="main-grid">
    <div class="side-panel">
        <button class="tac-btn" onclick="showModule('k9')">K9 FIRST AID</button>
        <button class="tac-btn" onclick="showModule('case')">CASE LAW</button>
    </div>
    <div id="map"></div>
    <div class="side-panel">
        <button class="tac-btn" onclick="setMarker('K9')">ADD K9</button>
        <button class="tac-btn" onclick="setMarker('CMD')">ADD CP</button>
    </div>
</div>

<div id="display-screen">
    <div id="module-content"></div>
    <button class="tac-btn" style="width:100%; margin-top:10px; border-color:red;" onclick="document.getElementById('display-screen').style.display='none'">CLOSE MODULE</button>
</div>

<div class="footer">APP CREATED BY DEPUTY SHERIFF EARL A. WOOD RETIRED</div>

<script>
    // Initialize Search Map (Centered on Amherst County area)
    var map = L.map('map').setView([37.58, -79.05], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    function showModule(type) {
        let content = "";
        let screen = document.getElementById('display-screen');
        let box = document.getElementById('module-content');
        screen.style.display = 'block';

        if(type === 'k9') {
            content = "<h3>VOICE COMMAND: HEAT STROKE</h3><p>1. MOVE TO SHADE.<br>2. APPLY COOL WATER TO BELLY/PAWS.<br>3. DO NOT USE ICE WATER.</p>";
            var msg = new SpeechSynthesisUtterance("K9 Heat Stroke Protocol: Move to shade. Apply cool water to paws and belly.");
            window.speechSynthesis.speak(msg);
        } else if(type === 'case') {
            content = "<h3>VIRGINIA V. MOORE (2008)</h3><p>The U.S. Supreme Court held that a warrantless arrest for a driving offense that is prohibited under state law, but supported by probable cause, does not violate the Fourth Amendment, even if the state law only allows for a citation.</p>";
        }
        box.innerHTML = content;
    }

    function setMarker(label) {
        map.on('click', function(e) {
            L.marker(e.latlng).addTo(map).bindPopup(label + " UNIT ATTACHED").openPopup();
            map.off('click');
        });
        alert("TAP MAP TO PLACE " + label);
    }
</script>
</body>
</html>
