<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TACNET CENTRAL COMMAND</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<style>

*{
    box-sizing:border-box;
}

body{

    margin:0;

    background:#050b12;

    color:white;

    font-family:Arial,sans-serif;

    overflow:hidden;

    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;
}

/* MAIN COMMAND AREA */

.commandCenter{

    position:relative;

    width:95vw;

    height:95vh;

    display:flex;

    justify-content:center;

    align-items:center;
}

/* MAP VIEWPORT */

.mapViewport{

    position:relative;

    width:78vw;

    height:78vh;

    border:2px solid #00e5ff;

    border-radius:24px;

    overflow:hidden;

    box-shadow:0 0 30px rgba(0,229,255,0.25);
}

#map{

    width:100%;

    height:100%;
}

/* HEADER */

.header{

    position:absolute;

    top:12px;

    left:50%;

    transform:translateX(-50%);

    z-index:3000;

    width:92%;

    height:55px;

    background:rgba(5,10,18,0.9);

    border:1px solid rgba(0,229,255,0.3);

    border-radius:16px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:0 15px;

    backdrop-filter:blur(10px);
}

.logo h1{

    margin:0;

    color:#00e5ff;

    font-size:22px;

    letter-spacing:3px;
}

.logo p{

    margin:0;

    font-size:10px;

    color:#8eefff;
}

.status{

    font-size:11px;

    color:#8eefff;

    text-align:right;
}

/* SEARCH */

.searchBox{

    position:absolute;

    top:80px;

    left:50%;

    transform:translateX(-50%);

    width:70%;

    z-index:3000;

    display:flex;

    gap:10px;
}

.searchBox input{

    flex:1;

    padding:14px;

    border:none;

    border-radius:14px;

    background:rgba(0,0,0,0.72);

    color:white;

    border:1px solid rgba(0,229,255,0.3);
}

.searchBtn{

    width:90px;

    border:none;

    border-radius:14px;

    background:rgba(0,229,255,0.2);

    border:1px solid #00e5ff;

    color:white;

    font-weight:bold;
}

/* CONTROL GROUPS */

.controlGroup{

    position:absolute;

    z-index:3000;

    display:flex;

    flex-direction:column;

    gap:10px;
}

.leftControls{

    left:10px;

    top:50%;

    transform:translateY(-50%);
}

.rightControls{

    right:10px;

    top:50%;

    transform:translateY(-50%);
}

.bottomControls{

    bottom:10px;

    left:50%;

    transform:translateX(-50%);

    flex-direction:row;
}

/* BUTTONS */

.toolBtn{

    width:95px;

    height:55px;

    border:none;

    border-radius:16px;

    background:rgba(0,0,0,0.7);

    border:1px solid rgba(255,255,255,0.14);

    color:white;

    font-weight:bold;

    backdrop-filter:blur(10px);
}

/* COLORS */

.law{
    color:#1e90ff;
}

.k9{
    color:#00e5ff;
}

.sar{
    color:#ff9500;
}

.civ{
    color:#00ffaa;
}

.poi{
    color:#ff00aa;
}

.ev{
    color:#ffffff;
}

.perim{
    color:#ff9500;
}

.sos{
    color:#ff3333;
}

.reset{
    color:#ff3377;
}

/* WEATHER */

.weather{

    position:absolute;

    right:15px;

    top:150px;

    z-index:3000;

    width:160px;

    padding:12px;

    border-radius:16px;

    background:rgba(0,0,0,0.65);

    border:1px solid rgba(0,229,255,0.25);

    font-size:12px;
}

/* COMPASS */

.compass{

    position:absolute;

    left:15px;

    top:150px;

    z-index:3000;

    width:75px;

    height:75px;

    border-radius:50%;

    background:rgba(0,0,0,0.65);

    border:2px solid #00e5ff;

    display:flex;

    justify-content:center;

    align-items:center;

    color:#00e5ff;

    font-size:28px;
}

</style>

</head>

<body>

<div class="commandCenter">

    <div class="mapViewport">

        <!-- HEADER -->

        <div class="header">

            <div class="logo">

                <h1>TACNET</h1>

                <p>
                FEDERAL • STATE • LOCAL
                </p>

            </div>

            <div class="status">

                GPS ONLINE<br>
                COMMAND ACTIVE

            </div>

        </div>

        <!-- SEARCH -->

        <div class="searchBox">

            <input
            type="text"
            id="address"
            placeholder="Search Address">

            <button
            class="searchBtn"
            onclick="searchLocation()">

            GO

            </button>

        </div>

        <!-- LEFT CONTROLS -->

        <div class="controlGroup leftControls">

            <button class="toolBtn law">
            LAW
            </button>

            <button class="toolBtn k9">
            K9
            </button>

            <button class="toolBtn sar">
            SAR
            </button>

        </div>

        <!-- RIGHT CONTROLS -->

        <div class="controlGroup rightControls">

            <button class="toolBtn civ">
            CIV
            </button>

            <button class="toolBtn poi">
            POI
            </button>

            <button class="toolBtn ev">
            EVID
            </button>

        </div>

        <!-- BOTTOM CONTROLS -->

        <div class="controlGroup bottomControls">

            <button
            class="toolBtn perim"
            onclick="togglePerimeter()">

            PERIM

            </button>

            <button
            class="toolBtn sos"
            onclick="sosAlert()">

            SOS

            </button>

            <button
            class="toolBtn reset"
            onclick="resetMap()">

            RESET

            </button>

        </div>

        <!-- COMPASS -->

        <div class="compass">
        N
        </div>

        <!-- WEATHER -->

        <div class="weather">

            Wind: 8 MPH NW<br>
            Temp: 61°F<br>
            Clear Conditions

        </div>

        <!-- MAP -->

        <div id="map"></div>

    </div>

</div>

<script>

/* MAP */

const map = L.map('map').setView(
[37.4138,-79.1422],
13
);

setTimeout(function(){

    map.invalidateSize();

},500);

/* TILES */

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution:'OpenStreetMap'
}
).addTo(map);

/* GPS */

navigator.geolocation.getCurrentPosition(

function(pos){

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    map.setView([lat,lon],15);

    L.marker([lat,lon])

    .addTo(map)

    .bindPopup('COMMAND POSITION')

    .openPopup();

}

);

/* SEARCH */

function searchLocation(){

    const address =
    document.getElementById('address').value;

    fetch(
    'https://nominatim.openstreetmap.org/search?format=json&q='
    + encodeURIComponent(address)
    )

    .then(response => response.json())

    .then(data => {

        if(data.length > 0){

            const lat =
            parseFloat(data[0].lat);

            const lon =
            parseFloat(data[0].lon);

            map.setView([lat,lon],15);

            L.marker([lat,lon])

            .addTo(map)

            .bindPopup(address)

            .openPopup();

        }

    });

}

/* SEARCHER COLORS */

let activeColor = '#1e90ff';

document
.querySelectorAll('.toolBtn')

.forEach(btn => {

    btn.addEventListener('click', function(){

        if(this.classList.contains('law'))
        activeColor = '#1e90ff';

        if(this.classList.contains('k9'))
        activeColor = '#00e5ff';

        if(this.classList.contains('sar'))
        activeColor = '#ff9500';

        if(this.classList.contains('civ'))
        activeColor = '#00ffaa';

        if(this.classList.contains('poi'))
        activeColor = '#ff00aa';

        if(this.classList.contains('ev'))
        activeColor = '#ffffff';

    });

});

/* PERIMETER MODE */

let perimeterMode = false;

function togglePerimeter(){

    perimeterMode = !perimeterMode;

    if(perimeterMode){

        alert('PERIMETER MODE ACTIVE');

    }else{

        alert('PERIMETER MODE OFF');

    }

}

/* MAP CLICKS */

map.on('click', function(e){

    if(perimeterMode){

        L.circle(

        [e.latlng.lat,e.latlng.lng],

        {
            radius:300,

            color:'#ff9500',

            fillColor:'#ff9500',

            fillOpacity:0.15
        })

        .addTo(map);

    }else{

        L.circleMarker(

        [e.latlng.lat,e.latlng.lng],

        {
            radius:10,

            color:'#ffffff',

            weight:2,

            fillColor:activeColor,

            fillOpacity:1
        })

        .addTo(map);

    }

});

/* SOS */

function sosAlert(){

    alert('SOS OFFICER DOWN');

    navigator.vibrate?.(500);

}

/* RESET */

function resetMap(){

    location.reload();

}

</script>

</body>
</html>
