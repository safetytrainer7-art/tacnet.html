<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TACNET COMMAND</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #050b12; font-family: Arial, sans-serif; color: white; }

#map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: #07131d; transition: filter 0.5s ease; }

/* NIGHT VISION GLOW */
.night-vision {
    filter: sepia(100%) hue-rotate(80deg) brightness(1.1) contrast(1.2) saturate(1.5);
}

/* SEARCH TARGET ANIMATION */
@keyframes pulse-red {
    0% { transform: scale(0.9); opacity: 1; }
    70% { transform: scale(1.1); opacity: 0.7; }
    100% { transform: scale(0.9); opacity: 1; }
}
.target-marker {
    animation: pulse-red 1.5s infinite ease-in-out;
}

.viewport { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 94vw; height: 92vh; border: 2px solid #00e5ff; border-radius: 26px; box-shadow: 0 0 20px rgba(0,229,255,0.3); pointer-events: none; z-index: 2; }

.header { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 92%; height: 56px; z-index: 3000; background: rgba(0,0,0,0.8); border: 1px solid rgba(0,229,255,0.4); border-radius: 18px; display: flex; justify-content: space-between; align-items: center; padding: 0 14px; }
.logo h1 { margin: 0; font-size: 20px; letter-spacing: 3px; color: #00e5ff; }
.logo p { margin: 0; font-size: 9px; color: #9befff; }
.status { text-align: right; font-size: 10px; color: #9befff; }

.searchBox { position: absolute; top: 74px; left: 50%; transform: translateX(-50%); width: 72%; display: flex; gap: 8px; z-index: 3000; }
.searchBox input { flex: 1; padding: 12px; border: none; border-radius: 14px; background: rgba(0,0,0,0.85); border: 1px solid rgba(0,229,255,0.5); color: white; font-size: 14px; }
.searchBtn { width: 72px; border: none; border-radius: 14px; background: #00e5ff; color: black; font-weight: bold; cursor: pointer; }

.mapModes { position: absolute; top: 124px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 3000; }
.mapModes button { width: 72px; height: 32px; border: none; border-radius: 10px; background: rgba(0,0,0,0.85); border: 1px solid rgba(0,229,255,0.3); color: #00e5ff; font-size: 10px; font-weight: bold; cursor: pointer; }

.leftControls, .rightControls, .bottomControls { position: absolute; z-index: 3000; display: flex; gap: 8px; }
.leftControls { left: 10px; top: 50%; transform: translateY(-50%); flex-direction: column; }
.rightControls { right: 10px; top: 50%; transform: translateY(-50%); flex-direction: column; }
.bottomControls { bottom: 12px; left: 50%; transform: translateX(-50%); }

.toolBtn { width: 70px; height: 42px; border: none; border-radius: 12px; background: rgba(0,0,0,0.85); border: 1px solid rgba(255,255,255,0.2); color: white; font-weight: bold; font-size: 11px; cursor: pointer; }
.law { color: #1e90ff; } .k9 { color: #00e5ff; } .sar { color: #ff9500; }
.civ { color: #00ffaa; } .poi { color: #ff00aa; } .evid { color: #ffffff; }
.perim { color: #ffbb33; } .reset { color: #ff3377; }

.drawerTab { position: absolute; top: 170px; right: 0; width: 40px; height: 130px; background: rgba(0,0,0,0.85); border-left: 1px solid #00e5ff; border-top: 1px solid #00e5ff; border-bottom: 1px solid #00e5ff; border-radius: 14px 0 0 14px; z-index: 4000; display: flex; justify-content: center; align-items: center; writing-mode: vertical-rl; font-size: 11px; font-weight: bold; color: #00e5ff; cursor: pointer; }
.drawer { position: absolute; top: 160px; right: -210px; width: 210px; height: 280px; background: rgba(0,0,0,0.95); border-left: 1px solid #00e5ff; border-top: 1px solid #00e5ff; border-bottom: 1px solid #00e5ff; border-radius: 18px 0 0 18px; z-index: 3500; padding: 12px; overflow-y: auto; transition: right 0.3s ease; }
.drawer.active { right: 0; }
.unitEntry { margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 11px; }

.compass { position: absolute; top: 170px; left: 10px; width: 56px; height: 56px; border-radius: 50%; background: rgba(0,0,0,0.8); border: 2px solid #00e5ff; color: #00e5ff; display: flex; justify-content: center; align-items: center; font-size: 22px; z-index: 3000; }
</style>
</head>

<body>
<div id="map"></div>
<div class="viewport"></div>
<div class="header">
    <div class="logo">
        <h1>TACNET</h1>
        <p>FEDERAL • STATE • LOCAL</p>
    </div>
    <div class="status">GPS ONLINE<br>COMMAND ACTIVE</div>
</div>

<div class="searchBox">
    <input id="address" type="text" placeholder="ENTER ADDRESS">
    <button class="searchBtn" onclick="searchLocation()">GO</button>
</div>

<div class="mapModes">
    <button onclick="setStreet()">STREET</button>
    <button onclick="setSatellite()">SAT</button>
    <button onclick="setTerrain()">TERRAIN</button>
    <button onclick="setNight()">NIGHT</button>
</div>

<div class="leftControls">
    <button class="toolBtn law">LAW</button>
    <button class="toolBtn k9">K9</button>
    <button class="toolBtn sar">SAR</button>
</div>

<div class="rightControls">
    <button class="toolBtn civ">CIV</button>
    <button class="toolBtn poi">POI</button>
    <button class="toolBtn evid">EVID</button>
</div>

<div class="bottomControls">
    <button class="toolBtn perim" onclick="enablePerimeter()">PERIM</button>
    <button class="toolBtn reset" onclick="resetMap()">RESET</button>
</div>

<div class="compass">N</div>
<div class="drawerTab" onclick="toggleDrawer()">UNITS</div>
<div class="drawer" id="drawer">
    <h3 style="color:#00e5ff; font-size:14px; margin-top:0;">ACTIVE UNITS</h3>
    <div id="unitList"></div>
</div>

<script>
/* MAP CONFIG */
const map = L.map('map', { zoomControl: false }).setView([37.4138, -79.1422], 13);
let currentLayer;

function setLayer(url, maxZoom = 19) {
    if (currentLayer) { map.removeLayer(currentLayer); }
    currentLayer = L.tileLayer(url, { maxZoom: maxZoom }).addTo(map);
    document.getElementById('map').classList.remove('night-vision');
}

setLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');

function setStreet() { setLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'); }
function setSatellite() { setLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'); }
function setTerrain() { setLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', 17); }
function setNight() { 
    setLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', 20); 
    document.getElementById('map').classList.add('night-vision');
}

/* SEARCH & TARGET SYSTEM */
let searchMarker;
let searchCircle;

function searchLocation() {
    const address = document.getElementById('address').value;
    if (!address) return;

    fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(address))
        .then(res => res.json())
        .then(data => {
            if (data.length > 0) {
                const lat = parseFloat(data[0].lat);
                const lon = parseFloat(data[0].lon);

                if (searchMarker) map.removeLayer(searchMarker);
                if (searchCircle) map.removeLayer(searchCircle);

                map.setView([lat, lon], 18);

                // RED TARGET RADIUS
                searchCircle = L.circle([lat, lon], {
                    radius: 40,
                    color: '#ff0000',
                    fillColor: '#ff0000',
                    fillOpacity: 0.2
                }).addTo(map);

                // RED TACTICAL MARKER
                searchMarker = L.circleMarker([lat, lon], {
                    radius: 12,
                    color: '#ffffff',
                    weight: 3,
                    fillColor: '#ff0000',
                    fillOpacity: 1,
                    className: 'target-marker'
                }).addTo(map);

                searchMarker.bindPopup(`
                    <div style="color:black; font-weight:bold; text-align:center;">
                        <span style="color:red;">[ TARGET LOCATION ]</span><br>
                        ${address.toUpperCase()}
                    </div>
                `).openPopup();
            }
        });
}

/* UI & UNITS */
function toggleDrawer() { document.getElementById('drawer').classList.toggle('active'); }
function resetMap() { location.reload(); }

let activeColor = '#1e90ff';
let activeUnit = 'LAW';
let unitCounter = 1;

document.querySelectorAll('.toolBtn').forEach(btn => {
    btn.addEventListener('click', function() {
        const colors = { law: '#1e90ff', k9: '#00e5ff', sar: '#ff9500', civ: '#00ffaa', poi: '#ff00aa', evid: '#ffffff' };
        for (let type in colors) {
            if (this.classList.contains(type)) {
                activeColor = colors[type];
                activeUnit = type.toUpperCase();
            }
        }
    });
});

let perimeterMode = false;
function enablePerimeter() { perimeterMode = true; }

map.on('click', e => {
    if (perimeterMode) {
        L.circle([e.latlng.lat, e.latlng.lng], { radius: 300, color: '#ffbb33', fillColor: '#ffbb33', fillOpacity: 0.15 }).addTo(map);
        perimeterMode = false;
    } else {
        const marker = L.circleMarker([e.latlng.lat, e.latlng.lng], { radius: 10, color: '#ffffff', weight: 2, fillColor: activeColor, fillOpacity: 1 }).addTo(map);
        const unitID = activeUnit + '-' + unitCounter++;
        const time = new Date().toLocaleTimeString();
        marker.bindPopup(`<b>${unitID}</b><br>TIME: ${time}`).openPopup();
        
        const entry = document.createElement('div');
        entry.className = 'unitEntry';
        entry.innerHTML = `<b>${unitID}</b><br>TIME: ${time}`;
        document.getElementById('unitList').prepend(entry);
    }
});
</script>
</body>
</html>
