<!DOCTYPE html>
<html>
<head>
    <style>
        body { background-color: #0D0D0D; color: #39FF14; font-family: monospace; padding: 20px; }
        .box { border: 1px solid #39FF14; background: #000; color: #39FF14; padding: 10px; width: 100%; margin: 10px 0; }
        .gold { color: #D4AF37; }
        .btn { background: #000; color: #D4AF37; border: 2px solid #D4AF37; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="home">
    <h1 class="gold">TACNET</h1>
    <p>AMHERST COUNTY S.O. - TACTICAL INTERFACE</p>
    
    <label class="gold">INCIDENT TYPE:</label>
    <input type="text" id="inc" class="box" placeholder="e.g. ARMED ROBBERY">
    
    <label class="gold">CALLSIGN:</label>
    <input type="text" id="cs" class="box" placeholder="e.g. K9-1">

    <button class="btn" onclick="runDeploy()">[ DEPLOY THE NET ]</button>
</div>

<div id="map" style="display:none;">
    <h2 id="header" class="gold"></h2>
    <div style="height:300px; border:2px dashed #39FF14; display:flex; align-items:center; justify-content:center;">
        [ TRACKING LIVE GPS... ]
    </div>
    <button class="btn" style="color:red; border-color:red;" onclick="location.reload()">TERMINATE MISSION</button>
</div>

<script>
    function runDeploy() {
        var incident = document.getElementById('inc').value;
        if(incident == "") {
            alert("REQUIRED: ENTER INCIDENT TYPE");
        } else {
            document.getElementById('home').style.display = 'none';
            document.getElementById('map').style.display = 'block';
            document.getElementById('header').innerText = "LIVE: " + incident.toUpperCase();
        }
    }
</script>

</body>
</html>
