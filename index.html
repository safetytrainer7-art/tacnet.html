firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* =====================================================
   LIVE OFFICER SYSTEM
===================================================== */

let officerMarkers = {};

let callsign =
prompt(
'ENTER UNIT CALLSIGN',
'LAW-01'
) || 'UNIT';

function startLiveTracking(){

if(!navigator.geolocation){

alert('GPS NOT SUPPORTED');

return;

}

navigator.geolocation.watchPosition(position => {

const lat = position.coords.latitude;
const lng = position.coords.longitude;

db.ref('tacnet/live/' + callsign).set({

callsign:callsign,
lat:lat,
lng:lng,
updated:Date.now()

});

});

}

db.ref('tacnet/live').on('value', snapshot => {

const data = snapshot.val();

if(!data) return;

Object.keys(data).forEach(key => {

const unit = data[key];

if(officerMarkers[key]){

officerMarkers[key]
.setLatLng([unit.lat,unit.lng]);

}else{

const marker = L.circleMarker(

[unit.lat,unit.lng],

{
radius:8,
color:'#00e5ff',
fillColor:'#00e5ff',
fillOpacity:1
}

)
.addTo(map)
.bindPopup(unit.callsign);

officerMarkers[key] = marker;

}

});

});

/* =====================================================
   SHARED EVENT SYSTEM
===================================================== */

function syncEvent(eventText){

db.ref('tacnet/events').push({

callsign:callsign,
event:eventText,
time:new Date().toLocaleTimeString()

});

}

/* =====================================================
   OVERRIDE EXISTING EVENT SYSTEM
===================================================== */

const originalAddEvent = addEvent;

addEvent = function(text){

originalAddEvent(text);

syncEvent(text);

};

/* =====================================================

${Array.from(

).map(item => {

return `

<td>${parts[1]}</td>

</tr>

`;

}).join('')}

</table>

<script>

window.print();

<\/script>

</body>

</html>

`;

reportWindow.document.write(reportHTML);

reportWindow.document.close();

}

/* =====================================================

===================================================== */

window.generateReport = generateFullReport;

/* =====================================================
   START LIVE SYSTEM
===================================================== */

addEvent('LIVE SHARED OPS ACTIVE');

</script>
