<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACNET - MULTI-AGENCY TASK FORCE</title>
    <style>
        /* 1. MILITARY THEME & COLORS */
        :root {
            --hunter-green: #1B3022;
            --cracked-gold: #D4AF37;
            --neon-green: #39FF14;
            --thin-blue-line: #0000FF;
        }

        body {
            background-color: var(--hunter-green);
            color: var(--cracked-gold);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 2. HEADER SECTION */
        header {
            text-align: center;
            padding: 15px;
            border-bottom: 3px solid var(--thin-blue-line);
            background: black;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            text-shadow: 2px 2px #000, 3px 3px 0px rgba(212, 175, 55, 0.3);
            letter-spacing: 5px;
        }

        .subtitle { font-size: 1rem; font-weight: bold; margin-top: 5px; }
        .agencies { font-size: 0.8rem; opacity: 0.8; }

        /* 3. TACTICAL MAP AREA */
        #map-container {
            flex-grow: 1;
            position: relative;
            background-color: #050505;
            border: 2px solid var(--cracked-gold);
            margin: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 15px rgba(57, 255, 20, 0.2);
        }

        #map-overlay {
            color: var(--neon-green);
            text-align: center;
            font-weight: bold;
        }

        /* 4. INTERFACE BUTTONS */
        .ui-controls {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 15px;
            background: black;
        }

        .tactical-btn {
            background: #000;
            border: 2px solid var(--cracked-gold);
            color: var(--cracked-gold);
            padding: 15px 5px;
            border-radius: 50%; /* Gold Circle */
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .sos-btn { border-color: red; color: red; font-weight: bold; }
        .nvg-btn { border-color: var(--neon-green); color: var(--neon-green); }

        /* 5. NIGHT VISION MODE (CSS FILTER) */
        .night-vision-active {
            filter: sepia(100%) hue-rotate(80deg) brightness(0.7) contrast(1.5);
        }

        .night-vision-active body { background-color: #000 !important; }
    </style>
</head>
<body id="main-body">

    <header>
        <h1>TACNET</h1>
        <div class="subtitle">MULTI-AGENCY TASK FORCE SEARCH APP</div>
        <div class="agencies">FEDERAL - STATE - LOCAL</div>
    </header>

    <div id="map-container">
        <div id="map-overlay">
            [ GPS SIGNAL ACTIVE ]<br>
            <span id="coordinates">SCANNING...</span>
        </div>
        
        <!-- TOP RIGHT TACTICAL DATA -->
        <div style="position: absolute; top: 10px; right: 10px; text-align: right; font-size: 0.8rem;">
            WIND: 8MPH NW <br>
            COMPASS: 320° NW
        </div>
    </div>

    <!-- TACTICAL BUTTON BAR -->
    <div class="ui-controls">
        <button class="tactical-btn" onclick="dropArticle('WEAPON')">🔫</button>
        <button class="tactical-btn" onclick="dropArticle('CLOTHING')">👕</button>
        <button class="tactical-btn nvg-btn" onclick="toggleNightVision()">NVG</button>
        <button class="tactical-btn" onclick="startMedicalVoice()">🎤 MED</button>
    </div>

    <div class="ui-controls" style="padding-top: 0;">
        <button class="tactical-btn" onclick="dropArticle('K9 TRAIL')">🐾</button>
        <button class="tactical-btn" onclick="dropArticle('LKP')">📍 LKP</button>
        <button class="tactical-btn" onclick="alert('Grid Cleared')">✅ GRID</button>
        <button class="tactical-btn sos-btn" onclick="triggerSOS()">SOS</button>
    </div>

    <script>
        // --- VOICE ENGINE ---
        const synth = window.speechSynthesis;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        function speak(text) {
            const utterance = new SynthesisUtterance(text);
            utterance.pitch = 0.8; 
            utterance.rate = 0.9;
            synth.speak(utterance);
        }

        // --- TACTICAL FUNCTIONS ---
        function toggleNightVision() {
            document.getElementById('main-body').classList.toggle('night-vision-active');
            speak("Night vision protocol toggled.");
        }

        function dropArticle(type) {
            const coords = "37.5215° N, 79.0531° W"; // Placeholder for Amherst, VA
            document.getElementById('coordinates').innerText = coords;
            speak(type + " marked at current location.");
        }

        function triggerSOS() {
            speak("OFFICER DOWN. EMERGENCY SIGNAL BROADCASTING.");
            document.body.style.backgroundColor = "darkred";
            setTimeout(() => { document.body.style.backgroundColor = "#1B3022"; }, 2000);
        }

        // --- MEDICAL VOICE CONTROL ---
        function startMedicalVoice() {
            if (!SpeechRecognition) {
                speak("Voice recognition not supported on this device.");
                return;
            }
            const recognition = new SpeechRecognition();
            speak("Medical system active. State the K9 emergency.");
            
            recognition.onresult = (event) => {
                const command = event.results[0][0].transcript.toLowerCase();
                if (command.includes("cpr")) {
                    speak("Begin K9 CPR. 100 compressions per minute. Wide part of chest.");
                } else if (command.includes("heat")) {
                    speak("Heat exhaustion. Apply cool water to paws and groin. Do not use ice.");
                } else {
                    speak("Command not recognized. Standing by.");
                }
            };
            recognition.start();
        }
    </script>
</body>
</html>
