<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TACNET Command Portal</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        :root {
            --neon-green: #00ff66;
            --gold: #ffcc00;
            --blue: #1d7dff;
            --lightblue: #66d9ff;
            --red: #ff3030;
            --civilian: #28d96f;
            --purple: #bf66ff;
            --night-vision-red: rgba(255, 0, 0, 0.35);
            --neon-glow-red: rgba(255, 0, 0, 0.75);
        }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; font-family: Arial, Helvetica, sans-serif;
            color: #fff; 
            /* STOPS HORIZONTAL AND VERTICAL BOUNCE ON IOS */
            overflow: hidden; 
            position: relative;
        }

        /* FIXED HARD-CODED CRIMSON NIGHT VISION SHIELD (THE RED TAC LIGHT) */
        body::before {
            content: ''; position: fixed; inset: 0; pointer-events: none;
            background: repeating-linear-gradient(
                to bottom,
                rgba(255, 0, 0, .04),
                rgba(255, 0, 0, .04) 2px,
                transparent 2px,
                transparent 4px
            );
            z-index: 9999;
        }

        body::after {
            content: ''; position: fixed; inset: 0; pointer-events: none;
            box-shadow: inset 0 0 180px var(--night-vision-red), inset 0 0 60px rgba(255, 0, 0, 0.3);
            z-index: 9998;
        }

        /* FIXED VIEWPORT CONTAINER MAPPING STACK */
        .main-viewport {
            display: flex; flex-direction: column; width: 100vw; height: 100vh;
            position: relative; overflow: hidden;
        }

        /* COMPACT COMMAND INPUT HUD */
        .search-controls {
            padding: 8px; display: flex; gap: 8px; background: #050a05; flex-shrink: 0;
            border-bottom: 2px solid var(--gold); z-index: 1001;
        }

        #addressInput {
            flex: 1; background: #000; border: 2px solid var(--neon-green); color: #fff;
            padding: 12px; font-weight: bold; font-size: 1rem; outline: none;
        }

        .goBtn {
            width: 75px; background: var(--neon-green); color: #000; border: none;
            font-weight: 900; font-size: 1.1rem; cursor: pointer;
        }

        .menuToggleBtn {
            width: 50px; background: #111; color: var(--gold); border: 2px solid var(--gold);
            font-size: 1.2rem; cursor: pointer; font-weight: bold; display: flex;
            align-items: center; justify-content: center;
        }

        /* PLACEMENT HUD NOTIFICATION OVERLAY */
        #placementStatus {
            display: none; background: #ff3030; color: #fff; padding: 8px;
            text-align: center; font-weight: bold; font-size: 0.9rem; letter-spacing: 1px;
            text-transform: uppercase; z-index: 1001; box-shadow: 0 4px 12px rgba(255,0,0,0.6);
        }

        /* EXTENDED TARGET MAPPING PANEL */
        #map {
            flex: 1; width: 100%; background: #000; z-index: 1;
        }

        /* CRISIS VOICE COMMAND MATRIX */
        .voicePanel {
            padding: 6px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;
            background: #030703; border-top: 1px solid #112211; flex-shrink: 0;
        }

        .voiceBtn {
            padding: 12px 4px; font-size: .75rem; border: 1px solid var(--gold); font-weight: bold;
            cursor: pointer; background: #000; color: var(--gold); text-align: center;
            text-transform: uppercase; border-radius: 3px;
        }

        .btn-stop-transmission {
            grid-column: span 3; border: 1px solid #ff3333; background: #1a0000;
            color: #ff9999; padding: 12px; text-align: center; font-weight: 900;
            cursor: pointer; text-transform: uppercase; font-size: 0.85rem; margin-top: 2px;
        }

        /* ANTI-OVERFLOW FULL COUPLING DRAWER OVERLAY PANEL */
        .sideDrawer {
            display: none; /* TRIPPED ENTIRELY OFF UNTIL ACTIVATED TO PREVENT OVERFLOW BURSTING */
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.96); z-index: 5000; box-sizing: border-box;
            padding: 20px; flex-direction: column; gap: 16px; overflow-y: auto;
        }

        .sideDrawer.open { display: flex; }

        .drawerHeader {
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid var(--gold); padding-bottom: 10px; flex-shrink: 0;
        }
        .drawerTitle { margin: 0; color: var(--gold); font-size: 1.4rem; font-weight: 900; letter-spacing: 1px; }
        .closeDrawerBtn { background: #220000; border: 1px solid #ff3333; color: #ff3333; font-size: 1.1rem; font-weight: bold; cursor: pointer; padding: 6px 14px; border-radius: 4px; }

        .agencyLogos { display: flex; justify-content: space-around; align-items: center; margin: 6px 0; flex-shrink: 0; }
        .patch { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 1px solid var(--gold); }

        .drawerSectionTitle { color: var(--neon-green); font-size: 0.9rem; font-weight: bold; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }

        /* MARKER DEPLOYMENT SECTOR CONTROLS */
        .unitGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        
        .unitDeployBtn {
            padding: 12px; font-size: .85rem; background: #000; color: #fff;
            border: 2px solid var(--neon-green); font-weight: bold; cursor: pointer;
            text-transform: uppercase; text-align: center; border-radius: 4px;
        }
        .btn-blue { border-color: var(--blue); color: var(--blue); }
        .btn-lightblue { border-color: var(--lightblue); color: var(--lightblue); }
        .btn-red { border-color: var(--red); color: var(--red); }
        .btn-civilian { border-color: var(--civilian); color: var(--civilian); }
        .btn-purple { border-color: var(--purple); color: var(--purple); }

        #notesBox {
            width: 100%; height: 100px; background: #000; color: #fff;
            border: 1px solid var(--neon-green); padding: 10px; font-size: 0.9rem; outline: none;
            resize: none; font-family: sans-serif; box-sizing: border-box;
        }

        .reportBtn {
            padding: 14px; background: var(--neon-green); color: #000; font-weight: 900;
            border: none; text-transform: uppercase; cursor: pointer; text-align: center;
            border-radius: 4px; font-size: 1rem; margin-top: 4px; flex-shrink: 0;
            box-shadow: 0 0 15px var(--neon-green);
        }

        /* OFFICIAL CREATOR ATTRIBUTION FOOTER BLOCK */
        .attributionBlock {
            margin-top: auto; border-top: 1px solid #333; padding-top: 14px;
            text-align: center; color: #ff7777; font-size: 0.8rem; font-weight: bold;
            line-height: 1.5; letter-spacing: 1px; flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="main-viewport">
        <div class="search-controls">
            <input id="addressInput" placeholder="ENTER SEARCH TARGET ADDRESS" value="135 FLOSSIE DRIVE MADISON HEIGHTS VA">
            <button class="goBtn" onclick="searchAddress()">GO</button>
            <button class="menuToggleBtn" onclick="toggleDrawer()">⚙️</button>
        </div>

        <div id="placementStatus">TAP MAP LOCATION TO DEPLOY SEARCHER</div>

        <div id="map"></div>

        <div class="voicePanel">
            <button class="voiceBtn" onclick="speakMedicalProtocol('cpr')">🐾 CPR</button>
            <button class="voiceBtn" onclick="speakMedicalProtocol('gunshot')">💥 GUNSHOT</button>
            <button class="voiceBtn" onclick="speakMedicalProtocol('heatstroke')">☀️ HEAT</button>
            <button class="voiceBtn" onclick="speakMedicalProtocol('snakebite')">🐍 SNAKE</button>
            <button class="voiceBtn" onclick="speakMedicalProtocol('vet')">🏥 VET</button>
            <button class="voiceBtn" onclick="speakMedicalProtocol('rally')">🚨 RALLY</button>
            <button class="btn-stop-transmission" onclick="killVoiceTransmission()">🛑 STOP VOICE TRANSMISSION</button>
        </div>

        <div id="sideDrawer" class="sideDrawer">
            <div class="drawerHeader">
                <h3 class="drawerTitle">TACNET PORTAL</h3>
                <button class="closeDrawerBtn" onclick="toggleDrawer()">CLOSE</button>
            </div>

            <div class="agencyLogos">
                <img src="amherst_badge.png.jpg" class="patch" onerror="this.style.visibility='hidden'">
                <img src="va.png-modified.jpg" class="patch" onerror="this.style.visibility='hidden'">
            </div>

            <div>
                <div class="drawerSectionTitle">1. SELECT TRACKING ASSET</div>
                <div class="unitGrid">
                    <button class="unitDeployBtn btn-blue" onclick="prepUnitPlacement('leo')">ADD LEO</button>
                    <button class="unitDeployBtn btn-lightblue" onclick="prepUnitPlacement('k9')">ADD K9</button>
                    <button class="unitDeployBtn btn-red" onclick="prepUnitPlacement('sar')">ADD SAR</button>
                    <button class="unitDeployBtn btn-civilian" onclick="prepUnitPlacement('civilian')">ADD CIV</button>
                    <button class="unitDeployBtn btn-purple" style="grid-column: span 2;" onclick="prepUnitPlacement('poi')">⚠️ ADD PERSON OF INTEREST (POI)</button>
                </div>
            </div>

            <div>
                <div class="drawerSectionTitle">2. COURT LOG / DISPOSITION NOTES</div>
                <textarea id="notesBox" placeholder="Enter target track specifics, field dispositions, or K9 alerts for certified report generation..."></textarea>
            </div>

            <button class="reportBtn" onclick="generateCourtPDF()">GENERATE COURT REPORT (PDF)</button>

            <div class="attributionBlock">
                TACNET COMMAND MODULE<br>
                APP CREATOR DEPUTY SHERIFF EARL A. WOOD RETIRED VA
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        var map, perimeter;
        var synth = window.speechSynthesis;
        var deployedUnitsLog = [];
        var reportTrackingHistory = [];
        
        var currentPlacementType = null;
        var isPlacementActive = false;

        var operationalLat = 37.4338;
        var operationalLng = -79.1114;

        var layers = {
            sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 20 }),
            street: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{y}/{x}.png', { maxZoom: 20 }),
            terrain: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{y}/{x}.png', { maxZoom: 17 })
        };

        window.onload = function() {
            initMap();
        };

        function initMap() {
            map = L.map('map', {zoomControl: true, attributionControl: false}).setView([operationalLat, operationalLng], 15);
            layers.sat.addTo(map);

            perimeter = L.circle([operationalLat, operationalLng], {
                color: '#00ff66',
                fillColor: '#00ff66',
                fillOpacity: .10,
                radius: 804
            }).addTo(map);

            L.control.layers({
                'Satellite Layer': layers.sat,
                'Street Map': layers.street,
                'Terrain View': layers.terrain
            }, null, { position: 'topright' }).addTo(map);

            map.on('click', function(e) {
                if (!isPlacementActive || !currentPlacementType) return;
                executeManualPlacement(e.latlng.lat, e.latlng.lng);
            });

            if(navigator.geolocation){
                navigator.geolocation.getCurrentPosition((position)=>{
                    operationalLat = position.coords.latitude;
                    operationalLng = position.coords.longitude;
                    map.setView([operationalLat, operationalLng], 15);
                    if(perimeter) { perimeter.setLatLng([operationalLat, operationalLng]); }
                }, null, {enableHighAccuracy: true});
            }

            setTimeout(()=>{ map.invalidateSize(); }, 400);
            reportTrackingHistory.push('TACTICAL OPERATIONS GRID RUN STARTED');
        }

        function toggleDrawer() {
            document.getElementById('sideDrawer').classList.toggle('open');
            setTimeout(()=>{ map.invalidateSize(); }, 200);
        }

        async function searchAddress(){
            var address = document.getElementById('addressInput').value;
            if(address.trim() === '') return;

            try {
                var response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
                var data = await response.json();

                if(data.length === 0){
                    alert('COORDINATES NOT SECURED');
                    return;
                }

                operationalLat = parseFloat(data[0].lat);
                operationalLng = parseFloat(data[0].lon);

                map.setView([operationalLat, operationalLng], 16);

                if(perimeter){ map.removeLayer(perimeter); }

                perimeter = L.circle([operationalLat, operationalLng], {
                    color: '#00ff66',
                    fillColor: '#00ff66',
                    fillOpacity: .10,
                    radius: 804
                }).addTo(map);

                reportTrackingHistory.push('TACTICAL TARGET RECENTERED IN SECTOR: ' + address.toUpperCase());
                map.invalidateSize();

            } catch(e) {
                alert('NETWORK SEARCH LINK TIMEOUT');
            }
        }

        function prepUnitPlacement(type) {
            currentPlacementType = type;
            isPlacementActive = true;
            toggleDrawer(); // HIDES OVERLAY PANEL COMPLETELY TO REVEAL TOTAL MAP VIEWPORT
            
            var statusHUD = document.getElementById('placementStatus');
            statusHUD.innerText = "TAP MAP LOCATION TO DEPLOY " + type.toUpperCase();
            statusHUD.style.display = "block";
        }

        function executeManualPlacement(lat, lng) {
            var colors = { 
                leo: '#1d7dff', 
                k9: '#66d9ff', 
                sar: '#ff3030', 
                civilian: '#28d96f',
                poi: '#bf66ff'
            };

            var marker = L.circleMarker([lat, lng], {
                radius: 10,
                color: '#fff',
                fillColor: colors[currentPlacementType],
                fillOpacity: 1,
                weight: 2
            }).addTo(map).bindPopup(`<b>${currentPlacementType.toUpperCase()} ASSET</b><br>Manually Deployed`);

            deployedUnitsLog.push({ type: currentPlacementType.toUpperCase(), lat: lat.toFixed(5), lng: lng.toFixed(5) });
            reportTrackingHistory.push(`${currentPlacementType.toUpperCase()} ASSET PLACED MANUAL AT LAT: ${lat.toFixed(4)}, LNG: ${lng.toFixed(4)}`);

            isPlacementActive = false;
            currentPlacementType = null;
            document.getElementById('placementStatus').style.display = "none";
        }

        function killVoiceTransmission(){
            if(synth) { synth.cancel(); }
        }

        function speakMedicalProtocol(type){
            if(!synth) return;
            synth.cancel();
            var msg = '';

            if(type==='cpr'){
                msg = 'Executing canine CPR instructions. Lay the dog on a firm surface on its right side. Verify airway is completely clear. Deliver thirty chest compressions just behind the elbow, then extend the neck and deliver two rescue breaths directly into the nostrils. Repeat cycle.';
            }
            if(type==='gunshot'){
                msg = 'Executing canine Gunshot trauma response. Immediately pack the entry site tightly using hemostatic gauze from your tactical medical bag. Apply heavy, steady, manual direct pressure without stopping for a minimum of three minutes. Do not remove gauze if it saturates; layer more over top.';
            }
            if(type==='heatstroke'){
                msg = 'Executing canine Heat Stroke protocol. Cease tracking and field operations immediately. Relocate canine to shaded terrain or air-conditioned fleet transport. Apply room-temperature running water over the stomach, inner thighs, and paw pads.';
            }
            if(type==='snakebite'){
                msg = 'Executing canine Snake Bite procedure. Restrain canine and minimize all physical exertion to restrict systemic spread of venom. Keep the bite location positioned below heart level if possible. Cleanse area gently. Do not apply ice, or use a tourniquet.';
            }
            if(type==='vet'){
                msg = 'Sourcing emergency veterinary triage routing. Field telemetry data compiled. Contacting regional police veterinary dispatch line to stand by for priority emergency intake.';
            }
            if(type==='rally'){
                msg = 'Command directive issued: All perimeter units collapse cordon formations and rally coordinates back inward on target lead asset position, Wood Canine One.';
            }

            var speech = new SpeechSynthesisUtterance(msg);
            speech.lang = 'en-US';
            speech.rate = 1.0; 
            synth.speak(speech);
        }

        function generateCourtPDF() {
            var { jsPDF } = window.jspdf;
            var doc = new jsPDF();
            var userNotes = document.getElementById('notesBox').value;

            var currentY = 20;
            doc.setFontSize(16);
            doc.setFont('Helvetica', 'bold');
            doc.text('EVIDENTIARY SEARCH OPERATIONS LOG REPORT', 20, currentY);
            
            currentY += 10;
            doc.setFontSize(10);
            doc.setFont('Helvetica', 'normal');
            doc.text('PRODUCED VIA TACNET SEARCH DEPLOYMENT SYSTEM', 20, currentY);
            
            currentY += 15;
            doc.setFont('Helvetica', 'bold');
            doc.text('I. OPERATIONAL TELEMETRY HISTORICAL TRACKS:', 20, currentY);
            currentY += 8;
            doc.setFont('Helvetica', 'normal');

            reportTrackingHistory.forEach(function(logLine) {
                if(currentY > 270) { doc.addPage(); currentY = 20; }
                doc.text('- ' + logLine, 20, currentY);
                currentY += 7;
            });

            currentY += 10;
            doc.setFont('Helvetica', 'bold');
            doc.text('II. DEPLOYED PERIMETER SEARCH ASSETS LOG MATRIX:', 20, currentY);
            currentY += 8;
            doc.setFont('Helvetica', 'normal');

            if(deployedUnitsLog.length === 0) {
                doc.text('No active markers logged during session.', 25, currentY);
                currentY += 7;
            } else {
                deployedUnitsLog.forEach(function(unit) {
                    if(currentY > 270) { doc.addPage(); currentY = 20; }
                    doc.text(`Asset Type: ${unit.type} | Grid Location: Lat ${unit.lat}, Lng ${unit.lng}`, 25, currentY);
                    currentY += 7;
                });
            }

            if(userNotes.trim() !== "") {
                currentY += 10;
                if(currentY > 250) { doc.addPage(); currentY = 20; }
                doc.setFont('Helvetica', 'bold');
                doc.text('III. CASE LEGAL INVESTIGATIVE DISPOSITION NOTES:', 20, currentY);
                currentY += 8;
                doc.setFont('Helvetica', 'normal');
                var multiLineNotes = doc.splitTextToSize(userNotes, 170);
                doc.text(multiLineNotes, 20, currentY);
                currentY += (multiLineNotes.length * 6);
            }

            currentY += 20;
            if(currentY > 260) { doc.addPage(); currentY = 30; }
            doc.setLineWidth(0.5);
            doc.line(20, currentY, 190, currentY);
            currentY += 8;
            doc.setFont('Helvetica', 'bold');
            doc.setFontSize(9);
            doc.text('TACNET SYSTEMS LEGAL RECORD VERIFICATION', 20, currentY);
            currentY += 5;
            doc.setFont('Helvetica', 'normal');
            doc.text('APP CREATOR DEPUTY SHERIFF EARL A. WOOD RETIRED VA', 20, currentY);

            doc.save('TACNET_COURT_EVIDENCE_REPORT.pdf');
        }
    </script>
</body>
</html>
